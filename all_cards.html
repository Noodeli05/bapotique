<style>
:root {
  --bg:#13111a; --bg-warm:#1c1820;
  --glass:rgba(255,255,255,0.06); --glass-hover:rgba(255,255,255,0.10);
  --border:rgba(255,255,255,0.10); --border-strong:rgba(255,255,255,0.18);

  --lav:#c8b8f0;    --lav-bg:rgba(200,184,240,0.10);
  --mint:#a8d8c4;   --mint-bg:rgba(168,216,196,0.10);
  --peach:#f0c8a0;  --peach-bg:rgba(240,200,160,0.10);
  --sky:#a8c8f0;    --sky-bg:rgba(168,200,240,0.10);
  --rose:#f0b8c4;   --rose-bg:rgba(240,184,196,0.10);
  --butter:#f0e0a0; --butter-bg:rgba(240,224,160,0.10);
  --sage:#b8d8b8;   --sage-bg:rgba(184,216,184,0.10);

  --tx:#e8e4f0; --tx-muted:rgba(232,228,240,0.55); --tx-faint:rgba(232,228,240,0.30);
  --sidebar-bg:rgba(22,18,30,0.88);
  --r-card:16px; --r-sm:10px; --r-lg:22px;

  /* aliases pour compatibilité */
  --pr:#c8b8f0; --pr2:#a898d8; --teal:#a8d8c4; --cyan:#a8c8f0; --amber:#f0c8a0;
  --card:rgba(255,255,255,0.06); --card2:rgba(255,255,255,0.04);
  --sb:rgba(22,18,30,0.88); --sb-txt:rgba(232,228,240,0.55);
  --bdr:rgba(255,255,255,0.10); --mu:rgba(232,228,240,0.55);
  --nav:rgba(19,17,26,0.92); --radius:16px;
  /* ressources.html aliases */
  --card-bg:rgba(255,255,255,0.06); --nav-bg:rgba(19,17,26,0.92);
  --nav-active:rgba(200,184,240,0.15);
  --text:#e8e4f0; --muted:rgba(232,228,240,0.55);
  --primary:#c8b8f0; --primary-lt:rgba(200,184,240,0.10); --primary-dk:#a898d8;
  --def-bg:rgba(200,184,240,0.10); --def-bd:#c8b8f0; --def-lbl:#c8b8f0;
  --ex-bg:rgba(168,216,196,0.10); --ex-bd:#a8d8c4; --ex-lbl:#a8d8c4;
  --ret-bg:rgba(240,224,160,0.10); --ret-bd:#f0e0a0; --ret-lbl:#f0e0a0;
  --att-bg:rgba(240,184,196,0.10); --att-bd:#f0b8c4; --att-lbl:#f0b8c4;
  --ans-bg:rgba(168,216,196,0.10); --ans-bd:#a8d8c4; --ans-lbl:#a8d8c4;
  --note-bg:rgba(255,255,255,0.04); --note-bd:rgba(255,255,255,0.10); --note-lbl:rgba(232,228,240,0.55);
}
[data-theme="light"] {
  --bg:#f5f3f8; --bg-warm:#ede9f4;
  --glass:rgba(255,255,255,0.70); --glass-hover:rgba(255,255,255,0.85);
  --border:rgba(120,100,180,0.18); --border-strong:rgba(120,100,180,0.32);
  --tx:#1a1525; --tx-muted:rgba(26,21,37,0.55); --tx-faint:rgba(26,21,37,0.30);
  --sidebar-bg:rgba(240,236,250,0.95);
  --card:rgba(255,255,255,0.70); --card2:rgba(255,255,255,0.55);
  --sb:rgba(240,236,250,0.95); --sb-txt:rgba(26,21,37,0.55);
  --bdr:rgba(120,100,180,0.18); --mu:rgba(26,21,37,0.55);
  --nav:rgba(245,243,248,0.95); --nav-bg:rgba(245,243,248,0.95);
  --nav-active:rgba(120,100,180,0.12);
  --card-bg:rgba(255,255,255,0.70); --sidebar-bg:rgba(240,236,250,0.95);
  --text:#1a1525; --muted:rgba(26,21,37,0.55);
  --primary:#7c6cc0; --primary-lt:rgba(120,100,180,0.10); --primary-dk:#5a4b9a;
  --def-bg:rgba(200,184,240,0.15); --def-bd:#9880d8; --def-lbl:#5c3f9a;
  --ex-bg:rgba(168,216,196,0.15); --ex-bd:#5aaa88; --ex-lbl:#246048;
  --ret-bg:rgba(240,224,160,0.15); --ret-bd:#c8a840; --ret-lbl:#7a5c00;
  --att-bg:rgba(240,184,196,0.15); --att-bd:#c85870; --att-lbl:#7a1030;
  --ans-bg:rgba(168,216,196,0.15); --ans-bd:#5aaa88; --ans-lbl:#246048;
  --note-bg:rgba(240,236,250,0.80); --note-bd:rgba(120,100,180,0.30); --note-lbl:rgba(26,21,37,0.55);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;overflow-x:hidden}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;max-width:100vw}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 50% at 15% 20%, rgba(200,184,240,0.10) 0%, transparent 65%),
    radial-gradient(ellipse 50% 45% at 85% 75%, rgba(168,216,196,0.08) 0%, transparent 65%),
    radial-gradient(ellipse 40% 35% at 50% 50%, rgba(168,200,240,0.06) 0%, transparent 65%);
}

/* Header */
.ac-header{background:var(--sb);padding:.8rem 1.2rem;display:flex;align-items:center;gap:.5rem;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;box-shadow:0 2px 16px rgba(0,0,0,.4)backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
.ac-header h1{font-family:'DM Serif Display',serif;font-size:1rem;color:#fff;flex-shrink:0;white-space:nowrap}
.nav-links{display:flex;gap:.3rem;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav-links a{color:rgba(232,228,240,0.80);text-decoration:none;font-size:.78rem;padding:.25rem .6rem;border-radius:6px;transition:background .15s;white-space:nowrap}
.nav-links a:hover{background:rgba(200,184,240,0.18);color:#fff}
.btn-icon{background:none;border:none;cursor:pointer;font-size:1rem;color:var(--mu);padding:.25rem;border-radius:6px}
.btn-icon:hover{background:rgba(255,255,255,.1)}

/* Search + filters */
.ac-controls{padding:1rem 1.2rem;display:flex;gap:.8rem;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:var(--bg);z-index:10}
.ac-search{flex:1;min-width:200px;background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:.45rem .9rem;font-size:.88rem;color:var(--tx);outline:none;transition:border-color .2s}
.ac-search:focus{border-color:var(--pr)}
.filter-tabs{display:flex;gap:.35rem;flex-wrap:wrap}
.ftab{background:rgba(255,255,255,.05);border:1px solid var(--bdr);color:var(--mu);padding:.32rem .75rem;border-radius:20px;font-size:.75rem;cursor:pointer;transition:all .15s;white-space:nowrap}
.ftab:hover{border-color:var(--pr);color:var(--tx)}
.ftab.active{background:linear-gradient(90deg,var(--pr),var(--pr2));color:#fff;border-color:transparent}
.ac-count{font-size:.78rem;color:var(--mu);white-space:nowrap}

/* Source filter pills */
.source-pills{padding:.5rem 1.2rem;display:flex;gap:.4rem;flex-wrap:wrap;border-bottom:1px solid var(--bdr)}
.spill{background:rgba(200,184,240,0.08);border:1px solid var(--bdr);color:var(--mu);padding:.22rem .65rem;border-radius:20px;font-size:.72rem;cursor:pointer;transition:all .15s}
.spill:hover,.spill.active{background:rgba(0,212,255,.15);border-color:var(--cyan);color:var(--cyan)}

/* Grid */
.ac-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.9rem;padding:1rem 1.2rem}
.ac-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--radius);cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden}
.ac-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(200,184,240,0.12)}
.ac-card.mastered{border-left:3px solid #34d399}
.ac-card.review{border-left:3px solid #f87171}
.ac-card.fav{border-left:3px solid #fbbf24}
.card-status{position:absolute;top:.5rem;right:.55rem;font-size:.65rem;padding:.15rem .4rem;border-radius:8px;font-weight:700}
.status-mastered{background:rgba(52,211,153,.15);color:#34d399}
.status-review{background:rgba(248,113,113,.12);color:#f87171}
.status-unseen{background:rgba(255,255,255,.06);color:var(--mu)}
.ac-front{padding:.85rem .9rem .6rem;min-height:75px;display:flex;align-items:center}
.ac-front-text{font-size:.85rem;font-weight:500;line-height:1.5;color:var(--tx)}
.ac-meta{padding:.3rem .9rem .6rem;display:flex;gap:.4rem;align-items:center;flex-wrap:wrap}
.ac-chapter{font-size:.65rem;color:var(--mu);background:rgba(255,255,255,.04);padding:.15rem .4rem;border-radius:6px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ac-source{font-size:.62rem;color:var(--cyan);opacity:.7}
.ac-back{display:none;padding:.65rem .9rem .8rem;border-top:1px solid var(--bdr);background:var(--card2)}
.ac-back-text{font-size:.82rem;color:var(--tx);line-height:1.55}
.ac-card.open .ac-back{display:block}
.ac-card.open{border-color:var(--pr)}
.ac-fav{position:absolute;bottom:.5rem;right:.7rem;font-size:.95rem;cursor:pointer;opacity:.4;transition:opacity .15s}
.ac-fav:hover,.ac-fav.active{opacity:1}

/* Study link */
.study-link{display:inline-flex;align-items:center;gap:.3rem;font-size:.68rem;color:var(--pr);text-decoration:none;padding:.2rem .5rem;border-radius:6px;margin:.3rem .7rem .7rem;border:1px solid rgba(200,184,240,0.18);transition:background .15s}
.study-link:hover{background:rgba(200,184,240,0.08)}

/* Empty */
.ac-empty{text-align:center;padding:3rem;color:var(--mu);grid-column:1/-1}

@media(max-width:600px){
  .ac-grid{grid-template-columns:1fr;padding:.7rem}
  .ac-controls{padding:.7rem}
  .ac-header h1{font-size:.88rem}
}

/* iOS auto-zoom prevention: keep all inputs >= 16px */
input, textarea, select { font-size: max(16px, 1em) !important; }
/* TTS */
.tts-btn{background:none;border:1px solid var(--bdr,rgba(255,255,255,.1));border-radius:6px;padding:.18rem .48rem;font-size:.78rem;cursor:pointer;color:var(--mu,rgba(232,228,240,.55));transition:all .15s;line-height:1.2;flex-shrink:0;user-select:none;vertical-align:middle;font-family:inherit}
.tts-btn:hover,.tts-btn[data-s="1"]{background:var(--lav-bg,rgba(200,184,240,.1));color:var(--lav,#c8b8f0);border-color:var(--lav,#c8b8f0)}
</style>

<script>
const CARDS = [{"id": "rev_d0_0", "chapter": "D0 — Introduction & méthode", "source": "Révision complète", "front": "Définition de la linguistique", "back": "Science qui décrit le fonctionnement réel des langues humaines (≠ grammaire normative)."}, {"id": "rev_d0_1", "chapter": "D0 — Introduction & méthode", "source": "Révision complète", "front": "Différence langue / énonciation", "back": "Langue = système abstrait collectif. Énonciation = mise en action de la langue par un locuteur dans une situation concrète."}, {"id": "rev_d0_2", "chapter": "D0 — Introduction & méthode", "source": "Révision complète", "front": "Définition du signifiant", "back": "Forme sonore (ou graphique) du signe : image acoustique. Ex. /ʃa/ pour \"chat\"."}, {"id": "rev_d0_3", "chapter": "D0 — Introduction & méthode", "source": "Révision complète", "front": "Définition du signifié", "back": "Concept mental associé à la forme. Ex. l&#39;idée d&#39;un animal félin pour \"chat\"."}, {"id": "rev_d0_4", "chapter": "D0 — Introduction & méthode", "source": "Révision complète", "front": "Qu&#39;est-ce que le référent ?", "back": "L&#39;objet réel dans le monde. Il est extérieur au signe linguistique."}, {"id": "rev_d0_5", "chapter": "D0 — Introduction & méthode", "source": "Révision complète", "front": "Arbitraire du signe : qu&#39;est-ce que c&#39;est ?", "back": "Le lien entre signifiant et signifié n&#39;est pas motivé par nature : \"chien\" en fr., \"dog\" en angl., \"Hund\" en all. désignent le même animal."}, {"id": "rev_d0_6", "chapter": "D0 — Introduction & méthode", "source": "Révision complète", "front": "Qu&#39;est-ce que la double articulation ?", "back": "Principe de Martinet : 1ère articulation = unités avec sens (morphèmes) ; 2ème articulation = unités sans sens (phonèmes) permettant de distinguer les mots."}, {"id": "rev_d0_7", "chapter": "D0 — Introduction & méthode", "source": "Révision complète", "front": "Exemple de 1ère articulation", "back": "\"Chanteur\" = chant- (procès) + -eur (agent) : deux monèmes porteurs de sens."}, {"id": "rev_d0_8", "chapter": "D0 — Introduction & méthode", "source": "Révision complète", "front": "Exemple de 2ème articulation", "back": "/p/ vs /b/ dans \"pain\" / \"bain\" : pas de sens propre mais distinguent deux mots."}, {"id": "rev_d0_9", "chapter": "D0 — Introduction & méthode", "source": "Révision complète", "front": "Qu&#39;est-ce qu&#39;une paire minimale ?", "back": "Deux mots ne différant que par un phonème : \"son\" / \"ton\" → prouve que /s/ et /t/ sont deux phonèmes distincts."}, {"id": "rev_d0_10", "chapter": "D0 — Introduction & méthode", "source": "Révision complète", "front": "Définition de la commutation", "back": "Remplacement d&#39;un élément par un autre pour tester si le changement produit un changement de sens → permet d&#39;identifier des unités."}, {"id": "rev_d0_11", "chapter": "D0 — Introduction & méthode", "source": "Révision complète", "front": "À quoi sert la commutation ?", "back": "À isoler des unités : si le remplacement change le sens, les deux éléments sont des unités distinctes."}, {"id": "rev_d0_12", "chapter": "D0 — Introduction & méthode", "source": "Révision complète", "front": "Qu&#39;est-ce qu&#39;un morphème ?", "back": "Unité minimale porteuse de sens. Ex. \"in-\" dans \"invalide\" (négation), \"-eur\" dans \"chanteur\" (agent)."}, {"id": "rev_d0_13", "chapter": "D0 — Introduction & méthode", "source": "Révision complète", "front": "Qu&#39;est-ce qu&#39;un phonème ?", "back": "Unité minimale sans sens propre, mais qui permet de distinguer des mots. Ex. /p/ dans \"pain\"."}, {"id": "rev_d0_14", "chapter": "D0 — Introduction & méthode", "source": "Révision complète", "front": "Différence phonème / graphème", "back": "Phonème = unité sonore abstraite (/p/). Graphème = unité graphique (lettre ou groupe) ⟨p⟩ ou ⟨ph⟩."}, {"id": "rev_d0_15", "chapter": "D0 — Introduction & méthode", "source": "Révision complète", "front": "Qu&#39;est-ce qu&#39;un syntagme ?", "back": "Groupe de mots formant une unité syntaxique : GN (groupe nominal), GV (groupe verbal), etc."}, {"id": "rev_d0_16", "chapter": "D0 — Introduction & méthode", "source": "Révision complète", "front": "Qu&#39;est-ce qu&#39;une clause ?", "back": "Unité syntaxique maximale comportant un GN (sujet) et un GV (prédicat). Ex. \"La pluie tombe.\""}, {"id": "rev_d0_17", "chapter": "D0 — Introduction & méthode", "source": "Révision complète", "front": "Qui est Saussure ?", "back": "Ferdinand de Saussure (1857–1913), linguiste suisse, fondateur de la linguistique moderne. Définit le signe, l&#39;arbitraire, langue/parole."}, {"id": "rev_d0_18", "chapter": "D0 — Introduction & méthode", "source": "Révision complète", "front": "Qui est Martinet ?", "back": "André Martinet (1908–1999), linguiste français, auteur du principe de double articulation."}, {"id": "rev_d0_19", "chapter": "D0 — Introduction & méthode", "source": "Révision complète", "front": "Qu&#39;est-ce que la prédication ?", "back": "Acte langagier d&#39;introduire une entité (sujet) dans un procès (prédicat). Ex. \"Paul [entité] court [procès].\""}, {"id": "rev_d1_0", "chapter": "D1 — Phonétique & phonologie", "source": "Révision complète", "front": "Différence phonétique vs phonologie", "back": "Phonétique = sons réels (physique, [ ]). Phonologie = sons fonctionnels du système (/  /)."}, {"id": "rev_d1_1", "chapter": "D1 — Phonétique & phonologie", "source": "Révision complète", "front": "Qu&#39;est-ce qu&#39;un phonème ?", "back": "Unité sonore minimale et abstraite d&#39;une langue permettant de distinguer des mots (paire minimale)."}, {"id": "rev_d1_2", "chapter": "D1 — Phonétique & phonologie", "source": "Révision complète", "front": "Comment noter une transcription phonétique ?", "back": "Entre crochets droits : [pɛ̃]. Note tous les détails phonétiques."}, {"id": "rev_d1_3", "chapter": "D1 — Phonétique & phonologie", "source": "Révision complète", "front": "Comment noter une transcription phonologique ?", "back": "Entre barres obliques : /pɛ̃/. Note les phonèmes pertinents du système."}, {"id": "rev_d1_4", "chapter": "D1 — Phonétique & phonologie", "source": "Révision complète", "front": "Combien de voyelles en français standard ?", "back": "16 phonèmes vocaliques (dont 4 nasales : /ɛ̃/ /ɑ̃/ /ɔ̃/ /œ̃/)."}, {"id": "rev_d1_5", "chapter": "D1 — Phonétique & phonologie", "source": "Révision complète", "front": "Qu&#39;est-ce que le \"e caduc\" ?", "back": "/ə/ : voyelle instable qui peut ne pas être réalisée à l&#39;oral. Ex. \"le\" → [lə] ou [l]. Aussi appelé \"e muet\"."}, {"id": "rev_d1_6", "chapter": "D1 — Phonétique & phonologie", "source": "Révision complète", "front": "Transcrivez \"chat\"", "back": "/ʃa/ — 2 phonèmes. Le ⟨t⟩ final est muet (ne se transcrit pas)."}, {"id": "rev_d1_7", "chapter": "D1 — Phonétique & phonologie", "source": "Révision complète", "front": "Transcrivez \"femme\"", "back": "/fam/ — 3 phonèmes. Le ⟨e⟩ de \"femme\" réalise /a/ (irrégularité historique)."}, {"id": "rev_d1_8", "chapter": "D1 — Phonétique & phonologie", "source": "Révision complète", "front": "Transcrivez \"eau\"", "back": "/o/ — 1 phonème pour 3 lettres. Trigraphe graphique."}, {"id": "rev_d1_9", "chapter": "D1 — Phonétique & phonologie", "source": "Révision complète", "front": "Définition du trait de voisement", "back": "Les cordes vocales vibrent (sonore /b/, /d/, /v/) ou ne vibrent pas (sourd /p/, /t/, /f/)."}, {"id": "rev_d1_10", "chapter": "D1 — Phonétique & phonologie", "source": "Révision complète", "front": "Paire minimale prouvant /s/ ≠ /z/", "back": "\"poisson\" /pwasɔ̃/ vs \"poison\" /pwazɔ̃/."}, {"id": "rev_d1_11", "chapter": "D1 — Phonétique & phonologie", "source": "Révision complète", "front": "Qu&#39;est-ce qu&#39;une occlusive ?", "back": "Consonne produite par un blocage total de l&#39;air puis relâchement : /p/, /b/, /t/, /d/, /k/, /g/."}, {"id": "rev_d1_12", "chapter": "D1 — Phonétique & phonologie", "source": "Révision complète", "front": "Qu&#39;est-ce qu&#39;une fricative ?", "back": "Consonne produite par frottement de l&#39;air : /f/, /v/, /s/, /z/, /ʃ/, /ʒ/."}, {"id": "rev_d1_13", "chapter": "D1 — Phonétique & phonologie", "source": "Révision complète", "front": "Que signifie \"bilabial\" ?", "back": "Articulé avec les deux lèvres : /p/, /b/, /m/."}, {"id": "rev_d1_14", "chapter": "D1 — Phonétique & phonologie", "source": "Révision complète", "front": "Phonèmes nasaux du français", "back": "/m/, /n/, /ɲ/ (consonnes nasales) + /ɛ̃/ /ɑ̃/ /ɔ̃/ /œ̃/ (voyelles nasales)."}, {"id": "rev_d1_15", "chapter": "D1 — Phonétique & phonologie", "source": "Révision complète", "front": "Quelle est la différence entre /i/ et /y/ ?", "back": "/i/ = antérieure non arrondie (vie) ; /y/ = antérieure arrondie (rue). Même position de la langue, différence d&#39;arrondissement des lèvres."}, {"id": "rev_d1_16", "chapter": "D1 — Phonétique & phonologie", "source": "Révision complète", "front": "Comment se prononce \"gagne\" ?", "back": "/ɡaɲ/ — le graphème ⟨gn⟩ correspond au phonème /ɲ/ (nasale palatale)."}, {"id": "rev_d1_17", "chapter": "D1 — Phonétique & phonologie", "source": "Révision complète", "front": "Combien de phonèmes dans \"heureux\" ?", "back": "/øʁø/ — 3 phonèmes. Le ⟨x⟩ final est muet."}, {"id": "rev_d1_18", "chapter": "D1 — Phonétique & phonologie", "source": "Révision complète", "front": "Qu&#39;est-ce qu&#39;une semi-consonne ?", "back": "Sons intermédiaires entre voyelle et consonne : /j/ (yeux), /w/ (oui), /ɥ/ (nuit)."}, {"id": "rev_d1_19", "chapter": "D1 — Phonétique & phonologie", "source": "Révision complète", "front": "Que signifie \"uvulaire\" pour /ʁ/ ?", "back": "Le /ʁ/ français standard est articulé à la luette (uvule, fond de la gorge) — c&#39;est le \"r parisien\"."}, {"id": "rev_d2_0", "chapter": "D2 — Graphémique", "source": "Révision complète", "front": "Définition d&#39;un graphème", "back": "Plus petite unité de l&#39;écriture correspondant à un phonème (peut être 1, 2 ou 3 lettres)."}, {"id": "rev_d2_1", "chapter": "D2 — Graphémique", "source": "Révision complète", "front": "Différence graphème / lettre", "back": "Lettre = unité graphique simple (a, b, c...). Graphème = unité fonctionnelle (peut être ⟨ph⟩ = /f/, ⟨eau⟩ = /o/)."}, {"id": "rev_d2_2", "chapter": "D2 — Graphémique", "source": "Révision complète", "front": "Qu&#39;est-ce qu&#39;un digraphe ?", "back": "Graphème formé de 2 lettres : ⟨ch⟩ → /ʃ/, ⟨ph⟩ → /f/, ⟨ou⟩ → /u/."}, {"id": "rev_d2_3", "chapter": "D2 — Graphémique", "source": "Révision complète", "front": "Qu&#39;est-ce qu&#39;un trigraphe ?", "back": "Graphème formé de 3 lettres : ⟨eau⟩ → /o/, ⟨ain⟩ → /ɛ̃/."}, {"id": "rev_d2_4", "chapter": "D2 — Graphémique", "source": "Révision complète", "front": "Transcrivez \"château\"", "back": "/ʃɑto/ — 4 phonèmes. ⟨ch⟩=/ʃ/, ⟨â⟩=/ɑ/, ⟨t⟩=/t/, ⟨eau⟩=/o/. Lettres muettes : e, a, u dans ⟨eau⟩."}, {"id": "rev_d2_5", "chapter": "D2 — Graphémique", "source": "Révision complète", "front": "Quand ⟨c⟩ se prononce-t-il /s/ ?", "back": "Devant ⟨e⟩, ⟨i⟩, ⟨y⟩ : ciel /sjɛl/, ceci /səsi/, cycle /sikl/."}, {"id": "rev_d2_6", "chapter": "D2 — Graphémique", "source": "Révision complète", "front": "Quand ⟨s⟩ entre deux voyelles = /z/ ?", "back": "Ex. \"maison\" /mɛzɔ̃/, \"poison\" /pwazɔ̃/, \"raison\" /ʁɛzɔ̃/."}, {"id": "rev_d2_7", "chapter": "D2 — Graphémique", "source": "Révision complète", "front": "Que représente l&#39;apostrophe dans le poème de Rictus ?", "back": "La chute du e caduc facultatif à l&#39;oral. Elle indique une prononciation populaire parisienne."}, {"id": "rev_d2_8", "chapter": "D2 — Graphémique", "source": "Révision complète", "front": "Quand Rictus maintient-il le graphème ⟨e⟩ ?", "back": "1. En fin de vers (accent) ; 2. Avant voyelle (liaison) ; 3. Quand la chute créerait un groupe impossible (*Rlgl)."}, {"id": "rev_d2_9", "chapter": "D2 — Graphémique", "source": "Révision complète", "front": "Transcrivez \"femme\"", "back": "/fam/ — le graphème ⟨em⟩ de \"femme\" réalise /a/ (irrégularité historique)."}, {"id": "rev_d2_10", "chapter": "D2 — Graphémique", "source": "Révision complète", "front": "Combien de phonèmes dans \"yeux\" ?", "back": "/jø/ — 2 phonèmes : /j/ + /ø/. 4 lettres, 2 phonèmes."}, {"id": "rev_d2_11", "chapter": "D2 — Graphémique", "source": "Révision complète", "front": "Qu&#39;est-ce qu&#39;une lettre muette ?", "back": "Lettre qui ne correspond à aucun phonème réalisé : ⟨h⟩ dans \"heure\", ⟨s⟩ final dans \"gris\"."}, {"id": "rev_d2_12", "chapter": "D2 — Graphémique", "source": "Révision complète", "front": "Le ⟨h⟩ est-il toujours muet ?", "back": "Oui en français standard : /h/ aspiré n&#39;empêche que la liaison et l&#39;élision mais ne se prononce pas."}, {"id": "rev_d2_13", "chapter": "D2 — Graphémique", "source": "Révision complète", "front": "Transcrivez \"monsieur\"", "back": "/məsjø/ — irrégularité complète : ⟨on⟩ → /ə/, ⟨ie⟩ → /j/."}, {"id": "rev_d2_14", "chapter": "D2 — Graphémique", "source": "Révision complète", "front": "Que réalise le graphème ⟨gn⟩ ?", "back": "/ɲ/ (nasale palatale) : \"gagne\" /ɡaɲ/, \"montagne\" /mɔ̃taɲ/."}, {"id": "rev_d2_15", "chapter": "D2 — Graphémique", "source": "Révision complète", "front": "Transcrivez \"oignon\"", "back": "/ɔɲɔ̃/ — 4 phonèmes : ⟨oi⟩=/ɔ/, ⟨gn⟩=/ɲ/, ⟨on⟩=/ɔ̃/. Lettres muettes : ⟨i⟩ (dans ⟨oi⟩ selon analyse), ⟨g⟩."}, {"id": "rev_d2_16", "chapter": "D2 — Graphémique", "source": "Révision complète", "front": "Quelle est la particularité du graphème ⟨x⟩ ?", "back": "Peut réaliser /ks/ (taxi), /ɡz/ (examen), /s/ (dix), ou être muet (voix, paix)."}, {"id": "rev_d2_17", "chapter": "D2 — Graphémique", "source": "Révision complète", "front": "Qu&#39;est-ce qu&#39;une correspondance graphème-phonème (CGP) ?", "back": "Relation entre une unité graphique et le phonème qu&#39;elle réalise. Le français a des CGP irrégulières (polyphonie et polygraphie)."}, {"id": "rev_d2_18", "chapter": "D2 — Graphémique", "source": "Révision complète", "front": "Polyphonie : définition", "back": "Un même graphème peut représenter plusieurs phonèmes selon le contexte : ⟨c⟩ → /k/ ou /s/."}, {"id": "rev_d2_19", "chapter": "D2 — Graphémique", "source": "Révision complète", "front": "Polygraphie : définition", "back": "Un même phonème peut s&#39;écrire de plusieurs façons : /o/ → ⟨o⟩, ⟨au⟩, ⟨eau⟩, ⟨ô⟩."}, {"id": "rev_d3_0", "chapter": "D3 — Morphologie", "source": "Révision complète", "front": "Définition du morphème", "back": "Plus petite unité de la langue porteuse de sens. Ex. \"chat\" (1 morphème), \"chat-s\" (2 : base + pluriel)."}, {"id": "rev_d3_1", "chapter": "D3 — Morphologie", "source": "Révision complète", "front": "Morphème libre vs lié", "back": "Libre = peut s&#39;employer seul (chat, vite). Lié = ne peut exister sans base (-eur, in-, -s pluriel)."}, {"id": "rev_d3_2", "chapter": "D3 — Morphologie", "source": "Révision complète", "front": "Définition de la dérivation", "back": "Formation d&#39;un mot par ajout d&#39;affixes (préfixe ou suffixe) à une base : in- + valid + -ation = \"invalidation\"."}, {"id": "rev_d3_3", "chapter": "D3 — Morphologie", "source": "Révision complète", "front": "Définition de la composition", "back": "Formation d&#39;un mot par association de deux bases : \"porte-monnaie\" (fr.), \"démocratie\" (savante : démo- + -cratie)."}, {"id": "rev_d3_4", "chapter": "D3 — Morphologie", "source": "Révision complète", "front": "Différence dérivation / composition", "back": "Dérivation : base + affixe (lié) ; composition : base + base (deux éléments porteurs de sens)."}, {"id": "rev_d3_5", "chapter": "D3 — Morphologie", "source": "Révision complète", "front": "Qu&#39;est-ce qu&#39;un préfixe ?", "back": "Morphème lié placé AVANT la base : in-valide, ré-écrire, dé-faire."}, {"id": "rev_d3_6", "chapter": "D3 — Morphologie", "source": "Révision complète", "front": "Qu&#39;est-ce qu&#39;un suffixe ?", "back": "Morphème lié placé APRÈS la base : chant-eur, valid-ation, rapid-ité."}, {"id": "rev_d3_7", "chapter": "D3 — Morphologie", "source": "Révision complète", "front": "Valeur du suffixe -eur", "back": "Forme un nom d&#39;agent (qui fait l&#39;action) à partir d&#39;un verbe : chanteur (qui chante), lecteur (qui lit)."}, {"id": "rev_d3_8", "chapter": "D3 — Morphologie", "source": "Révision complète", "front": "Valeur du suffixe -ation", "back": "Forme un nom de processus ou de résultat à partir d&#39;un verbe : validation (action de valider)."}, {"id": "rev_d3_9", "chapter": "D3 — Morphologie", "source": "Révision complète", "front": "Valeur du suffixe -ique", "back": "Forme un adjectif signifiant \"relatif à X\" à partir d&#39;un nom : démocrat-ique (relatif à la démocratie)."}, {"id": "rev_d3_10", "chapter": "D3 — Morphologie", "source": "Révision complète", "front": "Valeur du préfixe in-", "back": "Négation ou inversion : invalide (non valide), impossible, irréel. Aussi intensif parfois."}, {"id": "rev_d3_11", "chapter": "D3 — Morphologie", "source": "Révision complète", "front": "Qu&#39;est-ce qu&#39;un mot-valise ?", "back": "Fusion de deux mots partageant un tronçon commun : démocrature = démocratie + dictature."}, {"id": "rev_d3_12", "chapter": "D3 — Morphologie", "source": "Révision complète", "front": "Analyser \"démocrature\"", "back": "Mot-valise : DÉMOCRAtie (apocope) + dicTATURE (aphérèse). Tronçon partagé : /at/. Désigne un hybride démocratie-dictature."}, {"id": "rev_d3_13", "chapter": "D3 — Morphologie", "source": "Révision complète", "front": "Qu&#39;est-ce qu&#39;une apocope ?", "back": "Troncation de la fin d&#39;un mot : \"démo\" ← démocratie, \"prof\" ← professeur."}, {"id": "rev_d3_14", "chapter": "D3 — Morphologie", "source": "Révision complète", "front": "Qu&#39;est-ce qu&#39;une aphérèse ?", "back": "Troncation du début d&#39;un mot : \"-crature\" dans démocrature provient de di-CTATURE (début supprimé)."}, {"id": "rev_d3_15", "chapter": "D3 — Morphologie", "source": "Révision complète", "front": "Qu&#39;est-ce que la conversion ?", "back": "Changement de catégorie grammaticale sans ajout d&#39;affixe : \"le lever\" (N) ← \"lever\" (V)."}, {"id": "rev_d3_16", "chapter": "D3 — Morphologie", "source": "Révision complète", "front": "Composition savante : définition", "back": "Composition utilisant des bases liées d&#39;origine greco-latine : photo-graphie (photo=lumière + graphie=écriture)."}, {"id": "rev_d3_17", "chapter": "D3 — Morphologie", "source": "Révision complète", "front": "Analyser \"photographier\"", "back": "Photo- (lumière, grec) + -graph- (écrire, grec) + -ier (suffixe verbal) → \"qui enregistre par la lumière\"."}, {"id": "rev_d3_18", "chapter": "D3 — Morphologie", "source": "Révision complète", "front": "Qu&#39;est-ce que le champ sémantique ?", "back": "Ensemble des mots (lexèmes) qui se rapportent à une même réalité ou concept dans un texte."}, {"id": "rev_d3_19", "chapter": "D3 — Morphologie", "source": "Révision complète", "front": "Champ sémantique de \"démocrature\" dans le texte", "back": "Champ du politique : totalitarisme, tyrannie, régime, élections, candidats, vote, dépouillement, parti-État, urnes, électoral."}, {"id": "rev_d4_0", "chapter": "D4 — Clause canonique", "source": "Révision complète", "front": "Définition de la valence verbale", "back": "Aptitude du verbe à imposer à son entourage des configurations syntaxiques et des rôles sémantiques. Détermine le nombre d&#39;actants, leur construction et leur rôle sémantique."}, {"id": "rev_d4_1", "chapter": "D4 — Clause canonique", "source": "Révision complète", "front": "Définition d&#39;un actant (Tesnière)", "back": "Être ou chose participant au procès signifié par le verbe, à quelque titre que ce soit (agent, patient, bénéficiaire…). Inclut même les entités passives."}, {"id": "rev_d4_2", "chapter": "D4 — Clause canonique", "source": "Révision complète", "front": "Verbe monovalent — définition et exemple", "back": "Ne réclame qu&#39;un seul actant (le sujet). Ex. : Le soleil brille. La nuit tombe. Elle pédale. Pas de COD ni COI possible en langue (même si la parole peut les ajouter par sur-valence)."}, {"id": "rev_d4_3", "chapter": "D4 — Clause canonique", "source": "Révision complète", "front": "Verbe divalent — définition et exemple", "back": "Réclame deux actants : sujet + COD ou COI. Ex. : Leila a cassé le plafonnier (S+COD). Simon habite à Berlin (S+COI locatif)."}, {"id": "rev_d4_4", "chapter": "D4 — Clause canonique", "source": "Révision complète", "front": "Verbe trivalent — définition et exemple", "back": "Réclame trois actants : sujet + COD + COI. Ex. : J&#39;ai donné un livre à ma sœur (S+COD+COI). Rudolf offre les cafés aux collègues."}, {"id": "rev_d4_5", "chapter": "D4 — Clause canonique", "source": "Révision complète", "front": "Verbe avalent — définition et exemple", "back": "Ne réclame aucun actant réel. Le \"il\" est vide (indice de 3ème pers.). Ex. : Il pleut, il neige, il fait beau. Ce ne sont pas des actants."}, {"id": "rev_d4_6", "chapter": "D4 — Clause canonique", "source": "Révision complète", "front": "Rôle actantiel : agent", "back": "Animé instigateur ou contrôleur du procès ; typiquement sujet d&#39;un verbe d&#39;action. Ex. Gustave écrit. Se distingue du siège par l&#39;initiative."}, {"id": "rev_d4_7", "chapter": "D4 — Clause canonique", "source": "Révision complète", "front": "Rôle actantiel : siège", "back": "Entité (animée) où se manifeste un état sans initiative. Ex. Virginie aime Paul. Gustave jubile. Pas de contrôle sur le procès."}, {"id": "rev_d4_8", "chapter": "D4 — Clause canonique", "source": "Révision complète", "front": "Distinction agent vs siège", "back": "Agent = contrôle le procès (écouter, réfléchir). Siège = subit un état (entendre, aimer, hésiter). Paire minimale : écouter (agent) vs entendre (siège)."}, {"id": "rev_d4_9", "chapter": "D4 — Clause canonique", "source": "Révision complète", "front": "Rôle actantiel : bénéficiaire", "back": "Animé affecté positivement ou négativement par les retombées du procès. Typiquement 3ème actant d&#39;un verbe trivalent de transfert. Ex. Gustave donne un sou au mendiant."}, {"id": "rev_d4_10", "chapter": "D4 — Clause canonique", "source": "Révision complète", "front": "Rôle actantiel : résultatif", "back": "Entité produite au terme du procès (n&#39;existait pas avant). Ex. Gustave a écrit des chefs-d&#39;œuvre. ≠ patient (qui préexiste au procès)."}, {"id": "rev_d4_11", "chapter": "D4 — Clause canonique", "source": "Révision complète", "front": "Sous-valence — définition", "back": "En discours, le verbe a une valence inférieure à celle prévue en langue. Ex. \"elle dédaigne\" (dédaigner = divalent en langue, mais employé sans COD ici)."}, {"id": "rev_d4_12", "chapter": "D4 — Clause canonique", "source": "Révision complète", "front": "Sur-valence — définition", "back": "En discours, le verbe a une valence supérieure à celle prévue en langue. Ex. \"Les cigales grinçaient leur chanson\" (grince = monovalent + COD = sur-valence stylistique)."}, {"id": "rev_d4_13", "chapter": "D4 — Clause canonique", "source": "Révision complète", "front": "Datif éthique — définition et exemple", "back": "Pronom de 2ème personne (te, vous) impliqué comme témoin sans rôle actantiel ordinaire. Ex. \"Il te lui a mis une bonne baffe !\" — te = témoin rhétorique."}, {"id": "rev_d4_14", "chapter": "D4 — Clause canonique", "source": "Révision complète", "front": "Datif étendu — définition et exemple", "back": "Actant impliqué indirectement par le procès, sans être valenciel au sens strict. Ex. \"Vous me ferez du riz de veau\" — me = bénéficiaire étendu."}, {"id": "rev_d4_15", "chapter": "D4 — Clause canonique", "source": "Révision complète", "front": "Comment identifier le COD ?", "back": "1. Sans préposition. 2. Pronominalisable en le/la/les. 3. Peut devenir sujet du passif. 4. Répond à \"que… ?\" ou \"quoi… ?\"."}, {"id": "rev_d4_16", "chapter": "D4 — Clause canonique", "source": "Révision complète", "front": "Comment identifier le COI ?", "back": "1. Avec préposition à ou de. 2. Ne peut pas devenir sujet du passif. 3. Pronominalisé en lui/leur ou en/y. 4. Répond à \"à qui… ?\" ou \"de quoi… ?\"."}, {"id": "rev_d4_17", "chapter": "D4 — Clause canonique", "source": "Révision complète", "front": "Attribut du sujet — définition", "back": "Propriété/état/catégorisation assignée au sujet par un verbe copulatif (être, sembler, devenir, rester…). S&#39;accorde avec le sujet. Ex. Pierre est gentil."}, {"id": "rev_d4_18", "chapter": "D4 — Clause canonique", "source": "Révision complète", "front": "C valentiel vs circonstanciel — distinction", "back": "Valenciel : exigé par le sens du verbe (Simon habite *→ à Berlin obligatoire). Circonstanciel : facultatif, cadre la clause sans être requis (Il travaille *à Berlin → optionnel)."}, {"id": "rev_d4_19", "chapter": "D4 — Clause canonique", "source": "Révision complète", "front": "Même rôle actantiel, fonctions différentes ?", "back": "Oui ! Ex. bénéficiaire : \"Jean donne une pomme à Paul\" (COI) vs \"Paul reçoit une pomme\" (sujet). Même rôle sémantique, fonctions grammaticales différentes."}, {"id": "rev_d5_0", "chapter": "D5 — Ordre & Dynamique informationnelle", "source": "Révision complète", "front": "Définition du thème (TH)", "back": "Ce dont parle le locuteur ; point de départ informationnel ; souvent information déjà connue. Occupe généralement la position initiale. Hors de portée de la négation."}, {"id": "rev_d5_1", "chapter": "D5 — Ordre & Dynamique informationnelle", "source": "Révision complète", "front": "Définition du rhème (RH)", "back": "Apport d&#39;information nouveau concernant le thème ; ce qu&#39;on dit du thème ; but du mouvement informationnel. En position finale typiquement. Sous portée de la négation."}, {"id": "rev_d5_2", "chapter": "D5 — Ordre & Dynamique informationnelle", "source": "Révision complète", "front": "Test du rhème : \"et pas autre chose\"", "back": "On ajoute \"et pas autre chose\" après un segment ; si l&#39;énoncé reste acceptable, ce segment est le rhème. Ex. \"Il apporte les livres et pas autre chose\" → les livres = rhème."}, {"id": "rev_d5_3", "chapter": "D5 — Ordre & Dynamique informationnelle", "source": "Révision complète", "front": "Test de la négation pour TH/RH", "back": "Ce qui est hors de portée de la négation = thème. Ex. \"Gustave ne rapporte pas les livres\" → Gustave (non nié) = thème ; les livres = rhème."}, {"id": "rev_d5_4", "chapter": "D5 — Ordre & Dynamique informationnelle", "source": "Révision complète", "front": "Structure de la clause canonique (DI)", "back": "TH = GN sujet (position initiale, info connue). RH = GV prédicat (position finale, apport). Ordre logique : du connu vers le nouveau."}, {"id": "rev_d5_5", "chapter": "D5 — Ordre & Dynamique informationnelle", "source": "Révision complète", "front": "Définition de la clause inversée", "back": "Clause avec ordre C-V-S : circonstant en tête (thème), verbe, sujet postposé (rhème). Réservée aux verbes monovalents. Présente une entité nouvelle dans un cadre connu."}, {"id": "rev_d5_6", "chapter": "D5 — Ordre & Dynamique informationnelle", "source": "Révision complète", "front": "Conditions de la clause inversée", "back": "1. Verbe monovalent. 2. Zone préverbale souvent occupée par un circonstant. 3. Sujet = entité nouvelle non encore identifiée. 4. Verbe d&#39;existence ou de mouvement."}, {"id": "rev_d5_7", "chapter": "D5 — Ordre & Dynamique informationnelle", "source": "Révision complète", "front": "Effet stylistique de la clause inversée", "back": "Présente l&#39;entité nouvelle en position finale (rhématique). Fréquent chez Balzac (descriptions) et dans les récits d&#39;irruption soudaine. Peut indiquer un point de vue interne."}, {"id": "rev_d5_8", "chapter": "D5 — Ordre & Dynamique informationnelle", "source": "Révision complète", "front": "Définition de la clause clivée", "back": "C&#39;est [RH] + relative [TH]. Un constituant est extrait et mis en relief comme focus (attribut de être). La relative rappelle l&#39;info connue. Ex. C&#39;est par hasard qu&#39;il était là."}, {"id": "rev_d5_9", "chapter": "D5 — Ordre & Dynamique informationnelle", "source": "Révision complète", "front": "Quels constituants peut-on cliver ?", "back": "Tout constituant régi : COD, COI, circonstants, attributs. Ex. \"C&#39;est par hasard qu&#39;il était là\" (circonstant). \"C&#39;est à Paul que j&#39;ai parlé\" (COI)."}, {"id": "rev_d5_10", "chapter": "D5 — Ordre & Dynamique informationnelle", "source": "Révision complète", "front": "Question implicite de la clivée", "back": "La clivée répond à une question du type \"qui/qu&#39;est-ce qui [prédicat de la relative] ?\" Ex. \"C&#39;est Gustave qui écrit\" → réponse à \"Qui écrit ?\" Focus = Gustave."}, {"id": "rev_d5_11", "chapter": "D5 — Ordre & Dynamique informationnelle", "source": "Révision complète", "front": "Définition de la clause pseudo-clivée", "back": "Ce [relative] / c&#39;est [RH]. Segment gauche = catégorisation sans identification → tension. Segment droit = identification → rhème. Ex. \"Ce qui me tourmente, c&#39;est le style.\""}, {"id": "rev_d5_12", "chapter": "D5 — Ordre & Dynamique informationnelle", "source": "Révision complète", "front": "Différence clivée vs pseudo-clivée", "back": "Clivée : RH avant, TH après dans relative. Pseudo-clivée : TH avant (catégorisation), RH après (identification). La pseudo-clivée crée une tension avant la révélation."}, {"id": "rev_d5_13", "chapter": "D5 — Ordre & Dynamique informationnelle", "source": "Révision complète", "front": "Clause à présentatif : DI", "back": "Tout rhématique : pas de thème. \"C&#39;est mon chien\" (déictique) = toute l&#39;information est nouvelle. ≠ clivée (bipartite). Valeur : pointer vers un objet de la situation."}, {"id": "rev_d5_14", "chapter": "D5 — Ordre & Dynamique informationnelle", "source": "Révision complète", "front": "Clause impersonnelle : DI", "back": "Le \"il\" est vide ; la clause est tout rhématique. Ex. \"Il est arrivé un malheur\" → \"un malheur\" = rhème (info entièrement nouvelle). Apparentée au présentatif."}, {"id": "rev_d5_15", "chapter": "D5 — Ordre & Dynamique informationnelle", "source": "Révision complète", "front": "Différence clivée vs présentatif (\"C&#39;est le médecin...\")", "back": "Clivée si la relative est thème connu (réponse à \"Qui t&#39;a fait venir ?\"). Présentatif si tout est rhématique (on pointe vers quelqu&#39;un). Le contexte est décisif."}, {"id": "rev_d5_16", "chapter": "D5 — Ordre & Dynamique informationnelle", "source": "Révision complète", "front": "Qu&#39;est-ce que le focus ?", "back": "Élément le plus rhématisé, recevant l&#39;accent informatif maximal. Dans une clivée : attribut de c&#39;est. Dans l&#39;ordre canonique : élément final. À l&#39;oral : marqué par l&#39;accent de hauteur."}, {"id": "rev_d5_17", "chapter": "D5 — Ordre & Dynamique informationnelle", "source": "Révision complète", "front": "Effet de la clause inversée dans les descriptions de Balzac", "back": "Les entités décrites (statues, cours, boîtes) sont placées en position rhématique. Le verbe (règne, s&#39;élève) est introducteur d&#39;existence, pas l&#39;enjeu principal. Convient à la description inventoriante."}, {"id": "rev_d5_18", "chapter": "D5 — Ordre & Dynamique informationnelle", "source": "Révision complète", "front": "Clause tout rhématique : définition", "back": "Clause sans thème : toute l&#39;information est nouvelle. Ex. Il pleut (impersonnel), Voici une lettre (présentatif), clauses averbales existentielles (Tiens, un revenant !)."}, {"id": "rev_d5_19", "chapter": "D5 — Ordre & Dynamique informationnelle", "source": "Révision complète", "front": "Pseudo-clivée : effet de tension", "back": "Le segment \"Ce qui/que…\" catégorise un référent sans l&#39;identifier → manque → tension informative → attente du destinataire. Le segment \"c&#39;est…\" comble l&#39;attente par l&#39;identification."}, {"id": "rev_d6_0", "chapter": "D6 — Types de clauses", "source": "Révision complète", "front": "Définition de la clause averbale", "back": "Clause effectuant une prédication sans verbe conjugué. N&#39;est pas une ellipse. Sémantique : coïncide avec les valeurs du verbe être (attribution, existence, localisation)."}, {"id": "rev_d6_1", "chapter": "D6 — Types de clauses", "source": "Révision complète", "front": "Types de clauses averbales", "back": "Attributive (2 termes : préd+support / 1 terme : préd seul), locative, existentielle, thétique. Ex. \"Délicieux, ton café !\" (attr.) / \"Tiens, un revenant !\" (exist.)"}, {"id": "rev_d6_2", "chapter": "D6 — Types de clauses", "source": "Révision complète", "front": "Effet 1 de l&#39;absence de verbe : expressivité", "back": "Moins il y a de structure grammaticale, plus l&#39;émotion est brute (Guillaume). La CA peut exprimer des états émotionnels intenses sans les médiatiser par un verbe. Ex. \"Quel idiot !\""}, {"id": "rev_d6_3", "chapter": "D6 — Types de clauses", "source": "Révision complète", "front": "Effet 2 de l&#39;absence de verbe : endophasie", "back": "Monologue intérieur, notation de perceptions brutes : la CA mime la pensée non formulée verbalement. Ex. Dujardin : \"La rue. Des passants. Un café ouvert.\""}, {"id": "rev_d6_4", "chapter": "D6 — Types de clauses", "source": "Révision complète", "front": "Effet 3 de l&#39;absence de verbe : intemporalité", "back": "Sans verbe conjugué, pas d&#39;ancrage temporel. Convient aux vérités générales, proverbes, titres. Ex. \"Tel père, tel fils.\" \"Heureux les simples d&#39;esprit.\""}, {"id": "rev_d6_5", "chapter": "D6 — Types de clauses", "source": "Révision complète", "front": "Définition de la clause infinitive", "back": "Clause avec verbe non conjugué (infinitif). Procès non actualisé : pas d&#39;ancrage temporel ni personnel. Sujet applicable à tous les locuteurs en situation."}, {"id": "rev_d6_6", "chapter": "D6 — Types de clauses", "source": "Révision complète", "front": "Valeur exclamative de la CI", "back": "Exprime l&#39;émotion suscitée par l&#39;action virtuelle (jugée inacceptable ou surprenante). Ex. \"Moi, manger des insectes !\" = indignation."}, {"id": "rev_d6_7", "chapter": "D6 — Types de clauses", "source": "Révision complète", "front": "Valeur délibérative de la CI", "back": "Interroge sur la réalité de l&#39;action (hésitation). Ex. \"Se mettre au sport ? Arrêter de fumer ?\" Souvent avec point d&#39;interrogation."}, {"id": "rev_d6_8", "chapter": "D6 — Types de clauses", "source": "Révision complète", "front": "Valeur instructionnelle de la CI", "back": "Action à effectuer, applicable à tous. Ex. \"Ne pas toucher.\" \"Ralentir : travaux.\" Registre : notices, panneaux, recettes."}, {"id": "rev_d6_9", "chapter": "D6 — Types de clauses", "source": "Révision complète", "front": "Définition de la clause à présentatif", "back": "Présentatif + GN. Réfère de façon déictique à un objet de la situation. Tout rhématique. Dans le récit : indice de point de vue interne."}, {"id": "rev_d6_10", "chapter": "D6 — Types de clauses", "source": "Révision complète", "front": "Quatre présentatifs principaux", "back": "c&#39;est (identification), voici (proximité), voilà (distance/événement), il y a (existence). Ex. Voilà qu&#39;il se met à neiger ! (événement soudain)."}, {"id": "rev_d6_11", "chapter": "D6 — Types de clauses", "source": "Révision complète", "front": "DI de la clause à présentatif", "back": "Tout rhématique : pas de thème. Toute l&#39;information est nouvelle. Présente une entité ou un événement à l&#39;attention du destinataire."}, {"id": "rev_d6_12", "chapter": "D6 — Types de clauses", "source": "Révision complète", "front": "Définition du passif", "back": "Construction où le patient (COD en actif) devient sujet, et l&#39;agent (sujet en actif) devient complément agent (par/de), optionnel. Ex. La souris est mangée par le chat."}, {"id": "rev_d6_13", "chapter": "D6 — Types de clauses", "source": "Révision complète", "front": "Trois effets pragmatiques du passif", "back": "1. Effacement de l&#39;agent (responsabilité masquée). 2. Mise en relief du patient (topicalisation). 3. Continuité thématique : le patient devenu sujet = thème."}, {"id": "rev_d6_14", "chapter": "D6 — Types de clauses", "source": "Révision complète", "front": "Clause impersonnelle : structure et DI", "back": "\"Il\" référentiellement vide ; GN plein en position post-verbale = rhème. Tout rhématique. Ex. \"Il est arrivé un malheur\" → un malheur = info entièrement nouvelle."}, {"id": "rev_d6_15", "chapter": "D6 — Types de clauses", "source": "Révision complète", "front": "Pronominal réfléchi", "back": "Le sujet est à la fois agent et patient. Ex. \"Il se lave.\" = Il lave lui-même (son corps). Se est COD référant au sujet."}, {"id": "rev_d6_16", "chapter": "D6 — Types de clauses", "source": "Révision complète", "front": "Pronominal réciproque", "back": "Deux sujets exercent l&#39;action l&#39;un sur l&#39;autre. Ex. \"Ils se parlent.\" = A parle à B ET B parle à A. Requiert sujet pluriel ou coordonné."}, {"id": "rev_d6_17", "chapter": "D6 — Types de clauses", "source": "Révision complète", "front": "Pronominal passif", "back": "Le sujet est patient sans agent exprimé. Ex. \"Ça se mange froid.\" = C&#39;est mangé froid. Similaire au passif en termes de valence et de DI."}, {"id": "rev_d6_18", "chapter": "D6 — Types de clauses", "source": "Révision complète", "front": "Pronominal neutre / lexical", "back": "Le \"se\" est partie intégrante du lexème verbal, sans valeur séparable. Ex. \"Il s&#39;endort.\" \"Il s&#39;enfuit.\" On ne peut pas dire *\"il endort lui-même\"."}, {"id": "rev_d6_19", "chapter": "D6 — Types de clauses", "source": "Révision complète", "front": "Comment distinguer les valeurs du pronominal ?", "back": "Test de la paraphrase : réflexif → \"X fait [V] à lui-même\". Réciproque → \"X fait [V] à Y et Y à X\". Passif → \"X est [V] (sans agent)\". Neutre → aucune paraphrase ne tient."}, {"id": "rev_d7_0", "chapter": "D7 — Extensions du groupe nominal", "source": "Révision complète", "front": "Définition de l&#39;épithète intégrée", "back": "Adjectif rattaché directement au nom-tête, sans virgule : \"une belle maison\" (antéposée), \"une maison rouge\" (postposée)."}, {"id": "rev_d7_1", "chapter": "D7 — Extensions du groupe nominal", "source": "Révision complète", "front": "Valeur de l&#39;épithète postposée", "back": "Valeur classifiante, objective, descriptive : \"une voiture rouge\" distingue parmi toutes les voitures."}, {"id": "rev_d7_2", "chapter": "D7 — Extensions du groupe nominal", "source": "Révision complète", "front": "Valeur de l&#39;épithète antéposée", "back": "Valeur subjective, affective, expressive : \"une belle journée\" exprime le jugement du locuteur."}, {"id": "rev_d7_3", "chapter": "D7 — Extensions du groupe nominal", "source": "Révision complète", "front": "Exemple d&#39;opposition antéposé/postposé qui change le sens", "back": "\"un grand homme\" (remarquable) ≠ \"un homme grand\" (de haute taille)."}, {"id": "rev_d7_4", "chapter": "D7 — Extensions du groupe nominal", "source": "Révision complète", "front": "Définition de l&#39;épithète détachée", "back": "Adjectif séparé du GN par une virgule, à valeur prédicative secondaire (cause, temps, manière, concession)."}, {"id": "rev_d7_5", "chapter": "D7 — Extensions du groupe nominal", "source": "Révision complète", "front": "Exemple d&#39;épithète détachée causale", "back": "\"Épuisé, il s&#39;endormit.\" = parce qu&#39;il était épuisé."}, {"id": "rev_d7_6", "chapter": "D7 — Extensions du groupe nominal", "source": "Révision complète", "front": "Définition de l&#39;apposition", "back": "GN séparé par virgule qui identifie ou reformule le référent d&#39;un autre GN : \"Paris, la Ville Lumière\"."}, {"id": "rev_d7_7", "chapter": "D7 — Extensions du groupe nominal", "source": "Révision complète", "front": "Critère pour distinguer apposition et épithète détachée", "back": "Catégorie grammaticale : épithète détachée = ADJECTIF ; apposition = GN (nom ou équivalent)."}, {"id": "rev_d7_8", "chapter": "D7 — Extensions du groupe nominal", "source": "Révision complète", "front": "Définition de la construction absolue", "back": "Syntagme détaché (GN + participe/adjectif) sans verbe conjugué, à valeur circonstancielle."}, {"id": "rev_d7_9", "chapter": "D7 — Extensions du groupe nominal", "source": "Révision complète", "front": "Exemple de construction absolue temporelle", "back": "\"La nuit tombée, ils rentrèrent.\" = quand la nuit fut tombée."}, {"id": "rev_d7_10", "chapter": "D7 — Extensions du groupe nominal", "source": "Révision complète", "front": "Comment identifier une construction absolue", "back": "Chercher un GN suivi d&#39;un participe, détaché par virgule, dont le sujet est le GN lui-même (pas le sujet de la principale)."}, {"id": "rev_d7_11", "chapter": "D7 — Extensions du groupe nominal", "source": "Révision complète", "front": "Définition du complément du nom", "back": "GN introduit par une préposition (souvent de) qui caractérise le nom-tête : \"la maison de mes parents\"."}, {"id": "rev_d7_12", "chapter": "D7 — Extensions du groupe nominal", "source": "Révision complète", "front": "Valeurs du CN en \"de\"", "back": "Possession (maison de Pierre), matière (vase de cristal), qualité (idée de génie), origine (vin de Bordeaux)."}, {"id": "rev_d7_13", "chapter": "D7 — Extensions du groupe nominal", "source": "Révision complète", "front": "Différence relative déterminative / explicative", "back": "Déterminative (sans virgule) : restreint la référence. Explicative (avec virgule) : ajoute une info sans restreindre."}, {"id": "rev_d7_14", "chapter": "D7 — Extensions du groupe nominal", "source": "Révision complète", "front": "Exemple illustrant la différence déterminative/explicative", "back": "\"Les étudiants qui travaillent réussissent\" (seuls ceux qui travaillent) vs \"Les étudiants, qui travaillent, réussissent\" (tous travaillent)."}, {"id": "rev_d7_15", "chapter": "D7 — Extensions du groupe nominal", "source": "Révision complète", "front": "Fonction du pronom relatif \"dont\"", "back": "Remplace un CN (complément du nom) ou un COI : \"le livre dont je t&#39;ai parlé\" = je t&#39;ai parlé de ce livre."}, {"id": "rev_d7_16", "chapter": "D7 — Extensions du groupe nominal", "source": "Révision complète", "front": "L&#39;épithète détachée peut-elle se déplacer ?", "back": "Oui, elle est mobile : \"Épuisé, il dormit\" / \"Il dormit, épuisé\" / \"Il dormit, épuisé par sa journée\"."}, {"id": "rev_d7_17", "chapter": "D7 — Extensions du groupe nominal", "source": "Révision complète", "front": "Construction absolue vs épithète détachée : différence formelle", "back": "CA = GN + participe (deux éléments) : \"Les yeux fermés, il rêvait.\" Épithète détachée = adjectif seul : \"Épuisé, il dormit.\""}, {"id": "rev_d7_18", "chapter": "D7 — Extensions du groupe nominal", "source": "Révision complète", "front": "Effet stylistique de l&#39;épithète détachée dans un récit", "back": "Densification narrative : condense deux informations en une, crée du rythme, suggère une relation causale ou temporelle implicite."}, {"id": "rev_d7_19", "chapter": "D7 — Extensions du groupe nominal", "source": "Révision complète", "front": "Effet de la relative explicative dans un récit", "back": "Ajoute un commentaire du narrateur sur un référent déjà identifié, sans modifier qui est visé."}, {"id": "rev_d7_20", "chapter": "D7 — Extensions du groupe nominal", "source": "Révision complète", "front": "Qu&#39;est-ce qu&#39;un GN étendu ?", "back": "GN augmenté d&#39;une ou plusieurs extensions : \"Les vieilles maisons de pierre noircies par le temps\"."}, {"id": "rev_d7_21", "chapter": "D7 — Extensions du groupe nominal", "source": "Révision complète", "front": "Pronom relatif \"où\" : valeur", "back": "Lieu ou temps : \"la ville où il vit\" (lieu) ; \"le jour où il arriva\" (temps)."}, {"id": "rev_d7_22", "chapter": "D7 — Extensions du groupe nominal", "source": "Révision complète", "front": "Peut-on cumuler plusieurs extensions sur un même nom ?", "back": "Oui : \"Les vieilles [épith. antép.] maisons [N] de pierre [CN], noircies par le temps [épith. détachée], qui bordaient la rue [relative].\""}, {"id": "rev_d7_23", "chapter": "D7 — Extensions du groupe nominal", "source": "Révision complète", "front": "Différence apposition vs CN", "back": "Apposition = virgule + GN sans préposition. CN = sans virgule + préposition (de, à…)."}, {"id": "rev_d7_24", "chapter": "D7 — Extensions du groupe nominal", "source": "Révision complète", "front": "L&#39;adjectif dans la construction absolue est-il une épithète ?", "back": "Non. Dans \"Les yeux grands ouverts\", \"grands ouverts\" n&#39;est pas une épithète du GN principal, c&#39;est une construction absolue (mini-syntagme autonome)."}, {"id": "rev_d8_0", "chapter": "D8 — Extensions du GV (circonstants)", "source": "Révision complète", "front": "Définition du circonstant", "back": "Complément libre du GV, non exigé par la valence du verbe, ajoutant un cadrage sémantique (lieu, temps, manière, cause, but…)."}, {"id": "rev_d8_1", "chapter": "D8 — Extensions du GV (circonstants)", "source": "Révision complète", "front": "Test de suppression pour identifier un circonstant", "back": "Supprimer le complément : si la clause reste grammaticale, c&#39;est un circonstant ; si elle devient agrammaticale, c&#39;est un actant."}, {"id": "rev_d8_2", "chapter": "D8 — Extensions du GV (circonstants)", "source": "Révision complète", "front": "Test de déplacement en tête", "back": "Le circonstant peut être déplacé en tête de clause sans rendre la phrase agrammaticale : \"À Paris, il mange.\" ✓"}, {"id": "rev_d8_3", "chapter": "D8 — Extensions du GV (circonstants)", "source": "Révision complète", "front": "Circonstant de lieu vs actant de lieu", "back": "Actant avec habiter/aller/*vivre : \"Simon habite à Berlin\" (*Simon habite). Circonstant avec manger : \"Il mange à Berlin\" → \"Il mange.\" (correct)"}, {"id": "rev_d8_4", "chapter": "D8 — Extensions du GV (circonstants)", "source": "Révision complète", "front": "Qu&#39;est-ce qu&#39;un gérondif ?", "back": "Forme verbale : en + participe présent (en travaillant, en chantant). Valeur : manière, simultanéité, condition ou cause."}, {"id": "rev_d8_5", "chapter": "D8 — Extensions du GV (circonstants)", "source": "Révision complète", "front": "Contrainte du gérondif", "back": "Le sujet du gérondif DOIT être le même que le sujet du verbe principal. Sinon = anacoluthe."}, {"id": "rev_d8_6", "chapter": "D8 — Extensions du GV (circonstants)", "source": "Révision complète", "front": "Valeur DI d&#39;un circonstant en tête de clause", "back": "Thème cadre : le circonstant délimite le cadre spatial/temporel/logique de la prédication principale."}, {"id": "rev_d8_7", "chapter": "D8 — Extensions du GV (circonstants)", "source": "Révision complète", "front": "Valeur DI d&#39;un circonstant en fin de clause", "back": "Rhème : information nouvelle, accentuée, la plus importante de la clause."}, {"id": "rev_d8_8", "chapter": "D8 — Extensions du GV (circonstants)", "source": "Révision complète", "front": "Exemple de circonstant de cause", "back": "\"Il rit de joie.\" (de joie = cause) / \"Il est rentré par la pluie.\" (par la pluie = cause)"}, {"id": "rev_d8_9", "chapter": "D8 — Extensions du GV (circonstants)", "source": "Révision complète", "front": "Exemple de circonstant de but", "back": "\"Elle sort pour acheter du pain.\" (pour + inf. = but)"}, {"id": "rev_d8_10", "chapter": "D8 — Extensions du GV (circonstants)", "source": "Révision complète", "front": "Exemple de circonstant de concession", "back": "\"Malgré la fatigue, il travailla toute la nuit.\""}, {"id": "rev_d8_11", "chapter": "D8 — Extensions du GV (circonstants)", "source": "Révision complète", "front": "Exemple de gérondif de condition", "back": "\"En partant tôt, tu éviteras les bouchons.\" (si tu pars tôt)"}, {"id": "rev_d8_12", "chapter": "D8 — Extensions du GV (circonstants)", "source": "Révision complète", "front": "Différence circonstant et construction absolue", "back": "Circonstant = extension du GV (modifie le procès). Construction absolue = extension du GN (GN + participe, valeur circonstancielle mais rattachée à un GN)."}, {"id": "rev_d8_13", "chapter": "D8 — Extensions du GV (circonstants)", "source": "Révision complète", "front": "Peut-on accumuler plusieurs circonstants ?", "back": "Oui : \"Hier matin, il est parti rapidement à Lyon en voiture.\" (4 circonstants différents)."}, {"id": "rev_d8_14", "chapter": "D8 — Extensions du GV (circonstants)", "source": "Révision complète", "front": "Circonstant de temps exprimé par GN nu", "back": "\"Elle part ce matin.\" / \"Il a travaillé deux heures.\" — GN sans préposition à valeur temporelle."}, {"id": "rev_d8_15", "chapter": "D8 — Extensions du GV (circonstants)", "source": "Révision complète", "front": "Différence \"parce que\" et \"puisque\"", "back": "\"Parce que\" : cause inconnue de l&#39;interlocuteur (info nouvelle). \"Puisque\" : cause connue, rappelée ou concédée."}, {"id": "rev_d8_16", "chapter": "D8 — Extensions du GV (circonstants)", "source": "Révision complète", "front": "Infinitif prépositionnel de but", "back": "\"pour + infinitif\" → but : \"Il travaille pour réussir.\" / \"sans + infinitif\" → manière négative : \"Il répond sans hésiter.\""}, {"id": "rev_d8_17", "chapter": "D8 — Extensions du GV (circonstants)", "source": "Révision complète", "front": "Exemple d&#39;anacoluthe avec gérondif", "back": "*\"En entrant, la salle était pleine.\" — erreur : le sujet du gérondif (on) ≠ sujet de \"la salle était pleine\"."}, {"id": "rev_d8_18", "chapter": "D8 — Extensions du GV (circonstants)", "source": "Révision complète", "front": "Effet stylistique d&#39;un circonstant de cadrage en tête", "back": "Crée une mise en scène spatiale ou temporelle du procès ; le lecteur est d&#39;abord situé dans un cadre avant d&#39;apprendre ce qui s&#39;y passe."}, {"id": "rev_d8_19", "chapter": "D8 — Extensions du GV (circonstants)", "source": "Révision complète", "front": "Circonstant exprimé par une proposition conjonctive", "back": "\"Quand il arriva, tout était calme.\" (temps) / \"Parce qu&#39;il pleuvait, elle resta.\" (cause)"}, {"id": "rev_d9_0", "chapter": "D9 — La clause complexe", "source": "Révision complète", "front": "Définition d&#39;une clause complexe", "back": "Clause comprenant un prédicat principal + une ou plusieurs clauses enchâssées (subordonnées)."}, {"id": "rev_d9_1", "chapter": "D9 — La clause complexe", "source": "Révision complète", "front": "Qu&#39;est-ce qu&#39;une complétive ?", "back": "Subordonnée introduite par \"que\", fonctionnant comme COD du verbe principal : \"Je sais qu&#39;il vient.\""}, {"id": "rev_d9_2", "chapter": "D9 — La clause complexe", "source": "Révision complète", "front": "Mode après \"bien que\"", "back": "Subjonctif : \"Bien qu&#39;il soit fatigué, il travaille.\""}, {"id": "rev_d9_3", "chapter": "D9 — La clause complexe", "source": "Révision complète", "front": "Mode après \"parce que\"", "back": "Indicatif : \"Il reste parce qu&#39;il pleut.\""}, {"id": "rev_d9_4", "chapter": "D9 — La clause complexe", "source": "Révision complète", "front": "Mode après \"pour que\"", "back": "Subjonctif : \"Je parle lentement pour qu&#39;il comprenne.\""}, {"id": "rev_d9_5", "chapter": "D9 — La clause complexe", "source": "Révision complète", "front": "Mode après \"si\" conditionnel", "back": "Indicatif (présent ou imparfait) : \"Si tu viens, on sortira.\" / \"Si tu venais, on sortirait.\""}, {"id": "rev_d9_6", "chapter": "D9 — La clause complexe", "source": "Révision complète", "front": "Qu&#39;est-ce que la coordination ?", "back": "Liaison de deux clauses de même niveau par une conjonction de coordination (MEONDC)."}, {"id": "rev_d9_7", "chapter": "D9 — La clause complexe", "source": "Révision complète", "front": "Les conjonctions de coordination (MEONDC)", "back": "Mais, Et, Or, Ni, Donc, Car — et \"ou\". Elles relient des éléments syntaxiquement équivalents."}, {"id": "rev_d9_8", "chapter": "D9 — La clause complexe", "source": "Révision complète", "front": "Qu&#39;est-ce que la juxtaposition ?", "back": "Clauses liées par ponctuation seule (virgule, ;, :) sans conjonction. La relation logique est implicite."}, {"id": "rev_d9_9", "chapter": "D9 — La clause complexe", "source": "Révision complète", "front": "Exemple de juxtaposition causale", "back": "\"Il n&#39;avait pas dormi : il avait les yeux rougis.\" (les deux-points signalent la cause)."}, {"id": "rev_d9_10", "chapter": "D9 — La clause complexe", "source": "Révision complète", "front": "Transposer \"Je viendrai demain\" au DI", "back": "Elle dit qu&#39;elle viendrait le lendemain. (futur → conditionnel ; demain → le lendemain)"}, {"id": "rev_d9_11", "chapter": "D9 — La clause complexe", "source": "Révision complète", "front": "Transposer \"Je suis arrivé hier\" au DI", "back": "Il dit qu&#39;il était arrivé la veille. (passé composé → plus-que-parfait ; hier → la veille)"}, {"id": "rev_d9_12", "chapter": "D9 — La clause complexe", "source": "Révision complète", "front": "Différence entre \"parce que\" et \"puisque\"", "back": "\"Parce que\" : cause nouvelle/non connue. \"Puisque\" : cause connue ou concédée, rappelée comme argument."}, {"id": "rev_d9_13", "chapter": "D9 — La clause complexe", "source": "Révision complète", "front": "Qu&#39;est-ce qu&#39;une interrogative indirecte ?", "back": "Clause introduite par \"si\" ou un mot interrogatif, fonctionnant comme COD : \"Je demande s&#39;il vient.\""}, {"id": "rev_d9_14", "chapter": "D9 — La clause complexe", "source": "Révision complète", "front": "Différence complétive vs interrogative indirecte", "back": "Complétive (que) : contenu assertif. Interr. ind. (si/mot interr.) : contenu questionnant."}, {"id": "rev_d9_15", "chapter": "D9 — La clause complexe", "source": "Révision complète", "front": "Qu&#39;est-ce que l&#39;enchâssement ?", "back": "Une clause est enchâssée quand elle dépend syntaxiquement d&#39;une autre (est intégrée à elle)."}, {"id": "rev_d9_16", "chapter": "D9 — La clause complexe", "source": "Révision complète", "front": "Peut-on enchâsser une subordonnée dans une subordonnée ?", "back": "Oui : \"Je sais que tu crois qu&#39;il viendra.\" (complétive dans complétive)."}, {"id": "rev_d9_17", "chapter": "D9 — La clause complexe", "source": "Révision complète", "front": "Comment reconnaître la clause principale ?", "back": "Elle n&#39;est pas introduite par une conjonction de subordination ; c&#39;est le siège de la prédication centrale."}, {"id": "rev_d9_18", "chapter": "D9 — La clause complexe", "source": "Révision complète", "front": "Conjonctions de concession + mode", "back": "Bien que, quoique → subjonctif. Même si → indicatif."}, {"id": "rev_d9_19", "chapter": "D9 — La clause complexe", "source": "Révision complète", "front": "Conjonctions de conséquence", "back": "Si bien que, de sorte que, au point que → indicatif : \"Il a crié si fort que tout le monde l&#39;a entendu.\""}, {"id": "rev_d10_0", "chapter": "D10 — Phrase graphique & dislocation", "source": "Révision complète", "front": "Définition de la phrase graphique", "back": "Unité textuelle délimitée par majuscule + point final. Unité typographique, pas syntaxique."}, {"id": "rev_d10_1", "chapter": "D10 — Phrase graphique & dislocation", "source": "Révision complète", "front": "Phrase graphique ≠ clause : pourquoi ?", "back": "Une phrase graphique peut contenir plusieurs clauses ou être une clause averbale. \"Magnifique !\" = phrase graphique et clause averbale."}, {"id": "rev_d10_2", "chapter": "D10 — Phrase graphique & dislocation", "source": "Révision complète", "front": "Définition de la dislocation", "back": "Procédé déplaçant un constituant en périphérie (gauche ou droite) avec reprise par un pronom à l&#39;intérieur de la clause."}, {"id": "rev_d10_3", "chapter": "D10 — Phrase graphique & dislocation", "source": "Révision complète", "front": "Structure de la dislocation gauche", "back": "Élément disloqué + virgule + pronom cataphorique dans la clause : \"Paul, je le connais.\""}, {"id": "rev_d10_4", "chapter": "D10 — Phrase graphique & dislocation", "source": "Révision complète", "front": "Valeur DI de la dislocation gauche", "back": "Thématisation : l&#39;élément disloqué est présenté comme le thème (info connue/donnée)."}, {"id": "rev_d10_5", "chapter": "D10 — Phrase graphique & dislocation", "source": "Révision complète", "front": "Structure de la dislocation droite", "back": "Pronom anaphorique dans la clause + virgule + élément disloqué : \"Je le connais, Paul.\""}, {"id": "rev_d10_6", "chapter": "D10 — Phrase graphique & dislocation", "source": "Révision complète", "front": "Valeur DI de la dislocation droite", "back": "Rhématisation ou précision après coup ; peut marquer l&#39;emphase ou l&#39;oral spontané."}, {"id": "rev_d10_7", "chapter": "D10 — Phrase graphique & dislocation", "source": "Révision complète", "front": "Pronom cataphorique : définition", "back": "Pronom qui annonce un référent à venir dans le texte (DG : le pronom précède le GN disloqué)."}, {"id": "rev_d10_8", "chapter": "D10 — Phrase graphique & dislocation", "source": "Révision complète", "front": "Pronom anaphorique : définition", "back": "Pronom qui reprend un référent déjà mentionné (DD : le pronom suit le GN disloqué)."}, {"id": "rev_d10_9", "chapter": "D10 — Phrase graphique & dislocation", "source": "Révision complète", "front": "Exemple de dislocation gauche d&#39;un COD", "back": "\"Ce livre, je l&#39;ai lu.\" (le = COD disloqué à gauche)"}, {"id": "rev_d10_10", "chapter": "D10 — Phrase graphique & dislocation", "source": "Révision complète", "front": "Exemple de dislocation droite d&#39;un COD", "back": "\"Je l&#39;ai lu, ce livre.\" (le = COD ; ce livre disloqué à droite)"}, {"id": "rev_d10_11", "chapter": "D10 — Phrase graphique & dislocation", "source": "Révision complète", "front": "Exemple de dislocation d&#39;un COI", "back": "\"À Paul, je lui ai parlé.\" (lui = COI ; à Paul disloqué à gauche)"}, {"id": "rev_d10_12", "chapter": "D10 — Phrase graphique & dislocation", "source": "Révision complète", "front": "Définition de la clause clivée", "back": "Clause c&#39;est X qui/que focalisant X en position rhématique forte (souvent contrastive)."}, {"id": "rev_d10_13", "chapter": "D10 — Phrase graphique & dislocation", "source": "Révision complète", "front": "Différence DG et clivage", "back": "DG thématise (info donnée : \"Paul, je le connais\"). Clivage focalise rhématiquement (info nouvelle contrastive : \"C&#39;est Paul qui est venu\")."}, {"id": "rev_d10_14", "chapter": "D10 — Phrase graphique & dislocation", "source": "Révision complète", "front": "Inversion simple : structure", "back": "Pronom sujet postposé : \"Viendra-t-il ?\" (V-pro)"}, {"id": "rev_d10_15", "chapter": "D10 — Phrase graphique & dislocation", "source": "Révision complète", "front": "Inversion complexe : structure", "back": "SN maintenu + pronom de reprise postposé : \"Paul viendra-t-il ?\" (SN V-pro)"}, {"id": "rev_d10_16", "chapter": "D10 — Phrase graphique & dislocation", "source": "Révision complète", "front": "Inversion stylistique : contexte", "back": "Registre soutenu ou littéraire ; SN postposé au verbe : \"Ainsi parla l&#39;orateur.\""}, {"id": "rev_d10_17", "chapter": "D10 — Phrase graphique & dislocation", "source": "Révision complète", "front": "Dans quel registre la dislocation est-elle caractéristique ?", "back": "Registre oral, familier. En littérature, elle mime l&#39;oral ou crée de la proximité (style indirect libre)."}, {"id": "rev_d10_18", "chapter": "D10 — Phrase graphique & dislocation", "source": "Révision complète", "front": "Peut-on disloquer un circonstant ?", "back": "Oui : \"À Paris, j&#39;y suis allé.\" (y reprend \"à Paris\" disloqué à gauche)"}, {"id": "rev_d10_19", "chapter": "D10 — Phrase graphique & dislocation", "source": "Révision complète", "front": "Effet de la dislocation dans le style indirect libre", "back": "La dislocation marque la voix du personnage (pas du narrateur) ; elle signale que les pensées sont dans la tête du personnage."}, {"id": "res_guide_0", "chapter": "Guide UNIL — INTRODUCTION — Qu&#x27;est-ce que la linguistique ?", "source": "Guide UNIL", "front": "Qu'est-ce que <em>Le LANGAGE</em>&nbsp;?", "back": "Le LANGAGE est la faculté proprement humaine de communiquer, de se référer au monde et de se représenter soi-même grâce à des systèmes de signes (les langues). Il sert à communiquer avec autrui, à désigner le réel, à exprimer la subjectivité et à parler du langage lui-même (métalangage). Distinction fondamentale : langue vs. parole La LANGUE est le système abstrait, le code partagé par une communauté. Par exemple, les règles qui font que « il mange » est acceptable en français alors que « il mangeons » ne l&#x27;est pas. La langue est ce qui est répétable d&#x27;un énoncé à l&#x27;autre. La PAROLE est l&#x27;usage singulier et concret de la langue par un individu à un moment donné. Chaque fois qu&#x27;on dit « bonjour », c&#x27;est un événement unique (la parole), mais on applique les mêmes règles (la langue)."}, {"id": "res_guide_1", "chapter": "Guide UNIL — INTRODUCTION — Qu&#x27;est-ce que la linguistique ?", "source": "Guide UNIL", "front": "✏️ Exemple de <em>1. La linguistique : une science empirique</em>", "back": "Je dis « bonjour » ce matin = un acte de PAROLE unique, singulier. Le fait que « bonjour » ait deux syllabes et soit un salut = propriété de la LANGUE. Optique descriptive vs. normative"}, {"id": "res_guide_2", "chapter": "Guide UNIL — 1. La linguistique : une science empirique", "source": "Guide UNIL", "front": "Qu'est-ce que <em>Le LANGAGE</em>&nbsp;?", "back": "Le LANGAGE est la faculté proprement humaine de communiquer, de se référer au monde et de se représenter soi-même grâce à des systèmes de signes (les langues). Il sert à communiquer avec autrui, à désigner le réel, à exprimer la subjectivité et à parler du langage lui-même (métalangage). Distinction fondamentale : langue vs. parole La LANGUE est le système abstrait, le code partagé par une communauté. Par exemple, les règles qui font que « il mange » est acceptable en français alors que « il mangeons » ne l&#x27;est pas. La langue est ce qui est répétable d&#x27;un énoncé à l&#x27;autre. La PAROLE est l&#x27;usage singulier et concret de la langue par un individu à un moment donné. Chaque fois qu&#x27;on dit « bonjour », c&#x27;est un événement unique (la parole), mais on applique les mêmes règles (la langue)."}, {"id": "res_guide_3", "chapter": "Guide UNIL — 1. La linguistique : une science empirique", "source": "Guide UNIL", "front": "✏️ Exemple de <em>1. La linguistique : une science empirique</em>", "back": "Je dis « bonjour » ce matin = un acte de PAROLE unique, singulier. Le fait que « bonjour » ait deux syllabes et soit un salut = propriété de la LANGUE. Optique descriptive vs. normative"}, {"id": "res_guide_4", "chapter": "Guide UNIL — 2. Le signe linguistique (Saussure)", "source": "Guide UNIL", "front": "Qu'est-ce que <em>Un SIGNE</em>&nbsp;?", "back": "Un SIGNE est l&#x27;association indissociable d&#x27;un SIGNIFIANT (la face perceptible : les sons ou les lettres) et d&#x27;un SIGNIFIÉ (la face mentale : le contenu, la représentation). Saussure compare le signe à une feuille de papier : impossible de couper le recto sans couper le verso. Propriétés essentielles du signe : • Arbitraire : Arbitraire : la relation entre signifiant et signifié est conventionnelle, pas naturelle. Il n&#x27;y a aucune raison physique pour qu&#x27;un chat s&#x27;appelle « chat » en français et « cat » en anglais. • Oppositionnel : Oppositionnel / systémique : un signe se définit par ce qu&#x27;il n&#x27;est pas. Le signe « tu » existe parce qu&#x27;il s&#x27;oppose à « je », « il », « vous », etc."}, {"id": "res_guide_5", "chapter": "Guide UNIL — 3. Double articulation et niveaux d&#x27;analyse", "source": "Guide UNIL", "front": "Qu'est-ce que <em>PREMIÈRE ARTICULATION</em>&nbsp;?", "back": "PREMIÈRE ARTICULATION : découpage en unités pourvues d&#x27;un sens (les MORPHÈMES). Par exemple « J&#x27;ai mal à la tête » se décompose en unités significatives.\n\nDEUXIÈME ARTICULATION : ces unités significatives se décomposent elles-mêmes en unités distinctives mais sans sens propre (les PHONÈMES). Par exemple « tête » = /t/-/ε/-/t/ : aucun de ces phonèmes ne signifie « tête ». Cette double articulation est ce qui rend le langage humain extrêmement économique et créatif : avec une trentaine de phonèmes, on peut former des milliers de morphèmes, qui permettent de construire une infinité d&#x27;énoncés. Les quatre niveaux d&#x27;analyse linguistique L&#x27;analyse linguistique est organisée en quatre niveaux hiérarchiques, des plus petites unités aux plus grandes :"}, {"id": "res_guide_6", "chapter": "Guide UNIL — 4. De la clause à la phrase : trois plans d&#x27;organisation", "source": "Guide UNIL", "front": "Qu'est-ce que <em>La PHRASE graphique</em>&nbsp;?", "back": "La PHRASE graphique est délimitée par une majuscule et un point. Elle appartient à l&#x27;ordre du texte écrit. Elle peut contenir une ou plusieurs clauses.\n\nLa CLAUSE est l&#x27;unité syntaxique autonome (un « îlot de dépendance »). C&#x27;est l&#x27;unité maximale de la grammaire et l&#x27;unité minimale de l&#x27;énonciation."}, {"id": "res_guide_7", "chapter": "Guide UNIL — 4. De la clause à la phrase : trois plans d&#x27;organisation", "source": "Guide UNIL", "front": "⭐ À retenir — <em>4. De la clause à la phrase : trois plans d&#x27;organisation</em>", "back": "La linguistique est une science descriptive, pas normative."}, {"id": "res_guide_8", "chapter": "Guide UNIL — 4. De la clause à la phrase : trois plans d&#x27;organisation", "source": "Guide UNIL", "front": "⭐ À retenir — <em>4. De la clause à la phrase : trois plans d&#x27;organisation</em>", "back": "Le signe = signifiant + signifié (recto/verso inséparables)."}, {"id": "res_guide_9", "chapter": "Guide UNIL — 4. De la clause à la phrase : trois plans d&#x27;organisation", "source": "Guide UNIL", "front": "Double articulation", "back": "phonèmes (distinctifs) → morphèmes (significatifs) → syntagmes → clauses."}, {"id": "res_guide_10", "chapter": "Guide UNIL — 4. De la clause à la phrase : trois plans d&#x27;organisation", "source": "Guide UNIL", "front": "Phrase ≠ clause", "back": "la phrase est une unité textuelle (topographique) ; la clause est une unité syntaxique."}, {"id": "res_guide_11", "chapter": "Guide UNIL — 4. De la clause à la phrase : trois plans d&#x27;organisation", "source": "Guide UNIL", "front": "Trois plans", "back": "morphosyntaxe / topographie / pragmasyntaxe."}, {"id": "res_guide_12", "chapter": "Guide UNIL — CHAPITRE 1 — Phonétique, phonologie et graphémique du français", "source": "Guide UNIL", "front": "Qu'est-ce que <em>Un PHONE</em>&nbsp;?", "back": "Un PHONE est l&#x27;unité articulatoire minimale : un son concret, tel qu&#x27;il est effectivement produit. Les phones sont notés entre crochets : [a], [b], [s]… 1.1 La chaîne parlée et les syllabes Quand quelqu&#x27;un parle, on entend d&#x27;abord un flux continu. L&#x27;analyse phonétique permet de découper ce flux en unités."}, {"id": "res_guide_13", "chapter": "Guide UNIL — CHAPITRE 1 — Phonétique, phonologie et graphémique du français", "source": "Guide UNIL", "front": "Qu'est-ce que <em>La SYLLABE</em>&nbsp;?", "back": "La SYLLABE est l&#x27;unité de base de l&#x27;effort d&#x27;émission. Chaque syllabe a un noyau vocalique (une voyelle) autour duquel peuvent s&#x27;articuler des consonnes.\n\nSyllabe OUVERTE : se termine par une voyelle. Ex. : [la], [vi] — (CVO : consonne-voyelle)\nSyllabe FERMÉE : se termine par une consonne. Ex. : [part], [tun] — (CVCO) En français, on favorise les syllabes ouvertes. La découpe syllabique s&#x27;opère à l&#x27;échelle de l&#x27;énoncé, sans égard pour les frontières de mots écrits."}, {"id": "res_guide_14", "chapter": "Guide UNIL — CHAPITRE 1 — Phonétique, phonologie et graphémique du français", "source": "Guide UNIL", "front": "✏️ Exemple de <em>1. Éléments de phonétique</em>", "back": "La vie est une cerise se syllabe : /la-vi-è-tun-se-Riz/ Remarquez que « est une » → [è-tun] : la consonne [t] va avec la syllabe suivante (syllabe ouverte). 1.2 Les trois types de phones"}, {"id": "res_guide_15", "chapter": "Guide UNIL — CHAPITRE 1 — Phonétique, phonologie et graphémique du français", "source": "Guide UNIL", "front": "✏️ Exemple de <em>1. Éléments de phonétique</em>", "back": "Voyelles nasales (rareté mondiale !) : /ɑ̃/ (banc, temps), /ɛ̃/ (brin, main, vin), /ɔ̃/ (son, bombe), /œ̃/ (brun, parfum — tend à disparaître) B. Les consonnes Une consonne suppose un écoulement d&#x27;air obstrué. On les distingue selon quatre propriétés :"}, {"id": "res_guide_16", "chapter": "Guide UNIL — CHAPITRE 1 — Phonétique, phonologie et graphémique du français", "source": "Guide UNIL", "front": "✏️ Exemple de <em>1. Éléments de phonétique</em>", "back": "/i/ → [j] : [vjø] (vieux, 1 syllabe) MAIS [tʁije] (trier, 2 syllabes) 1.3 L&#x27;accent et le rythme en français L&#x27;accent en français est fondamentalement syntagmatique (lié aux groupes de mots) et non lexical (lié à des mots isolés comme en anglais ou en espagnol). L&#x27;accent sert prin…"}, {"id": "res_guide_17", "chapter": "Guide UNIL — CHAPITRE 1 — Phonétique, phonologie et graphémique du français", "source": "Guide UNIL", "front": "✏️ Exemple de <em>1. Éléments de phonétique</em>", "back": "Ginette(accent) a offert(accent) un bouquet(accent) à son frère(accent) → 4 accents, 4 groupes syntaxiques 1.4 Le e caduc (schwa)"}, {"id": "res_guide_18", "chapter": "Guide UNIL — CHAPITRE 1 — Phonétique, phonologie et graphémique du français", "source": "Guide UNIL", "front": "Définir&nbsp;: <em>1. Éléments de phonétique</em>", "back": "Le E CADUC (ou e instable, ou schwa) est noté [ə]. Sa réalisation est variable selon le contexte.\n\n— En fin de groupe syntaxique : toujours omis (il est non accentogène).\n— Suivi d&#x27;une voyelle : il tombe : « la belle armoir
