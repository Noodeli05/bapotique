ant → voyelle maintenue."}, {"id": "res_resume_190", "chapter": "Résumé", "source": "Résumé", "front": "⭐ À retenir — <em>1.2. La syllabe</em>", "back": "La découpe syllabique ignore les frontières graphiques des mots ! Elle se fait à l&#x27;échelle de l&#x27;énoncé entier. Cette découpe détermine aussi la COUPE DES MOTS en fin de ligne (coupure intrasyllabique interdite)."}, {"id": "res_resume_191", "chapter": "Résumé — 2. Éléments de phonologie", "source": "Résumé", "front": "Le test de commutation est LA méthode fondamentale de la linguistique. Il s&#x27;applique à tous les niveaux", "back": "pour identifier les phonèmes, mais aussi les morphèmes et les syntagmes."}, {"id": "res_resume_192", "chapter": "Résumé", "source": "Résumé", "front": "Le test de commutation est LA méthode fondamentale de la linguistique. Il s&#x27;applique à tous les niveaux", "back": "pour identifier les phonèmes, mais aussi les morphèmes et les syntagmes."}, {"id": "res_resume_193", "chapter": "Résumé", "source": "Résumé", "front": "La distinction phonographie/sémiographie est FONDAMENTALE. Le français a développé un système d&#x27;écriture à deux fonctionnements", "back": "pour l&#x27;oreille (phonographie) et pour l&#x27;œil (sémiographie). C&#x27;est pourquoi l&#x27;orthographe française est &quot;complexe&quot; mais pas arbitraire !"}, {"id": "res_resume_194", "chapter": "Résumé — 6. Complexité des rapports oral/écrit", "source": "Résumé", "front": "Idée-clé", "back": "&quot;Oral&quot; et &quot;écrit&quot; ne sont pas simplement deux façons de faire la même chose. Ils partagent la morphosyntaxe, mais ont chacun leurs propres systèmes (prosodie pour l&#x27;oral, topographie pour l&#x27;écrit). Ne pas confondre compétences orales et écrites !"}, {"id": "res_resume_195", "chapter": "Résumé — Chapitre 2 — La morphologie", "source": "Résumé", "front": "⭐ À retenir — <em>1.1. Le signe linguistique</em>", "back": "Les langues ne découpent pas la réalité de la même façon. &quot;Mouton&quot; en français = l&#x27;animal ET la viande ; en anglais &quot;sheep&quot; (animal) et &quot;mutton&quot; (viande) sont distincts. Les catégories de la langue organisent notre pensée."}, {"id": "res_resume_196", "chapter": "Résumé — 1. Trois notions fondamentales", "source": "Résumé", "front": "⭐ À retenir — <em>1.1. Le signe linguistique</em>", "back": "Les langues ne découpent pas la réalité de la même façon. &quot;Mouton&quot; en français = l&#x27;animal ET la viande ; en anglais &quot;sheep&quot; (animal) et &quot;mutton&quot; (viande) sont distincts. Les catégories de la langue organisent notre pensée."}, {"id": "res_resume_197", "chapter": "Résumé", "source": "Résumé", "front": "⭐ À retenir — <em>1.1. Le signe linguistique</em>", "back": "Les langues ne découpent pas la réalité de la même façon. &quot;Mouton&quot; en français = l&#x27;animal ET la viande ; en anglais &quot;sheep&quot; (animal) et &quot;mutton&quot; (viande) sont distincts. Les catégories de la langue organisent notre pensée."}, {"id": "res_resume_198", "chapter": "Résumé", "source": "Résumé", "front": "Différence cruciale", "back": "l&#x27;affixe DÉRIVATIONNEL crée un NOUVEAU mot (beau → beauté). L&#x27;affixe FLEXIONNEL fait varier le MÊME mot (beau, belle, beaux, belles). La dérivation = construction du lexique. La flexion = conjugaison/déclinaison."}, {"id": "res_resume_199", "chapter": "Résumé — 4. Asymétries morphologiques oral/écrit", "source": "Résumé", "front": "⭐ À retenir — <em>4. Asymétries morphologiques oral/écrit</em>", "back": "L&#x27;écrit a davantage de marqueurs morphologiques que l&#x27;oral. La morphologie grammaticale et lexicale diffèrent entre les deux systèmes. L&#x27;accord en genre et nombre est souvent visible à l&#x27;écrit mais inaudible à l&#x27;oral."}, {"id": "res_resume_200", "chapter": "Résumé — Chapitre 3 — Syntaxe de la clause canonique", "source": "Résumé", "front": "Solution", "back": "réserver &quot;phrase&quot; pour l&#x27;unité topographique (majuscule → point) et utiliser &quot;clause&quot; pour l&#x27;unité syntaxique autonome. Cette distinction est fondamentale pour tout le reste du cours."}, {"id": "res_resume_201", "chapter": "Résumé — 1. Phrase et clause", "source": "Résumé", "front": "Solution", "back": "réserver &quot;phrase&quot; pour l&#x27;unité topographique (majuscule → point) et utiliser &quot;clause&quot; pour l&#x27;unité syntaxique autonome. Cette distinction est fondamentale pour tout le reste du cours."}, {"id": "res_resume_202", "chapter": "Résumé", "source": "Résumé", "front": "Solution", "back": "réserver &quot;phrase&quot; pour l&#x27;unité topographique (majuscule → point) et utiliser &quot;clause&quot; pour l&#x27;unité syntaxique autonome. Cette distinction est fondamentale pour tout le reste du cours."}, {"id": "res_resume_203", "chapter": "Résumé", "source": "Résumé", "front": "Cas sans déterminant", "back": "(1) emploi notionnel (fromage ou dessert ?), (2) position d&#x27;attribut (Gustave est écrivain), (3) autonyme (quand le mot parle de lui-même : &quot;Dont n&#x27;est pas fréquent à l&#x27;oral&quot;)."}, {"id": "res_resume_204", "chapter": "Résumé", "source": "Résumé", "front": "ATTENTION", "back": "la fonction syntaxique (sujet, COD…) ne détermine PAS seule le rôle actantiel ! &quot;Jean donne une pomme à Paul&quot; → Paul (COI) est bénéficiaire. &quot;Paul reçoit une pomme&quot; → Paul (sujet) est aussi bénéficiaire. Même rôle, fonctions différentes."}, {"id": "res_resume_205", "chapter": "Résumé", "source": "Résumé", "front": "Pour identifier le RHÈME", "back": "(1) Test de négation : l&#x27;élément hors de portée de la négation est le thème. (2) Question implicite : le rhème est la réponse au mot interrogatif. (3) Test &quot;et pas autre chose&quot; : le rhème est ce qu&#x27;on peut commenter ainsi."}, {"id": "res_resume_206", "chapter": "Résumé — Chapitre 4 — L&#x27;ordre dans la clause", "source": "Résumé", "front": "⭐ À retenir — <em>1. Linéarité du signifiant et fonctions de l&#x27;ordre des mots</em>", "back": "L&#x27;idée du XVIIe siècle que l&#x27;ordre S-V-C serait &quot;naturel&quot; car il reflète l&#x27;ordre logique de la pensée est fausse. L&#x27;ordre des mots est propre au LANGAGE, pas au monde ni à la pensée. Il n&#x27;y a pas d&#x27;ordre &quot;plus logique&quot; qu&#x27;un autre."}, {"id": "res_resume_207", "chapter": "Résumé — 1. Linéarité du signifiant et fonctions de l&#x27;ordre des mots", "source": "Résumé", "front": "⭐ À retenir — <em>1. Linéarité du signifiant et fonctions de l&#x27;ordre des mots</em>", "back": "L&#x27;idée du XVIIe siècle que l&#x27;ordre S-V-C serait &quot;naturel&quot; car il reflète l&#x27;ordre logique de la pensée est fausse. L&#x27;ordre des mots est propre au LANGAGE, pas au monde ni à la pensée. Il n&#x27;y a pas d&#x27;ordre &quot;plus logique&quot; qu&#x27;un autre."}, {"id": "res_resume_208", "chapter": "Résumé", "source": "Résumé", "front": "NE PAS CONFONDRE :\n— Clause clivée", "back": "c&#x27;est X qui… (X est le rhème)\n— Clause à présentatif : c&#x27;est + GN (X est présenté/montré)\nLa différence : la clivée extrait un constituant de la clause principale, la présentative pointe un objet dans la situation."}, {"id": "res_resume_209", "chapter": "Résumé — 3. Constructions verbales", "source": "Résumé", "front": "Même valeur sémantico-référentielle (même événement décrit) mais PROFIL INFORMATIONNEL différent. Le passif change le thème", "back": "on parle du patient, pas de l&#x27;agent."}, {"id": "res_resume_210", "chapter": "Résumé", "source": "Résumé", "front": "Même valeur sémantico-référentielle (même événement décrit) mais PROFIL INFORMATIONNEL différent. Le passif change le thème", "back": "on parle du patient, pas de l&#x27;agent."}, {"id": "res_resume_211", "chapter": "Résumé", "source": "Résumé", "front": "La construction impersonnelle est globalement RHÉMATIQUE (pas de thème initial). C&#x27;est iconique", "back": "on ne sait pas encore de quoi il s&#x27;agit, on découvre au fur et à mesure. C&#x27;est l&#x27;opposé de la thématisation."}, {"id": "res_resume_212", "chapter": "Résumé — 3. La clause à présentatif", "source": "Résumé", "front": "NE PAS CONFONDRE :\n— Clause à présentatif", "back": "c&#x27;est + GN seul = présentation d&#x27;un référent\n— Clause clivée : c&#x27;est + GN + qui/que + relative = extraction d&#x27;un constituant rhématique\nTest : peut-on supprimer &quot;c&#x27;est&quot; et la relative ? Si oui, c&#x27;est une clivée. Sinon, c&#x27;est une présentative."}, {"id": "res_resume_213", "chapter": "Résumé — Chapitre 6 — Extensions du groupe nominal", "source": "Résumé", "front": "Attention", "back": "la distinction restrictif/descriptif est INTERPRÉTATIVE, pas grammaticale ! Le même adjectif peut être l&#x27;un ou l&#x27;autre selon le contexte. C&#x27;est le lecteur qui interprète."}, {"id": "res_resume_214", "chapter": "Résumé — 1. L&#x27;adjectif épithète", "source": "Résumé", "front": "Attention", "back": "la distinction restrictif/descriptif est INTERPRÉTATIVE, pas grammaticale ! Le même adjectif peut être l&#x27;un ou l&#x27;autre selon le contexte. C&#x27;est le lecteur qui interprète."}, {"id": "res_resume_215", "chapter": "Résumé", "source": "Résumé", "front": "Attention", "back": "la distinction restrictif/descriptif est INTERPRÉTATIVE, pas grammaticale ! Le même adjectif peut être l&#x27;un ou l&#x27;autre selon le contexte. C&#x27;est le lecteur qui interprète."}, {"id": "res_resume_216", "chapter": "Résumé", "source": "Résumé", "front": "Les ADJECTIFS RELATIONNELS sont TOUJOURS postposés. Ils indiquent une appartenance à une catégorie/domaine, pas une qualité observable. Test", "back": "peut-on dire &quot;très/peu...&quot; + adjectif ? Non pour le relationnel (on ne dit pas &quot;très présidentiel&quot; pour parler d&#x27;une campagne), oui pour le qualificatif."}, {"id": "res_resume_217", "chapter": "Résumé — 5. Les propositions relatives", "source": "Résumé", "front": "⭐ À retenir — <em>5. Les propositions relatives</em>", "back": "La distinction restrictive/explicative peut avoir des implications politiques et idéologiques importantes. &quot;Les luttes qui montrent la volonté des salariés&quot; (restrictive = seulement certaines luttes) vs &quot;les luttes, qui montrent…&quot; (explicative = toutes les luttes montrent cette volonté). Même structure, sens très différent selon la présence ou absence de virgule."}, {"id": "res_resume_218", "chapter": "Résumé — 2. Les circonstants (extraprédicatifs)", "source": "Résumé", "front": "Test le plus sûr", "back": "la NÉGATION. &quot;Mon bus n&#x27;est pas parti, à 8 heures&quot; → \n(a) si on conteste l&#x27;heure (&quot;il est parti à 9h&quot;) → &quot;à 8 heures&quot; est circonstanciel (dans le rhème) ;\n(b) si l&#x27;heure n&#x27;est pas contestée (&quot;il était en panne&quot;) → &quot;à 8 heures&quot; est circonstant (dans le thème)."}, {"id": "res_resume_219", "chapter": "Résumé", "source": "Résumé", "front": "Polysémie de COMME", "back": "(1) Comparatif (&quot;il mange comme un ogre&quot;) ; (2) Causal/situationnel (&quot;Comme je ne suis pas de ceux qui…, je m&#x27;en passerai&quot;) ; (3) Temporel (&quot;Comme je sortais, la pluie a commencé&quot;). Toujours préciser quel &quot;comme&quot; est en jeu dans l&#x27;analyse."}, {"id": "res_resume_220", "chapter": "Résumé — Chapitre 9 — Composition de la phrase graphique", "source": "Résumé", "front": "Les CONNECTEURS organisent les relations entre propositions", "back": "conjonctions de coordination, de subordination, et même certains adverbes. Dans une analyse, identifier le connecteur permet de préciser la relation logique entre les clauses."}, {"id": "res_resume_221", "chapter": "Résumé — 1. Juxtaposition et coordination de clauses", "source": "Résumé", "front": "Les CONNECTEURS organisent les relations entre propositions", "back": "conjonctions de coordination, de subordination, et même certains adverbes. Dans une analyse, identifier le connecteur permet de préciser la relation logique entre les clauses."}, {"id": "res_resume_222", "chapter": "Résumé — 4. Complément après point", "source": "Résumé", "front": "La mise en phrase est une MISE EN PHASES", "back": "découper en plusieurs unités textuelles une même structure clausale produit des effets temporels (plusieurs temps disjoints). L&#x27;analyse doit tenir compte des tensions entre la structure syntaxique et la découpe topographique."}];
const ALL_SOURCES = ["Guide UNIL", "Résumé", "Révision complète"];
const LS_MASTERED = 'fc_mastered';
const LS_REVIEW   = 'fc_review';
const LS_FAV      = 'fc_favorites';
const LS_THEME    = 'fc_theme';

function _ls(k) { try { return new Set(JSON.parse(localStorage.getItem(k)||'[]')); } catch(e) { return new Set(); } }
const mastered = _ls(LS_MASTERED);
const review   = _ls(LS_REVIEW);
const favs     = _ls(LS_FAV);

function cardStatus(id) {
  if (mastered.has(id)) return 'mastered';
  if (review.has(id))   return 'review';
  return 'unseen';
}

let activeFilter = 'all';
let activeSource = '';
let searchQuery  = '';

function setFilter(key, btn) {
  activeFilter = key;
  document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function setSource(src, btn) {
  activeSource = activeSource === src ? '' : src;
  document.querySelectorAll('.spill').forEach(b => b.classList.remove('active'));
  if (activeSource) btn.classList.add('active');
  renderGrid();
}

function filterCards() {
  searchQuery = document.getElementById('ac-search').value.toLowerCase().trim();
  renderGrid();
}

function getVisible() {
  return CARDS.filter(c => {
    if (activeSource && c.source !== activeSource) return false;
    const st = cardStatus(c.id);
    if (activeFilter === 'mastered' && st !== 'mastered') return false;
    if (activeFilter === 'review'   && st !== 'review')   return false;
    if (activeFilter === 'unseen'   && st !== 'unseen')   return false;
    if (activeFilter === 'fav'      && !favs.has(c.id))   return false;
    if (searchQuery) {
      const haystack = (c.front + ' ' + c.back + ' ' + c.chapter + ' ' + c.source).toLowerCase();
      if (!haystack.includes(searchQuery)) return false;
    }
    return true;
  });
}

function toggleCard(el) {
  el.classList.toggle('open');
}

function toggleFav(event, id) {
  event.stopPropagation();
  const el = event.currentTarget;
  if (favs.has(id)) { favs.delete(id); el.textContent = '☆'; el.classList.remove('active'); }
  else { favs.add(id); el.textContent = '★'; el.classList.add('active'); }
  localStorage.setItem(LS_FAV, JSON.stringify([...favs]));
}

function renderGrid() {
  const visible = getVisible();
  const grid = document.getElementById('ac-grid');
  document.getElementById('ac-count').textContent = `${visible.length} carte${visible.length!==1?'s':''}`;
  document.getElementById('cnt-all').textContent = `(${CARDS.length})`;

  if (!visible.length) {
    grid.innerHTML = '<div class="ac-empty"><div style="font-size:2.5rem;margin-bottom:.5rem">🔍</div>Aucune carte trouvée</div>';
    return;
  }

  grid.innerHTML = visible.map(c => {
    const st = cardStatus(c.id);
    const isFav = favs.has(c.id);
    const statusLabel = st === 'mastered' ? '<span class="card-status status-mastered">🟢 Je sais</span>'
                      : st === 'review'   ? '<span class="card-status status-review">🔴 À revoir</span>'
                      :                     '<span class="card-status status-unseen">○ Pas vue</span>';
    return `<div class="ac-card ${st} ${isFav?'fav':''}" onclick="toggleCard(this)">
      ${statusLabel}
      <div class="ac-front">
        <div class="ac-front-text">${c.front}</div>
      </div>
      <div class="ac-meta">
        <span class="ac-chapter">${c.chapter}</span>
        <span class="ac-source">${c.source}</span>
      </div>
      <div class="ac-back">
        <div class="ac-back-text">${c.back}</div>
        <a class="study-link" href="flashcards.html#card-${c.id}">▶ Étudier cette carte</a>
      </div>
      <span class="ac-fav ${isFav?'active':''}" onclick="toggleFav(event,'${c.id}')">${isFav?'★':'☆'}</span>
    </div>`;
  }).join('');
}

function renderSourcePills() {
  const g = document.getElementById('source-pills');
  g.innerHTML = ALL_SOURCES.map(src => {
    const cnt = CARDS.filter(c => c.source === src).length;
    return `<button class="spill" onclick="setSource('${src}',this)">${src} <span style="opacity:.6">(${cnt})</span></button>`;
  }).join('');
}

// Theme
(function() {
  const t = localStorage.getItem(LS_THEME);
  if (t) document.documentElement.setAttribute('data-theme', t);
})();
document.getElementById('theme-toggle').addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = cur === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem(LS_THEME, next);
  document.getElementById('theme-toggle').textContent = next === 'light' ? '🌙' : '☀️';
});

renderSourcePills();
renderGrid();
</script>
<script>
!function(){var syn=window.speechSynthesis,cur=null,cBtn=null;function stop(){if(syn)syn.cancel();if(cBtn){cBtn.textContent='🔊';cBtn.removeAttribute('data-s');}cur=null;cBtn=null;}function speak(txt,btn){var same=cBtn===btn;stop();if(same||!syn||!txt)return;var u=new SpeechSynthesisUtterance(txt);u.lang='fr-FR';u.rate=0.88;cur=u;cBtn=btn;if(btn){btn.textContent='⏹';btn.setAttribute('data-s','1');}u.onend=u.onerror=function(){if(cur===u)stop();};syn.speak(u);}window._ttsRead=function(btn,el){var cl=el.cloneNode(true);cl.querySelectorAll('.tts-btn,.corr-box,.savoir-box,.qa-ans,.fc-back,.tbl-wrap').forEach(function(x){x.remove();});speak(cl.innerText.trim(),btn);};window._ttsInject=function(sel,pos,sp){document.querySelectorAll(sel).forEach(function(el){if(el.querySelector('.tts-btn'))return;var btn=document.createElement('button');btn.className='tts-btn';btn.title='Écouter';btn.textContent='🔊';btn.addEventListener('click',function(e){if(sp)e.stopPropagation();window._ttsRead(btn,el);});if(pos==='start')el.insertBefore(btn,el.firstChild);else el.appendChild(btn);});};window.addEventListener('DOMContentLoaded',function(){_ttsInject_page();});}();
</script>
<script>
function _ttsInject_page(){
  var origRender=window.renderGrid;
  window.renderGrid=function(){origRender.apply(this,arguments);_ttsInject('.ac-front','start',true);_ttsInject('.ac-back','start',true);};
  _ttsInject('.ac-front','start',true);
  _ttsInject('.ac-back','start',true);
}
</script>
