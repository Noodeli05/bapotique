e » → [labɛlaʁmwaʁ].\n— En intérieur de groupe, suivi d&#x27;une consonne : OBLIGATOIRE si sa chute crée 3 consonnes ou + (ex. « la table verte »). FACULTATIF si sa chute crée seulement 2 consonnes (ex. « de beaux yeux » → [d(ə)bozjø])."}, {"id": "res_guide_19", "chapter": "Guide UNIL — CHAPITRE 1 — Phonétique, phonologie et graphémique du français", "source": "Guide UNIL", "front": "⚠️ Ne pas confondre — <em>1. Éléments de phonétique</em>", "back": "Ne pas confondre lettre et son ! La « règle des 3 consonnes » concerne les SONS, pas les lettres. « donnerai » : le double N ne fait qu&#x27;un seul son [n], donc le e caduc n&#x27;est entouré que de 2 consonnes et est facultatif. 1.5 Phénomènes : élision, apocope, liaison, découpe syllabique • •"}, {"id": "res_guide_20", "chapter": "Guide UNIL — 1. Éléments de phonétique", "source": "Guide UNIL", "front": "Qu'est-ce que <em>Un PHONE</em>&nbsp;?", "back": "Un PHONE est l&#x27;unité articulatoire minimale : un son concret, tel qu&#x27;il est effectivement produit. Les phones sont notés entre crochets : [a], [b], [s]… 1.1 La chaîne parlée et les syllabes Quand quelqu&#x27;un parle, on entend d&#x27;abord un flux continu. L&#x27;analyse phonétique permet de découper ce flux en unités."}, {"id": "res_guide_21", "chapter": "Guide UNIL — 1. Éléments de phonétique", "source": "Guide UNIL", "front": "Qu'est-ce que <em>La SYLLABE</em>&nbsp;?", "back": "La SYLLABE est l&#x27;unité de base de l&#x27;effort d&#x27;émission. Chaque syllabe a un noyau vocalique (une voyelle) autour duquel peuvent s&#x27;articuler des consonnes.\n\nSyllabe OUVERTE : se termine par une voyelle. Ex. : [la], [vi] — (CVO : consonne-voyelle)\nSyllabe FERMÉE : se termine par une consonne. Ex. : [part], [tun] — (CVCO) En français, on favorise les syllabes ouvertes. La découpe syllabique s&#x27;opère à l&#x27;échelle de l&#x27;énoncé, sans égard pour les frontières de mots écrits."}, {"id": "res_guide_22", "chapter": "Guide UNIL — 1. Éléments de phonétique", "source": "Guide UNIL", "front": "✏️ Exemple de <em>1. Éléments de phonétique</em>", "back": "La vie est une cerise se syllabe : /la-vi-è-tun-se-Riz/ Remarquez que « est une » → [è-tun] : la consonne [t] va avec la syllabe suivante (syllabe ouverte). 1.2 Les trois types de phones"}, {"id": "res_guide_23", "chapter": "Guide UNIL — 1. Éléments de phonétique", "source": "Guide UNIL", "front": "✏️ Exemple de <em>1. Éléments de phonétique</em>", "back": "Voyelles nasales (rareté mondiale !) : /ɑ̃/ (banc, temps), /ɛ̃/ (brin, main, vin), /ɔ̃/ (son, bombe), /œ̃/ (brun, parfum — tend à disparaître) B. Les consonnes Une consonne suppose un écoulement d&#x27;air obstrué. On les distingue selon quatre propriétés :"}, {"id": "res_guide_24", "chapter": "Guide UNIL — 1. Éléments de phonétique", "source": "Guide UNIL", "front": "✏️ Exemple de <em>1. Éléments de phonétique</em>", "back": "/i/ → [j] : [vjø] (vieux, 1 syllabe) MAIS [tʁije] (trier, 2 syllabes) 1.3 L&#x27;accent et le rythme en français L&#x27;accent en français est fondamentalement syntagmatique (lié aux groupes de mots) et non lexical (lié à des mots isolés comme en anglais ou en espagnol). L&#x27;accent sert prin…"}, {"id": "res_guide_25", "chapter": "Guide UNIL — 1. Éléments de phonétique", "source": "Guide UNIL", "front": "✏️ Exemple de <em>1. Éléments de phonétique</em>", "back": "Ginette(accent) a offert(accent) un bouquet(accent) à son frère(accent) → 4 accents, 4 groupes syntaxiques 1.4 Le e caduc (schwa)"}, {"id": "res_guide_26", "chapter": "Guide UNIL — 1. Éléments de phonétique", "source": "Guide UNIL", "front": "Définir&nbsp;: <em>1. Éléments de phonétique</em>", "back": "Le E CADUC (ou e instable, ou schwa) est noté [ə]. Sa réalisation est variable selon le contexte.\n\n— En fin de groupe syntaxique : toujours omis (il est non accentogène).\n— Suivi d&#x27;une voyelle : il tombe : « la belle armoire » → [labɛlaʁmwaʁ].\n— En intérieur de groupe, suivi d&#x27;une consonne : OBLIGATOIRE si sa chute crée 3 consonnes ou + (ex. « la table verte »). FACULTATIF si sa chute crée seulement 2 consonnes (ex. « de beaux yeux » → [d(ə)bozjø])."}, {"id": "res_guide_27", "chapter": "Guide UNIL — 1. Éléments de phonétique", "source": "Guide UNIL", "front": "⚠️ Ne pas confondre — <em>1. Éléments de phonétique</em>", "back": "Ne pas confondre lettre et son ! La « règle des 3 consonnes » concerne les SONS, pas les lettres. « donnerai » : le double N ne fait qu&#x27;un seul son [n], donc le e caduc n&#x27;est entouré que de 2 consonnes et est facultatif. 1.5 Phénomènes : élision, apocope, liaison, découpe syllabique • •"}, {"id": "res_guide_28", "chapter": "Guide UNIL — 2. Éléments de phonologie", "source": "Guide UNIL", "front": "Qu'est-ce que <em>Un PHONÈME</em>&nbsp;?", "back": "Un PHONÈME est l&#x27;unité phonologique minimale : un son considéré sous l&#x27;angle de sa fonction distinctive dans une langue donnée. Les phonèmes sont notés entre barres obliques : /p/, /b/, /s/…\n\nLe phonème n&#x27;a pas de sens lui-même ; il sert à différencier des morphèmes (des mots) les uns des autres. 2.1 La méthode des paires minimales et le test de commutation Pour identifier les phonèmes d&#x27;une langue, on utilise le test de commutation appliqué à la recherche de paires minimales."}, {"id": "res_guide_29", "chapter": "Guide UNIL — 2. Éléments de phonologie", "source": "Guide UNIL", "front": "Qu'est-ce que <em>UNE PAIRE MINIMALE</em>&nbsp;?", "back": "UNE PAIRE MINIMALE : deux mots qui ne diffèrent que par un seul segment phonique. Si la substitution d&#x27;un son par un autre produit un mot différent, alors ces deux sons sont deux phonèmes distincts de cette langue.\n\nEXEMPLE : /bière/ vs. /pierre/ → seul [b] vs. [p] change → /b/ et /p/ sont des phonèmes du français."}, {"id": "res_guide_30", "chapter": "Guide UNIL — 2. Éléments de phonologie", "source": "Guide UNIL", "front": "✏️ Exemple de <em>2. Éléments de phonologie</em>", "back": "Test de commutation à partir de /lɑ̃ɡ/ : /lɑ̃ɡ/ → /tɑ̃ɡ/ (tangue) → /l/ et /t/ sont des phonèmes /lɑ̃ɡ/ → /liɡ/ (ligue) → /ɑ̃/ et /i/ sont des phonèmes"}, {"id": "res_guide_31", "chapter": "Guide UNIL — 3. Éléments de graphémique", "source": "Guide UNIL", "front": "Qu'est-ce que <em>Un GRAPHÈME</em>&nbsp;?", "back": "Un GRAPHÈME est la plus petite unité distinctive de la langue écrite. On distingue :\n— Les ALPHAGRAMMES : les 26 lettres de l&#x27;alphabet (avec accents, cédille, tréma).\n— Les TOPOGRAMMES : signes de ponctuation, blancs typographiques, gras, italique…\n— Les LOGOGRAMMES : $, ©, @… 3.1 La phonographie Dans son fonctionnement phonographique, l&#x27;écriture alphabétique note les phonèmes de la langue orale. Mais en français, cette correspondance est imparfaite : • Un graphème peut noter plusieurs phonèmes selon le contexte : G = /ɡ/ dans « garage » mais /ʒ/ dans « gel » • Plusieurs graphèmes peuvent noter le même phonème : S, SS, T, X codent tous /s/ dans certains contextes • Des digrammes (CH, PH) ou trigrammes (AIN, EAU, ILL) codent un seul phonème • Des lettres « muettes » n&#x27;ont pas de contrepartie sonore : « vert » /vɛʁ/, « trois » /tʁwa/ 3.2 La sémiographie"}, {"id": "res_guide_32", "chapter": "Guide UNIL — 3. Éléments de graphémique", "source": "Guide UNIL", "front": "Définir&nbsp;: <em>3. Éléments de graphémique</em>", "back": "Dans son fonctionnement SÉMIOGRAPHIQUE, l&#x27;écriture note directement des significations, sans passer par les phonèmes. Les graphèmes distinguent visuellement des morphèmes qui seraient homophones à l&#x27;oral.\n\nEXEMPLE : « saut / seau / sceau / sol » sont homophones [so] mais hétérographes : leur orthographe les distingue visuellement et les associe à des familles lexicales différentes (saut → sauter, seau → seille?, sceau → sceller). La sémiographie explique les « lettres muettes » qui semblent inutiles phonographiquement mais qui servent à : • La morphologie grammaticale : « roses » vs. « rose » (pluriel visuel non oral) • La morphologie lexicale : « pain » associé à « panifier » mais distinct de « pin » → « pinède »"}, {"id": "res_guide_33", "chapter": "Guide UNIL — 3. Éléments de graphémique", "source": "Guide UNIL", "front": "⚠️ Ne pas confondre — <em>3. Éléments de graphémique</em>", "back": "Oral ≠ écrit : ne pas confondre les deux systèmes ! À l&#x27;ORAL, « Des moutons étaient en sûreté » → le pluriel n&#x27;est marqué que par le déterminant [de]. Les morphèmes de pluriel de « moutons » et « étaient » sont muets. À l&#x27;ÉCRIT, trois morphèmes marquent le pluriel : des, moutons-S, étai-ENT. → Le français écrit et le français oral n&#x27;ont PAS exactement la même morphologie !"}, {"id": "res_guide_34", "chapter": "Guide UNIL — 3. Éléments de graphémique", "source": "Guide UNIL", "front": "⭐ À retenir — <em>3. Éléments de graphémique</em>", "back": "Phone [entre crochets] = son concret ; phonème /entre barres/ = unité fonctionnelle."}, {"id": "res_guide_35", "chapter": "Guide UNIL — 3. Éléments de graphémique", "source": "Guide UNIL", "front": "⭐ À retenir — <em>3. Éléments de graphémique</em>", "back": "Test de commutation → paire minimale → identification du phonème."}, {"id": "res_guide_36", "chapter": "Guide UNIL — 3. Éléments de graphémique", "source": "Guide UNIL", "front": "⭐ À retenir — <em>3. Éléments de graphémique</em>", "back": "Le français a environ 37 phonèmes (selon les dialectes, 31–36 en pratique)."}, {"id": "res_guide_37", "chapter": "Guide UNIL — 3. Éléments de graphémique", "source": "Guide UNIL", "front": "3 types de phones", "back": "voyelles (noyau syllabique), consonnes (obstruction), glides (intermédiaires)."}, {"id": "res_guide_38", "chapter": "Guide UNIL — 3. Éléments de graphémique", "source": "Guide UNIL", "front": "⭐ À retenir — <em>3. Éléments de graphémique</em>", "back": "Phonographie = l&#x27;écriture note les sons ; sémiographie = l&#x27;écriture note directement les sens."}, {"id": "res_guide_39", "chapter": "Guide UNIL — 3. Éléments de graphémique", "source": "Guide UNIL", "front": "E caduc [ə]", "back": "toujours muet en fin de groupe, parfois facultatif ou obligatoire en intérieur."}, {"id": "res_guide_40", "chapter": "Guide UNIL — CHAPITRE 2 — La morphologie", "source": "Guide UNIL", "front": "✏️ Exemple de <em>1. Le signe linguistique revisité</em>", "back": "Le mot français « bois » couvre à la fois le matériau (bois de construction) et le petit ensemble d&#x27;arbres. En italien, ce sont deux mots distincts : « legno » et « bosco ». Le découpage du réel par les signes varie donc d&#x27;une langue à l&#x27;autre. → Les signes d&#x27;une langue structure…"}, {"id": "res_guide_41", "chapter": "Guide UNIL — 1. Le signe linguistique revisité", "source": "Guide UNIL", "front": "✏️ Exemple de <em>1. Le signe linguistique revisité</em>", "back": "Le mot français « bois » couvre à la fois le matériau (bois de construction) et le petit ensemble d&#x27;arbres. En italien, ce sont deux mots distincts : « legno » et « bosco ». Le découpage du réel par les signes varie donc d&#x27;une langue à l&#x27;autre. → Les signes d&#x27;une langue structure…"}, {"id": "res_guide_42", "chapter": "Guide UNIL — 2. Identifier les morphèmes : le test de commutation", "source": "Guide UNIL", "front": "Qu'est-ce que <em>TEST DE COMMUTATION MORPHOLOGIQUE</em>&nbsp;?", "back": "TEST DE COMMUTATION MORPHOLOGIQUE :\n1. On isole une hypothétique partie : ex. « tél- » dans « téléphone ».\n2. On l&#x27;insère dans un autre mot : « télé-phérique ».\n3. Si cette partie a le même sens dans les deux contextes, c&#x27;est un morphème.\n\nRésultat : « télé- » = morphème qui signifie « à distance » (téléphone, téléphérique, télescope…)."}, {"id": "res_guide_43", "chapter": "Guide UNIL — 2. Identifier les morphèmes : le test de commutation", "source": "Guide UNIL", "front": "✏️ Exemple de <em>2. Identifier les morphèmes : le test de commutation</em>", "back": "Analyse de décomposable : • dé- : commutation avec déplaçable → même sens (inversion du procès) → morphème • compos- : commutation avec composition → même sens (faire un tout) → morphème"}, {"id": "res_guide_44", "chapter": "Guide UNIL — 2. Identifier les morphèmes : le test de commutation", "source": "Guide UNIL", "front": "Définir&nbsp;: <em>2. Identifier les morphèmes : le test de commutation</em>", "back": "L&#x27;ALLOMORPHIE désigne le phénomène par lequel un même morphème prend des formes d&#x27;expression différentes selon le contexte phonologique.\n\nEXEMPLES :\n— in- / im- / il- / ir- : même préfixe privatif selon la consonne suivante (in-actif, im-moral, il-légal, ir-réel)\n— vapeur / vapor- : même radical dans « vapeur » et « vaporeux »\n— boiv- / buv- / boi- : même radical du verbe « boire » selon la terminaison"}, {"id": "res_guide_45", "chapter": "Guide UNIL — 3. Typologie des morphèmes", "source": "Guide UNIL", "front": "⚠️ Ne pas confondre — <em>3. Typologie des morphèmes</em>", "back": "Affixes DÉRIVATIONNELS vs. affixes FLEXIONNELS : ne pas confondre ! • Affixes DÉRIVATIONNELS : créent un NOUVEAU mot (nouveau lexème). Ex. « manger » → « mangeable » = nouveau mot. • Affixes FLEXIONNELS : font VARIER la forme d&#x27;UN MÊME lexème. Ex. « mange/mangeons/mangeait » = même lexème, formes différentes."}, {"id": "res_guide_46", "chapter": "Guide UNIL — 4. Construction du lexique", "source": "Guide UNIL", "front": "Définir&nbsp;: <em>4. Construction du lexique</em>", "back": "La DÉRIVATION consiste à ajouter un ou plusieurs affixes dérivationnels (préfixes ou suffixes) à une base pour créer un nouveau lexème.\n\n— Préfixation : dé-miner (inversion), re-faire (répétition)\n— Suffixation : ramass-age, bon-té, blanch-ir\n— Préfixation + suffixation simultanée (dérivation parasynthétique) : en-cabl-ure (on ne peut enlever ni « en- » ni « -ure » séparément)"}, {"id": "res_guide_47", "chapter": "Guide UNIL — 4. Construction du lexique", "source": "Guide UNIL", "front": "✏️ Exemple de <em>4. Construction du lexique</em>", "back": "Analyse de bronchiolite (exercice type d&#x27;examen) : bronch- (radical : les bronches, l&#x27;appareil respiratoire) -iol- (suffixe : diminutif → petite bronche ; cf. bes-tiole, luci-ole)"}, {"id": "res_guide_48", "chapter": "Guide UNIL — 4. Construction du lexique", "source": "Guide UNIL", "front": "Définir&nbsp;: <em>4. Construction du lexique</em>", "back": "Les MOTS-VALISES sont construits à partir de deux morphèmes dont au moins l&#x27;un est tronqué, avec chevauchement (partage d&#x27;un segment phonologique commun).\n\nEXEMPLES : brunch (breakfast + lunch), potimarron (potiron + marron), photocopillage (photocopiage + pillage), franglais (français + anglais). 4.5 La conversion"}, {"id": "res_guide_49", "chapter": "Guide UNIL — 4. Construction du lexique", "source": "Guide UNIL", "front": "Définir&nbsp;: <em>4. Construction du lexique</em>", "back": "La CONVERSION (ou dérivation impropre) crée un nouveau lexème sans modifier l&#x27;expression, uniquement par changement de contexte syntaxique (recatégorisation grammaticale).\n\nEXEMPLES :\n— Nom → adjectif : « une chemise marron » (marron = fruit, devenu adjectif de couleur)\n— Adjectif → nom : « Le Rouge et le Noir »\n— Verbe → nom : « le boire et le manger »"}, {"id": "res_guide_50", "chapter": "Guide UNIL — 4. Construction du lexique", "source": "Guide UNIL", "front": "⭐ À retenir — <em>4. Construction du lexique</em>", "back": "Morphème = unité minimale de sens (signe)."}, {"id": "res_guide_51", "chapter": "Guide UNIL — 4. Construction du lexique", "source": "Guide UNIL", "front": "Test de commutation", "back": "substitution → même sens → morphème."}, {"id": "res_guide_52", "chapter": "Guide UNIL — 4. Construction du lexique", "source": "Guide UNIL", "front": "Allomorphie", "back": "même morphème, expressions différentes (in-/im-/il-/ir-)."}, {"id": "res_guide_53", "chapter": "Guide UNIL — 4. Construction du lexique", "source": "Guide UNIL", "front": "⭐ À retenir — <em>4. Construction du lexique</em>", "back": "Morphèmes LEXICAUX → construisent le vocabulaire ; GRAMMATICAUX → marquent les relations syntaxiques."}, {"id": "res_guide_54", "chapter": "Guide UNIL — 4. Construction du lexique", "source": "Guide UNIL", "front": "⭐ À retenir — <em>4. Construction du lexique</em>", "back": "Dérivation DÉRIVATIONNELLE → nouveau mot ; FLEXIONNELLE → même mot, nouvelle forme."}, {"id": "res_guide_55", "chapter": "Guide UNIL — 4. Construction du lexique", "source": "Guide UNIL", "front": "Morphologie à préciser", "back": "s&#x27;agit-il de l&#x27;oral ou de l&#x27;écrit ? Ils diffèrent (ex. pluriel)."}, {"id": "res_guide_56", "chapter": "Guide UNIL — CHAPITRE 3 — Syntaxe de la clause canonique", "source": "Guide UNIL", "front": "✏️ Exemple de <em>1. Phrase et clause</em>", "back": "&quot;Vous êtes au travail depuis une heure et vous n&#x27;avez encore rien fait.&quot; → Une seule PHRASE (typographiquement : une majuscule et un point). → Mais DEUX CLAUSES syntaxiques : aucune relation syntaxique n&#x27;enjambe le « et »."}, {"id": "res_guide_57", "chapter": "Guide UNIL — CHAPITRE 3 — Syntaxe de la clause canonique", "source": "Guide UNIL", "front": "Qu'est-ce que <em>La CLAUSE</em>&nbsp;?", "back": "La CLAUSE est l&#x27;unité syntaxique autonome. Elle forme un « îlot de dépendance morphosyntaxique » : tous ses constituants sont liés par des relations de rection (dépendance), et aucun d&#x27;eux n&#x27;est en relation de rection avec ce qui est à l&#x27;extérieur.\n\nLa clause est à la fois :\n— L&#x27;unité MAXIMALE de la syntaxe (le plus grand niveau d&#x27;organisation grammaticale)\n— L&#x27;unité MINIMALE de l&#x27;énonciation (le plus petit acte communicatif complet)"}, {"id": "res_guide_58", "chapter": "Guide UNIL — CHAPITRE 3 — Syntaxe de la clause canonique", "source": "Guide UNIL", "front": "Qu'est-ce que <em>La RECTION</em>&nbsp;?", "back": "La RECTION est le rapport de dépendance syntaxique : une unité A régit une unité B si la présence de B implique celle de A.\n\nExemple : le verbe « offrir » régit un COD et un COI. Si on voit un COI, c&#x27;est qu&#x27;il y a forcément un « offrir » (ou verbe de même type) quelque part. 1.3 La clause canonique"}, {"id": "res_guide_59", "chapter": "Guide UNIL — CHAPITRE 3 — Syntaxe de la clause canonique", "source": "Guide UNIL", "front": "Qu'est-ce que <em>La CLAUSE CANONIQUE</em>&nbsp;?", "back": "La CLAUSE CANONIQUE est le prototype de base de la clause. Elle a la structure : S – V – C (sujet – verbe – complément essentiel).\n\nElle est &quot;canonique&quot; parce que c&#x27;est à partir d&#x27;elle qu&#x27;on va décrire tous les autres types de clauses comme des variantes ou des extensions."}, {"id": "res_guide_60", "chapter": "Guide UNIL — CHAPITRE 3 — Syntaxe de la clause canonique", "source": "Guide UNIL", "front": "✏️ Exemple de <em>1. Phrase et clause</em>", "back": "&quot;Cette disparition fit beaucoup de bruit.&quot; (Giono) S : &quot;Cette disparition&quot; (syntagme nominal sujet) V : &quot;fit&quot; (verbe)"}, {"id": "res_guide_61", "chapter": "Guide UNIL — 1. Phrase et clause", "source": "Guide UNIL", "front": "✏️ Exemple de <em>1. Phrase et clause</em>", "back": "&quot;Vous êtes au travail depuis une heure et vous n&#x27;avez encore rien fait.&quot; → Une seule PHRASE (typographiquement : une majuscule et un point). → Mais DEUX CLAUSES syntaxiques : aucune relation syntaxique n&#x27;enjambe le « et »."}, {"id": "res_guide_62", "chapter": "Guide UNIL — 1. Phrase et clause", "source": "Guide UNIL", "front": "Qu'est-ce que <em>La CLAUSE</em>&nbsp;?", "back": "La CLAUSE est l&#x27;unité syntaxique autonome. Elle forme un « îlot de dépendance morphosyntaxique » : tous ses constituants sont liés par des relations de rection (dépendance), et aucun d&#x27;eux n&#x27;est en relation de rection avec ce qui est à l&#x27;extérieur.\n\nLa clause est à la fois :\n— L&#x27;unité MAXIMALE de la syntaxe (le plus grand niveau d&#x27;organisation grammaticale)\n— L&#x27;unité MINIMALE de l&#x27;énonciation (le plus petit acte communicatif complet)"}, {"id": "res_guide_63", "chapter": "Guide UNIL — 1. Phrase et clause", "source": "Guide UNIL", "front": "Qu'est-ce que <em>La RECTION</em>&nbsp;?", "back": "La RECTION est le rapport de dépendance syntaxique : une unité A régit une unité B si la présence de B implique celle de A.\n\nExemple : le verbe « offrir » régit un COD et un COI. Si on voit un COI, c&#x27;est qu&#x27;il y a forcément un « offrir » (ou verbe de même type) quelque part. 1.3 La clause canonique"}, {"id": "res_guide_64", "chapter": "Guide UNIL — 1. Phrase et clause", "source": "Guide UNIL", "front": "Qu'est-ce que <em>La CLAUSE CANONIQUE</em>&nbsp;?", "back": "La CLAUSE CANONIQUE est le prototype de base de la clause. Elle a la structure : S – V – C (sujet – verbe – complément essentiel).\n\nElle est &quot;canonique&quot; parce que c&#x27;est à partir d&#x27;elle qu&#x27;on va décrire tous les autres types de clauses comme des variantes ou des extensions."}, {"id": "res_guide_65", "chapter": "Guide UNIL — 1. Phrase et clause", "source": "Guide UNIL", "front": "✏️ Exemple de <em>1. Phrase et clause</em>", "back": "&quot;Cette disparition fit beaucoup de bruit.&quot; (Giono) S : &quot;Cette disparition&quot; (syntagme nominal sujet) V : &quot;fit&quot; (verbe)"}, {"id": "res_guide_66", "chapter": "Guide UNIL — 2. Plans d&#x27;analyse de la clause", "source": "Guide UNIL", "front": "Définir&nbsp;: <em>2. Plans d&#x27;analyse de la clause</em>", "back": "Un SYNTAGME (ou groupe syntaxique) est une séquence de mots qui forment une unité syntaxique à laquelle on peut assigner une fonction.\n\nOn identifie un syntagme en vérifiant qu&#x27;on peut :\n— Le SUBSTITUER par un seul mot : « le chat de Gustave » → « il » (ça fonctionne) → c&#x27;est un GN\n— L&#x27;EFFACER : « dans le jardin » → peut être supprimé sans rompre la structure On distingue cinq types de syntagmes, identifiés par la catégorie de leur MOT TÊTE :"}, {"id": "res_guide_67", "chapter": "Guide UNIL — 2. Plans d&#x27;analyse de la clause", "source": "Guide UNIL", "front": "✏️ Exemple de <em>2. Plans d&#x27;analyse de la clause</em>", "back": "&quot;une servante de ferme vint annoncer…&quot; → déterminant indéfini : première mention &quot;la servante de ferme reprit…&quot; → déterminant défini : référent déjà connu Le GV : verbe et ses compléments essentiels"}, {"id": "res_guide_68", "chapter": "Guide UNIL — 2. Plans d&#x27;analyse de la clause", "source": "Guide UNIL", "front": "Définir&nbsp;: <em>2. Plans d&#x27;analyse de la clause</em>", "back": "La VALENCE verbale (notion introduite par Tesnière) désigne le nombre et la nature des actants (participants) qu&#x27;un verbe requiert pour que le sens du procès soit complètement réalisé.\n\nAnalogue chimique : la valence d&#x27;un atome = le nombre de liaisons qu&#x27;il peut former. Selon leur valence, les verbes sont : • • • • Typlogie des rôles actantiels Les actants n&#x27;ont pas tous le même rôle sémantique dans le procès décrit par le verbe :"}, {"id": "res_guide_69", "chapter": "Guide UNIL — 2. Plans d&#x27;analyse de la clause", "source": "Guide UNIL", "front": "⚠️ Ne pas confondre — <em>2. Plans d&#x27;analyse de la clause</em>", "back": "La fonction syntaxique ne détermine pas seule le rôle actantiel ! &quot;Jean donne une pomme à Paul.&quot; → Paul (COI) = bénéficiaire &quot;Paul reçoit une pomme.&quot; → Paul (SUJET) = bénéficiaire aussi ! → Même rôle sémantique, fonction syntaxique différente. 2.3 Modalités de clauses"}, {"id": "res_guide_70", "chapter": "Guide UNIL — 2. Plans d&#x27;analyse de la clause", "source": "Guide UNIL", "front": "Définir&nbsp;: <em>2. Plans d&#x27;analyse de la clause</em>", "back": "La MODALITÉ exprime le rapport de l&#x27;énonciateur à son dire. Elle est liée à la notion de « modus » (mode) en opposition avec le « dictum » (contenu propositionnel).\n\nLes MODALITÉS DE CLAUSES sont des manifestations syntaxiques de ce rapport :\n— Assertive (affirmation) : &quot;Je lis ce livre.&quot;\n— Injonctive (ordre) : &quot;Lisez ce livre !&quot;\n— Interrogative (question) : &quot;Lisez-vous ce livre ?&quot;\n— Exclamative (exclamation) : &quot;Comme vous lisez !&quot;\n\nNote : la clause averbale peut aussi exprimer des modalités (ex. &quot;Silence !&quot; = injonctif sans verbe). 2.4 Dynamique informationnelle : Thème – Rhème"}, {"id": "res_guide_71", "chapter": "Guide UNIL — 2. Plans d&#x27;analyse de la clause", "source": "Guide UNIL", "front": "Définir&nbsp;: <em>2. Plans d&#x27;analyse de la clause</em>", "back": "La clause organise l&#x27;information en deux parties :\n\n— Le THÈME : ce dont parle le locuteur, le point de départ informationnel. Souvent une information DÉJÀ CONNUE (cotextuellement ou situationnellement).\n— Le RHÈME : ce qu&#x27;on dit à propos du thème, l&#x27;apport d&#x27;information NOUVELLE. C&#x27;est le cœur du message, la réponse à la question implicite posée par le thème. Dans la clause canonique, la dynamique est : thème (GN sujet) → rhème (GV prédicat). La dynamique informationnelle est croissante : plus on avance vers la fin du rhème, plus l&#x27;information est nouvelle."}, {"id": "res_guide_72", "chapter": "Guide UNIL — 2. Plans d&#x27;analyse de la clause", "source": "Guide UNIL", "front": "✏️ Exemple de <em>2. Plans d&#x27;analyse de la clause</em>", "back": "&quot;Gustave apporte les livres à la bibliothèque.&quot; TH : Gustave (donné, connu) RH : apporte les livres à la bibliothèque (avec graduation : « à la bibliothèque » est l&#x27;info la plus nouvelle)"}, {"id": "res_guide_73", "chapter": "Guide UNIL — 2. Plans d&#x27;analyse de la clause", "source": "Guide UNIL", "front": "⭐ À retenir — <em>2. Plans d&#x27;analyse de la clause</em>", "back": "Clause = unité syntaxique maximale ET unité énonciative minimale."}, {"id": "res_guide_74", "chapter": "Guide UNIL — 2. Plans d&#x27;analyse de la clause", "source": "Guide UNIL", "front": "5 types de syntagmes", "back": "GN, GV, GAdj, GAdv, GPrép (identifiés par leur mot tête)."}, {"id": "res_guide_75", "chapter": "Guide UNIL — 2. Plans d&#x27;analyse de la clause", "source": "Guide UNIL", "front": "Valence verbale", "back": "monovalent (1), divalent (2), trivalent (3), avalent (0)."}, {"id": "res_guide_76", "chapter": "Guide UNIL — 2. Plans d&#x27;analyse de la clause", "source": "Guide UNIL", "front": "Rôles actantiels", "back": "agent / patient (objet) / instrument / résultatif / bénéficiaire / siège / lieu / support / propriété."}, {"id": "res_guide_77", "chapter": "Guide UNIL — 2. Plans d&#x27;analyse de la clause", "source": "Guide UNIL", "front": "4 modalités", "back": "assertive, injonctive, interrogative, exclamative."}, {"id": "res_guide_78", "chapter": "Guide UNIL — 2. Plans d&#x27;analyse de la clause", "source": "Guide UNIL", "front": "Thème (point de départ, connu) → Rhème (apport d&#x27;info, nouveau). Tests", "back": "négation et question."}, {"id": "res_guide_79", "chapter": "Guide UNIL — 2. La clause inversée", "source": "Guide UNIL", "front": "Définir&nbsp;: <em>2. La clause inversée</em>", "back": "Dans la CLAUSE INVERSÉE, l&#x27;ordre est C – V – S (un circonstant en zone préverbale, puis le verbe, puis le sujet postposé).\n\nConditions pour que l&#x27;inversion soit possible :\n1. Verbe MONOVALENT (ne prend qu&#x27;un actant : le sujet)\n2. Zone préverbale OCCUPÉE par un circonstant\n3. Souvent un verbe signifiant l&#x27;existence ou le surgissement\n\nEffet principal : le sujet postposé devient le RHÈME (information nouvelle)."}, {"id": "res_guide_80", "chapter": "Guide UNIL — 2. La clause inversée", "source": "Guide UNIL", "front": "✏️ Exemple de <em>2. La clause inversée</em>", "back": "&quot;Le long de cette façade... règne un cailloutis...&quot; (Balzac) TH : &quot;Le long de cette façade&quot; (cadre spatial) RH : &quot;un cailloutis&quot; (ce qui existe dans ce cadre = information nouvelle)"}, {"id": "res_guide_81", "chapter": "Guide UNIL — 3. Les dispositifs d&#x27;extraction : clivées et pseudo-clivées", "source": "Guide UNIL", "front": "Qu'est-ce que <em>LA CLAUSE CLIVÉE</em>&nbsp;?", "back": "LA CLAUSE CLIVÉE :\nStructure : C&#x27;est [RHÈME] qui/que/dont [THÈME sous forme de relative].\n\nEffet : le RHÈME est placé en première position, mis en relief par le présentatif « c&#x27;est ». La proposition relative représente le contexte thématique déjà connu."}, {"id": "res_guide_82", "chapter": "Guide UNIL — 3. Les dispositifs d&#x27;extraction : clivées et pseudo-clivées", "source": "Guide UNIL", "front": "✏️ Exemple de <em>3. Les dispositifs d&#x27;extraction : clivées et pseudo-clivées</em>", "back": "&quot;C&#x27;était par hasard qu&#x27;il se trouvait au festin.&quot; (Flaubert) RH (mis en focus) : &quot;par hasard&quot; TH (dans la relative) : &quot;qu&#x27;il se trouvait au festin&quot; (contexte connu)"}, {"id": "res_guide_83", "chapter": "Guide UNIL — 3. Les dispositifs d&#x27;extraction : clivées et pseudo-clivées", "source": "Guide UNIL", "front": "Qu'est-ce que <em>LA CLAUSE PSEUDO-CLIVÉE</em>&nbsp;?", "back": "LA CLAUSE PSEUDO-CLIVÉE :\nStructure : Ce qui/que/dont [THÈME] c&#x27;est [RHÈME].\n\nEffet : la relative périphrastique &quot;ce qui/que&quot; catégorise et crée une attente (on sait qu&#x27;il s&#x27;agit de quelque chose, mais pas quoi). Le « c&#x27;est » introduit ensuite le RHÈME qui comble cette attente."}, {"id": "res_guide_84", "chapter": "Guide UNIL — 3. Les dispositifs d&#x27;extraction : clivées et pseudo-clivées", "source": "Guide UNIL", "front": "✏️ Exemple de <em>3. Les dispositifs d&#x27;extraction : clivées et pseudo-clivées</em>", "back": "&quot;Ce qui me tourmente dans mon livre, c&#x27;est l&#x27;élément amusant.&quot; (Flaubert) TH (catégorisé) : &quot;ce qui me tourmente dans mon livre&quot; → on sait qu&#x27;il y a quelque chose qui tourmente, mais quoi ? RH (identification) : &quot;l&#x27;élément amusant&quot;"}, {"id": "res_guide_85", "chapter": "Guide UNIL — 3. Les dispositifs d&#x27;extraction : clivées et pseudo-clivées", "source": "Guide UNIL", "front": "⚠️ Ne pas confondre — <em>3. Les dispositifs d&#x27;extraction : clivées et pseudo-clivées</em>", "back": "Clause clivée vs. clause à présentatif avec relative : &quot;C&#x27;est Gustave qui apporte les livres.&quot; → CLIVÉE (le présentatif c&#x27;est extrait Gustave qui est le RHÈME) &quot;C&#x27;est mon chien.&quot; → PRÉSENTATIF simple (c&#x27;est = voici, identifie le référent, pas une clivée)"}, {"id": "res_guide_86", "chapter": "Guide UNIL — 4. Constructions verbales", "source": "Guide UNIL", "front": "Qu'est-ce que <em>LE PASSIF</em>&nbsp;?", "back": "LE PASSIF :\nStructure : Être + participe passé (+ complément d&#x27;agent optionnel : « par »)\n\nDifférence avec l&#x27;actif : même événement, mais le THÈME change. Le sujet grammatical du passif = le patient (non l&#x27;agent).\n\nEFFETS PRINCIPAUX DU PASSIF :\n1. Permettre de ne pas exprimer l&#x27;agent (passif « incomplet » ou « tronqué »)\n2. Placer comme thème un actant non-agent (le patient devient sujet)\n3. Assurer la continuité thématique d&#x27;un texte\n4. Respecter l&#x27;ordre préférentiel animé → inanimé"}, {"id": "res_guide_87", "chapter": "Guide UNIL — 4. Constructions verbales", "source": "Guide UNIL", "front": "✏️ Exemple de <em>4. Constructions verbales</em>", "back": "Actif : &quot;Le chat a mangé la souris.&quot; → TH : le chat (agent) Passif : &quot;La souris a été mangée par le chat.&quot; → TH : la souris (patient) &quot;La souris a été mangée.&quot; → agent EFFACÉ → on ne sait pas qui a mangé."}, {"id": "res_guide_88", "chapter": "Guide UNIL — 4. Constructions verbales", "source": "Guide UNIL", "front": "Définir&nbsp;: <em>4. Constructions verbales</em>", "back": "VERBES IMPERSONNELS vs. CONSTRUCTIONS IMPERSONNELLES :\n\n— Verbes impersonnels LEXICAUX : « il pleut », « il faut », « il s&#x27;agit de... » → impersonnels par nature.\n— Constructions impersonnelles SYNTAXIQUES : un verbe normalement personnel est utilisé avec un sujet grammatical « il » vide de sens.\n  Exemple : &quot;Il est arrivé un malheur.&quot; / &quot;Il surgit des hommes de partout.&quot;\n\nEffet : la zone préverbale est occupée par un sujet vide → toute la structure est RHÉMATIQUE. Cela présente le procès comme surgissant sans source.\n\n&quot;Par un coup de force stylistique, la forme impersonnelle permet de représenter un procès psychologique comme autogénéré à la manière d&#x27;un événement météorologique.&quot; (GMF) 4.3 Les constructions pronominales On distingue verbes pronominaux (propriété lexicale) et constructions pronominales (phénomène syntaxique)."}, {"id": "res_guide_89", "chapter": "Guide UNIL — 4. Constructions verbales", "source": "Guide UNIL", "front": "Qu'est-ce que <em>Verbes PRONOMINAUX</em>&nbsp;?", "back": "Verbes PRONOMINAUX :\n— Essentiellement pronominaux : n&#x27;existent qu&#x27;avec le pronom (s&#x27;évanouir, se souvenir)\n— Accidentellement pronominaux (autonomes) : existent sans pronom mais avec sens différent (apercevoir / s&#x27;apercevoir)\n\nCONSTRUCTIONS PRONOMINALES : un verbe non pronominal utilisé avec un pronom réfléchi. Le pronom réfléchi a le MÊME RÉFÉRENT que le sujet. Quatre interprétations possibles :"}, {"id": "res_guide_90", "chapter": "Guide UNIL — 4. Constructions verbales", "source": "Guide UNIL", "front": "⚠️ Ne pas confondre — <em>4. Constructions verbales</em>", "back": "Comment distinguer passif pronominal vs. neutre : &quot;Les garçons se battent&quot; → RÉFLEXIF (animés → ils peuvent être agents et patients) &quot;Les blés se battent&quot; → PASSIF pronominal (inanimés → ne peuvent être agents) &quot;La porte s&#x27;ouvre&quot; → NEUTRE (ni agent ni patient : siège d&#x27;un procès sans cause externe apparent)"}, {"id": "res_guide_91", "chapter": "Guide UNIL — 4. Constructions verbales", "source": "Guide UNIL", "front": "Clause inversée", "back": "[Circonstant] + Verbe + Sujet → sujet postposé = rhème."}, {"id": "res_guide_92", "chapter": "Guide UNIL — 4. Constructions verbales", "source": "Guide UNIL", "front": "Clivée", "back": "C&#x27;est [RH] qui/que [TH] → extraction et mise en focus du rhème."}, {"id": "res_guide_93", "chapter": "Guide UNIL — 4. Constructions verbales", "source": "Guide UNIL", "front": "Pseudo-clivée", "back": "Ce qui/que [TH], c&#x27;est [RH] → catégorisation puis identification."}, {"id": "res_guide_94", "chapter": "Guide UNIL — 4. Constructions verbales", "source": "Guide UNIL", "front": "Passif", "back": "patient = thème, agent effaçable. Effet : continuité thématique, anonymat de l&#x27;agent."}, {"id": "res_guide_95", "chapter": "Guide UNIL — 4. Constructions verbales", "source": "Guide UNIL", "front": "Impersonnel syntaxique", "back": "sujet vide « il » → toute la clause est rhématique, procès sans source."}, {"id": "res_guide_96", "chapter": "Guide UNIL — 4. Constructions verbales", "source": "Guide UNIL", "front": "Pronominale", "back": "4 sens possibles → réflexif / réciproque / passif / neutre (selon le référent du sujet)."}, {"id": "res_guide_97", "chapter": "Guide UNIL — CHAPITRE 5 — Les types de clauses", "source": "Guide UNIL", "front": "Qu'est-ce que <em>La CLAUSE AVERBALE</em>&nbsp;?", "back": "La CLAUSE AVERBALE est une clause sans verbe. Elle réalise malgré tout une prédication.\n\nL&#x27;absence de verbe prive la clause d&#x27;ancrage temporel explicite : la clause averbale est soit rattachée à la situation d&#x27;énonciation immédiate (exclamation, ordre spontané), soit détachée de toute temporalité particulière (proverbes, définitions).\n\nLes valeurs de la relation averbale correspondent exactement aux valeurs du verbe « être ». 1.1 Clause averbale attributive Elle installe une relation entre un support (sujet logique) et une propriété (prédicat). Structure binaire ou unaire."}, {"id": "res_guide_98", "chapter": "Guide UNIL — CHAPITRE 5 — Les types de clauses", "source": "Guide UNIL", "front": "✏️ Exemple de <em>1. La clause averbale</em>", "back": "&quot;Englouti, le gâteau.&quot; → prédicat (englouti) puis support (le gâteau) &quot;Chauds les marrons !&quot; → prédicat puis support &quot;Stationnement interdit.&quot; → support puis propriété (ordre thème-rhème ordinaire)"}, {"id": "res_guide_99", "chapter": "Guide UNIL — CHAPITRE 5 — Les types de clauses", "source": "Guide UNIL", "front": "✏️ Exemple de <em>1. La clause averbale</em>", "back": "&quot;Encore un client !&quot; / &quot;Tiens, un revenant !&quot; / &quot;Ciel, mon mari !&quot; → signifie « il y a », « il existe » 1.3 Clause thétique"}, {"id": "res_guide_100", "chapter": "Guide UNIL — CHAPITRE 5 — Les types de clauses", "source": "Guide UNIL", "front": "Qu'est-ce que <em>La CLAUSE THÉTIQUE</em>&nbsp;?", "back": "La CLAUSE THÉTIQUE est une clause averbale à un seul terme qui POSE un objet de discours (le thème), sans rien en dire. Elle active un référent en mémoire pour que la clause suivante puisse en parler.\n\n&quot;Harpagon – Ô ma chère cassette !&quot; → Harpagon pose d&#x27;abord l&#x27;objet (sa cassette) avant de pouvoir en parler. 1.4 Valeurs pragmatiques de la clause averbale La clause averbale est particulièrement adaptée à : • L&#x27;immédiateté du vécu (exclamations, style de la notation) • L&#x27;expressivité (plus l&#x27;expressivité augmente, moins la structure grammaticale est complexe : Gustave Guillaume) • L&#x27;intemporalité des vérités générales (proverbes : &quot;Tel père, tel fils.&quot;, &quot;À bon chat, bon rat.&quot;) • Le monologue intérieur, la notation brute de perceptions"}, {"id": "res_guide_101", "chapter": "Guide UNIL — 1. La clause averbale", "source": "Guide UNIL", "front": "Qu'est-ce que <em>La CLAUSE AVERBALE</em>&nbsp;?", "back": "La CLAUSE AVERBALE est une clause sans verbe. Elle réalise malgré tout une prédication.\n\nL&#x27;absence de verbe prive la clause d&#x27;ancrage temporel explicite : la clause averbale est soit rattachée à la situation d&#x27;énonciation immédiate (exclamation, ordre spontané), soit détachée de toute temporalité particulière (proverbes, définitions).\n\nLes valeurs de la relation averbale correspondent exactement aux valeurs du verbe « être ». 1.1 Clause averbale attributive Elle installe une relation entre un support (sujet logique) et une propriété (prédicat). Structure binaire ou unaire."}, {"id": "res_guide_102", "chapter": "Guide UNIL — 1. La clause averbale", "source": "Guide UNIL", "front": "✏️ Exemple de <em>1. La clause averbale</em>", "back": "&quot;Englouti, le gâteau.&quot; → prédicat (englouti) puis support (le gâteau) &quot;Chauds les marrons !&quot; → prédicat puis support &quot;Stationnement interdit.&quot; → support puis propriété (ordre thème-rhème ordinaire)"}, {"id": "res_guide_103", "chapter": "Guide UNIL — 1. La clause averbale", "source": "Guide UNIL", "front": "✏️ Exemple de <em>1. La clause averbale</em>", "back": "&quot;Encore un client !&quot; / &quot;Tiens, un revenant !&quot; / &quot;Ciel, mon mari !&quot; → signifie « il y a », « il existe » 1.3 Clause thétique"}, {"id": "res_guide_104", "chapter": "Guide UNIL — 1. La clause averbale", "source": "Guide UNIL", "front": "Qu'est-ce que <em>La CLAUSE THÉTIQUE</em>&nbsp;?", "back": "La CLAUSE THÉTIQUE est une clause averbale à un seul terme qui POSE un objet de discours (le thème), sans rien en dire. Elle active un référent en mémoire pour que la clause suivante puisse en parler.\n\n&quot;Harpagon – Ô ma chère cassette !&quot; → Harpagon pose d&#x27;abord l&#x27;objet (sa cassette) avant de pouvoir en parler. 1.4 Valeurs pragmatiques de la clause averbale La clause averbale est particulièrement adaptée à : • L&#x27;immédiateté du vécu (exclamations, style de la notation) • L&#x27;expressivité (plus l&#x27;expressivité augmente, moins la structure grammaticale est complexe : Gustave Guillaume) • L&#x27;intemporalité des vérités générales (proverbes : &quot;Tel père, tel fils.&quot;, &quot;À bon chat, bon rat.&quot;) • Le monologue intérieur, la notation brute de perceptions"}, {"id": "res_guide_105", "chapter": "Guide UNIL — 2. La clause infinitive", "source": "Guide UNIL", "front": "Définir&nbsp;: <em>2. La clause infinitive</em>", "back": "La CLAUSE INFINITIVE a un verbe à l&#x27;infinitif (non conjugué). Elle se distingue des infinitifs en fonction nominale.\n\nDeux propriétés caractéristiques :\n1. Le verbe non conjugué → procès non actualisé, présenté dans sa virtualité (in posse, non in esse)\n2. Le sujet n&#x27;est pas exprimé (ou sous forme disjointe : &quot;Moi, mentir ?&quot;) Valeurs fréquentes de la clause infinitive : • Délibérative : Délibérative / interrogative : &quot;Où fuir ?&quot; / &quot;Que faire ?&quot; (= délibération intérieure) • Exclamative : Exclamative : &quot;Ah ! Trouver le repos !&quot; (désir non assouvi) • Instructionnelle : Instructionnelle / injonctive : &quot;Ne pas se pencher au-dehors.&quot; / consignes de recettes • Tour « de + inf. » : Construction avec « de » + infinitif : &quot;Et tous de rire.&quot; (avec un terme nominal contrôleur)"}, {"id": "res_guide_106", "chapter": "Guide UNIL — 3. La clause à présentatif", "source": "Guide UNIL", "front": "Qu'est-ce que <em>Les PRÉSENTATIFS sont</em>&nbsp;?", "back": "Les PRÉSENTATIFS sont : voici, voilà, il y a, c&#x27;est.\n\nIls entrent dans la structure : présentatif + GN, fonctionnant comme une proposition sans toutes ses caractéristiques morphosyntaxiques.\n\nEffet principal : le présentatif confère le statut de RHÈME à ce qu&#x27;il introduit → toute l&#x27;information est nouvelle.\n\nOrigine déictique : les présentatifs renvoient à la situation d&#x27;énonciation (&quot;voici la photo&quot;). Utilisés dans les récits, ils créent un effet de point de vue subjectif."}, {"id": "res_guide_107", "chapter": "Guide UNIL — 3. La clause à présentatif", "source": "Guide UNIL", "front": "✏️ Exemple de <em>3. La clause à présentatif</em>", "back": "&quot;Il se retourna ; c&#x27;était Caille qui venait.&quot; (Ramuz, 1941) vs. &quot;Il se retourna et vit Caille qui venait.&quot; (1931) → « c&#x27;était » (présentatif) : présente Caille comme surgissant dans le champ perceptif du personnage (point de vue interne)."}, {"id": "res_guide_108", "chapter": "Guide UNIL — 3. La clause à présentatif", "source": "Guide UNIL", "front": "⚠️ Ne pas confondre — <em>3. La clause à présentatif</em>", "back": "Ne pas confondre : • • Distinction : dans la clivée, le « c&#x27;est » extrait un constituant qui est RHÈME EXCLUSIF (réponse à une question). Dans le présentatif, le GN est simplement présenté."}, {"id": "res_guide_109", "chapter": "Guide UNIL — 3. La clause à présentatif", "source": "Guide UNIL", "front": "Clause averbale", "back": "pas de verbe → pas d&#x27;ancrage temporel. Valeur attributive, existentielle ou thétique."}, {"id": "res_guide_110", "chapter": "Guide UNIL — 3. La clause à présentatif", "source": "Guide UNIL", "front": "Clause thétique", "back": "pose un référent en mémoire (thème seul, sans rhème)."}, {"id": "res_guide_111", "chapter": "Guide UNIL — 3. La clause à présentatif", "source": "Guide UNIL", "front": "Clause infinitive", "back": "verbe non conjugué → procès virtuel, sujet non exprimé."}, {"id": "res_guide_112", "chapter": "Guide UNIL — 3. La clause à présentatif", "source": "Guide UNIL", "front": "Présentatifs (voici, voilà, il y a, c&#x27;est)", "back": "confèrent le statut de rhème à ce qu&#x27;ils introduisent."}, {"id": "res_guide_113", "chapter": "Guide UNIL — 3. La clause à présentatif", "source": "Guide UNIL", "front": "Clause averbale &amp; intemporalité", "back": "parfaite pour les proverbes et vérités générales."}, {"id": "res_guide_114", "chapter": "Guide UNIL — CHAPITRE 6 — Extensions du groupe nominal", "source": "Guide UNIL", "front": "Définir&nbsp;: <em>1. L&#x27;adjectif épithète</em>", "back": "Quand l&#x27;adjectif est intégré au GN (sans médiation verbale), il est ÉPITHÈTE.\n\nDeux fonctions sémantiques possibles :\n— RESTRICTIF : restreint l&#x27;extension du GN (identifie un sous-ensemble). &quot;L&#x27;homme juste est libre.&quot; → seulement les hommes justes.\n— DESCRIPTIF : enrichit la représentation d&#x27;un référent déjà identifié, sans restreindre l&#x27;extension. &quot;L&#x27;enfant réprimandait son père maladroit.&quot; → maladroit = qualité supplémentaire.\n\nCes deux fonctions sont INTERPRÉTATIVES : c&#x27;est le contexte qui décide. 1.2 Position de l&#x27;adjectif épithète Le français admet deux positions pour l&#x27;adjectif épithète. La position dominante est la POSTPOSITION (2 fois sur 3). Mais plusieurs facteurs influencent le choix : Facteurs rythmiques • • Types d&#x27;adjectifs • • Sens de la position"}, {"id": "res_guide_115", "chapter": "Guide UNIL — CHAPITRE 6 — Extensions du groupe nominal", "source": "Guide UNIL", "front": "✏️ Exemple de <em>1. L&#x27;adjectif épithète</em>", "back": "&quot;un type pauvre&quot; (post.) = un homme qui manque d&#x27;argent (qualité contingente, factuelle) &quot;un pauvre type&quot; (ant.) = un être moralement pitoyable (sous-classe morale, implication subjective) Épithète de nature : adjectif antéposé exprimant une qualité INHÉRENTE à la catégorie du no…"}, {"id": "res_guide_116", "chapter": "Guide UNIL — 1. L&#x27;adjectif épithète", "source": "Guide UNIL", "front": "Définir&nbsp;: <em>1. L&#x27;adjectif épithète</em>", "back": "Quand l&#x27;adjectif est intégré au GN (sans médiation verbale), il est ÉPITHÈTE.\n\nDeux fonctions sémantiques possibles :\n— RESTRICTIF : restreint l&#x27;extension du GN (identifie un sous-ensemble). &quot;L&#x27;homme juste est libre.&quot; → seulement les hommes justes.\n— DESCRIPTIF : enrichit la représentation d&#x27;un référent déjà identifié, sans restreindre l&#x27;extension. &quot;L&#x27;enfant réprimandait son père maladroit.&quot; → maladroit = qualité supplémentaire.\n\nCes deux fonctions sont INTERPRÉTATIVES : c&#x27;est le contexte qui décide. 1.2 Position de l&#x27;adjectif épithète Le français admet deux positions pour l&#x27;adjectif épithète. La position dominante est la POSTPOSITION (2 fois sur 3). Mais plusieurs facteurs influencent le choix : Facteurs rythmiques • • Types d&#x27;adjectifs • • Sens de la position"}, {"id": "res_guide_117", "chapter": "Guide UNIL — 1. L&#x27;adjectif épithète", "source": "Guide UNIL", "front": "✏️ Exemple de <em>1. L&#x27;adjectif épithète</em>", "back": "&quot;un type pauvre&quot; (post.) = un homme qui manque d&#x27;argent (qualité contingente, factuelle) &quot;un pauvre type&quot; (ant.) = un être moralement pitoyable (sous-classe morale, implication subjective) Épithète de nature : adjectif antéposé exprimant une qualité INHÉRENTE à la catégorie du no…"}, {"id": "res_guide_118", "chapter": "Guide UNIL — 3. Les constructions détachées (CD)", "source": "Guide UNIL", "front": "Définir&nbsp;: <em>3. Les constructions détachées (CD)</em>", "back": "Une CONSTRUCTION DÉTACHÉE (CD) est une extension EXTERNE au GN, séparée par des virgules (ou une pause à l&#x27;oral). Elle entretient une relation PRÉDICATIVE avec son GN de rattachement (on peut la paraphraser par « être »).\n\nPropriétés :\n1. Elle est DÉTACHÉE prosodiquement / par virgules.\n2. Elle porte sur un GN de RATTACHEMENT (contrôleur).\n3. Elle est une prédication RÉDUITE (sans verbe) → hors portée de la négation. 3.1 CD adjectivale (épithète détachée) L&#x27;adjectif détaché accorde avec son GN de rattachement, mais peut être placé à distance. Il entretient une relation logique avec la prédication principale."}, {"id": "res_guide_119", "chapter": "Guide UNIL — 3. Les constructions détachées (CD)", "source": "Guide UNIL", "front": "✏️ Exemple de <em>3. Les constructions détachées (CD)</em>", "back": "&quot;La bête, furieuse, l&#x27;enveloppait du battement de ses ailes.&quot; &quot;Furieuse, la bête l&#x27;enveloppait...&quot; → la fureur CAUSE ou PRÉCÈDE l&#x27;action principale &quot;La bête l&#x27;enveloppait..., furieuse.&quot; → la fureur RÉSULTE de l&#x27;action ou est concomitante"}, {"id": "res_guide_120", "chapter": "Guide UNIL — 3. Les constructions détachées (CD)", "source": "Guide UNIL", "front": "✏️ Exemple de <em>3. Les constructions détachées (CD)</em>", "back": "&quot;Ils s&#x27;avançaient d&#x27;un pas tranquille, jetant des saluts au capitaine.&quot; (Flaubert) → &quot;jetant des saluts&quot; est un procès d&#x27;arrière-plan, simultané à l&#x27;avancée. Le gérondif (en + participe) : porte sur le VERBE de la clause, non sur un nom. Valeur circonstancielle de moyen ou manièr…"}, {"id": "res_guide_121", "chapter": "Guide UNIL — 3. Les constructions détachées (CD)", "source": "Guide UNIL", "front": "Définir&nbsp;: <em>3. Les constructions détachées (CD)</em>", "back": "L&#x27;APPOSITION est une CD à tête nominale. Elle a le MÊME RÉFÉRENT que le GN de rattachement. Elle apporte un éclairage supplémentaire, en dehors de la portée de la négation (son contenu est présenté comme acquis, indiscutable).\n\nRégimes de détermination :\n— Apposition avec DÉT DÉFINI : identification (mise en relief) : &quot;La femme, la fille d&#x27;Hamilcar elle-même, apparut...&quot;\n— Apposition avec DÉT INDÉFINI : catégorisation (première mention) : &quot;Kapouras, un marchand très illustre...&quot;\n— Apposition SANS DÉT : description ou définition : &quot;des scorpions, fouets à triples lanières...&quot;"}, {"id": "res_guide_122", "chapter": "Guide UNIL — 4. Les constructions absolues", "source": "Guide UNIL", "front": "Définir&nbsp;: <em>4. Les constructions absolues</em>", "back": "Les CONSTRUCTIONS ABSOLUES sont des GN détachés dont la relation avec le reste de l&#x27;énoncé n&#x27;est pas marquée formellement. Elles expriment une relation méronymique (partie-tout) avec leur contrôleur.\n\nStructure sous-jacente : GN + avoir + partie du corps + qui + être + adj.\n\n&quot;Un homme entra, les pieds saignants, la ceinture dénouée.&quot; → structure non marquée, descriptive."}, {"id": "res_guide_123", "chapter": "Guide UNIL — 5. Les propositions relatives", "source": "Guide UNIL", "front": "Adjectif épithète", "back": "restrictif (identifie) ou descriptif (enrichit) → interprétation contextuelle."}, {"id": "res_guide_124", "chapter": "Guide UNIL — 5. Les propositions relatives", "source": "Guide UNIL", "front": "⭐ À retenir — <em>5. Les propositions relatives</em>", "back": "Position antéposée → saisie synthétique, qualité intrinsèque/subjective. Postposée → analytique, objective."}, {"id": "res_guide_125", "chapter": "Guide UNIL — 5. Les propositions relatives", "source": "Guide UNIL", "front": "⭐ À retenir — <em>5. Les propositions relatives</em>", "back": "Adjectifs relationnels → toujours postposés. Adjectifs du 3e type (pur, vrai, simple) → toujours antéposés."}, {"id": "res_guide_126", "chapter": "Guide UNIL — 5. Les propositions relatives", "source": "Guide UNIL", "front": "⭐ À retenir — <em>5. Les propositions relatives</em>", "back": "CD = construction détachée (virgules) + relation prédicative avec un GN contrôleur + hors portée de la négation."}, {"id": "res_guide_127", "chapter": "Guide UNIL — 5. Les propositions relatives", "source": "Guide UNIL", "front": "⭐ À retenir — <em>5. Les propositions relatives</em>", "back": "Apposition sans déterminant = description/définition. Défini = identification. Indéfini = catégorisation."}, {"id": "res_guide_128", "chapter": "Guide UNIL — 5. Les propositions relatives", "source": "Guide UNIL", "front": "⭐ À retenir — <em>5. Les propositions relatives</em>", "back": "Relative déterminative (sans virgule) = restrictive. Relative explicative (avec virgules) = descriptive."}, {"id": "res_guide_129", "chapter": "Guide UNIL — CHAPITRE 7 — Extension du GV, circonstants et modalisateurs", "source": "Guide UNIL", "front": "✏️ Exemple de <em>1. Compléments valenciels vs. circonstanciels vs. circonstants</em>", "back": "(a) Gustave va à Croisset → VALENCIEL : la destination est exigée par « aller » (b) Gustave travaille à Croisset → CIRCONSTANCIEL : situe spatialement le procès (c) À Croisset, Gustave travaille → CIRCONSTANT : cadre de validité de toute la prédication"}, {"id": "res_guide_130", "chapter": "Guide UNIL — 1. Compléments valenciels vs. circonstanciels vs. circonstants", "source": "Guide UNIL", "front": "✏️ Exemple de <em>1. Compléments valenciels vs. circonstanciels vs. circonstants</em>", "back": "(a) Gustave va à Croisset → VALENCIEL : la destination est exigée par « aller » (b) Gustave travaille à Croisset → CIRCONSTANCIEL : situe spatialement le procès (c) À Croisset, Gustave travaille → CIRCONSTANT : cadre de validité de toute la prédication"}, {"id": "res_guide_131", "chapter": "Guide UNIL — 2. Comment identifier les circonstants : critères", "source": "Guide UNIL", "front": "✏️ Exemple de <em>2. Comment identifier les circonstants : critères</em>", "back": "&quot;Mon bus n&#x27;est pas parti, à 8 heures...&quot; → si &quot;à 8 heures&quot; est contesté par la négation : CIRCONSTANCIEL (l&#x27;heure est ce qui est nié) → si &quot;à 8 heures&quot; n&#x27;est pas contesté (on parle de ce qui s&#x27;est passé à 8h) : CIRCONSTANT"}, {"id": "res_guide_132", "chapter": "Guide UNIL — 4. Compléments modalisateurs", "source": "Guide UNIL", "front": "Définir&nbsp;: <em>4. Compléments modalisateurs</em>", "back": "Les MODALISATEURS sont des adverbes ou GPrép en position périphérique. Ils portent sur l&#x27;entier de la prédication mais ne la situent pas dans le temps ou l&#x27;espace : ils modalisent.\n\nDeux types :\n— MODALISATEURS D&#x27;ÉNONCÉ : l&#x27;énonciateur juge le fait rapporté. &quot;Étrangement, Daniel court désormais.&quot; → &quot;il est étrange que Daniel coure&quot; → paraphrase : &quot;pour lui, c&#x27;est étrange que P&quot;.\n— MODALISATEURS D&#x27;ÉNONCIATION : l&#x27;énonciateur décrit son propre acte d&#x27;énonciation. &quot;Franchement, il abuse du bavardage.&quot; → &quot;je le dis franchement, il abuse...&quot; → paraphrase : &quot;je le dis franchement&quot;."}, {"id": "res_guide_133", "chapter": "Guide UNIL — 4. Compléments modalisateurs", "source": "Guide UNIL", "front": "Valenciel ≠ circonstanciel ≠ circonstant", "back": "trois niveaux de complémentation."}, {"id": "res_guide_134", "chapter": "Guide UNIL — 4. Compléments modalisateurs", "source": "Guide UNIL", "front": "Test de la négation", "back": "le meilleur critère pour distinguer circonstanciel (rhème) et circonstant (thème/cadre)."}, {"id": "res_guide_135", "chapter": "Guide UNIL — 4. Compléments modalisateurs", "source": "Guide UNIL", "front": "⭐ À retenir — <em>4. Compléments modalisateurs</em>", "back": "Circonstant en tête = cadre préétabli ; en fin = restriction a posteriori."}, {"id": "res_guide_136", "chapter": "Guide UNIL — 4. Compléments modalisateurs", "source": "Guide UNIL", "front": "Modalisateur d&#x27;énoncé", "back": "juge le contenu de la prédication. D&#x27;énonciation : porte sur l&#x27;acte de parole."}, {"id": "res_guide_137", "chapter": "Guide UNIL — CHAPITRE 8 — Syntaxe de la clause complexe", "source": "Guide UNIL", "front": "✏️ Exemple de <em>1. La subordination</em>", "back": "&quot;ma mère et sa petite fille se promenant au dehors, j&#x27;ai été seul...&quot; → &quot;ma mère... se promenant&quot; = contrôleur propre (ma mère ≠ sujet principal j&#x27;) 1.5 Cas des subordonnées adjointes"}, {"id": "res_guide_138", "chapter": "Guide UNIL — CHAPITRE 8 — Syntaxe de la clause complexe", "source": "Guide UNIL", "front": "Définir&nbsp;: <em>1. La subordination</em>", "back": "Certaines propositions introduites par un mot subordonnant (puisque, bien que, si…) ne sont pas véritablement enchâssées : elles se situent sur un autre plan discursif.\n\nTest d&#x27;identification : une subordonnée adjointe ne peut pas s&#x27;intégrer dans une clivée.\n&quot;Si tu as soif, il y a de la bière dans le frigo.&quot; → *C&#x27;est si tu as soif qu&#x27;il y a de la bière ? → ne fonctionne pas → adjointe."}, {"id": "res_guide_139", "chapter": "Guide UNIL — 1. La subordination", "source": "Guide UNIL", "front": "✏️ Exemple de <em>1. La subordination</em>", "back": "&quot;ma mère et sa petite fille se promenant au dehors, j&#x27;ai été seul...&quot; → &quot;ma mère... se promenant&quot; = contrôleur propre (ma mère ≠ sujet principal j&#x27;) 1.5 Cas des subordonnées adjointes"}, {"id": "res_guide_140", "chapter": "Guide UNIL — 1. La subordination", "source": "Guide UNIL", "front": "Définir&nbsp;: <em>1. La subordination</em>", "back": "Certaines propositions introduites par un mot subordonnant (puisque, bien que, si…) ne sont pas véritablement enchâssées : elles se situent sur un autre plan discursif.\n\nTest d&#x27;identification : une subordonnée adjointe ne peut pas s&#x27;intégrer dans une clivée.\n&quot;Si tu as soif, il y a de la bière dans le frigo.&quot; → *C&#x27;est si tu as soif qu&#x27;il y a de la bière ? → ne fonctionne pas → adjointe."}, {"id": "res_guide_141", "chapter": "Guide UNIL — 2. La corrélation", "source": "Guide UNIL", "front": "Définir&nbsp;: <em>2. La corrélation</em>", "back": "Dans la CORRÉLATION, deux propositions sont interdépendantes (aucune ne peut être supprimée sans l&#x27;autre), marquées par deux morphèmes de corrélation, l&#x27;un dans chaque membre.\n\n— Système comparatif : &quot;plus... plus...&quot;, &quot;autant... autant...&quot;, &quot;tel... tel...&quot;\n— Système consécutif : &quot;si... que...&quot;, &quot;tant... que...&quot;\n\nExemple : &quot;Plus les ailes sont grandes, plus l&#x27;envergure est douloureuse.&quot;"}, {"id": "res_guide_142", "chapter": "Guide UNIL — 2. La corrélation", "source": "Guide UNIL", "front": "⭐ À retenir — <em>2. La corrélation</em>", "back": "Clause COMPLEXE (subordination, avec rection) ≠ phrase MULTIPLE (juxtaposition/coordination, sans rection)."}, {"id": "res_guide_143", "chapter": "Guide UNIL — 2. La corrélation", "source": "Guide UNIL", "front": "Complétives", "back": "dépendent de verbes psychologiques. Introduites par « que » ou à l&#x27;infinitif."}, {"id": "res_guide_144", "chapter": "Guide UNIL — 2. La corrélation", "source": "Guide UNIL", "front": "Circonstancielles", "back": "valeur déterminée par la conjonction. Peuvent être thématiques (en tête) ou rhématiques."}, {"id": "res_guide_145", "chapter": "Guide UNIL — 2. La corrélation", "source": "Guide UNIL", "front": "⭐ À retenir — <em>2. La corrélation</em>", "back": "Participiales sans subordonnant = circostancielles si contrôleur propre ≠ sujet principal."}, {"id": "res_guide_146", "chapter": "Guide UNIL — 2. La corrélation", "source": "Guide UNIL", "front": "Adjointe", "back": "ne peut pas s&#x27;intégrer dans une clivée. Se situe sur un autre plan discursif."}, {"id": "res_guide_147", "chapter": "Guide UNIL — 2. La corrélation", "source": "Guide UNIL", "front": "Corrélation", "back": "interdépendance marquée par deux morphèmes (plus…plus…, si…que…)."}, {"id": "res_guide_148", "chapter": "Guide UNIL — CHAPITRE 9 — Composition de la phrase graphique", "source": "Guide UNIL", "front": "Qu'est-ce que <em>PARATAXE</em>&nbsp;?", "back": "PARATAXE : mise en relation de clauses autonomes (sans emboîtement, sans lien de rection). Deux types :\n\n— JUXTAPOSITION : clauses reliées par la seule contiguïté (virgule ou point-virgule). Le lecteur reconstitue le lien implicite.\n— COORDINATION : présence d&#x27;un terme de liaison (conjonction de coordination : mais, ou, et, or, ni, car, puis). Le coordonnant « et » peut exprimer des relations très diverses : succession temporelle, conséquence, voire opposition. Le contexte interprète."}, {"id": "res_guide_149", "chapter": "Guide UNIL — CHAPITRE 9 — Composition de la phrase graphique", "source": "Guide UNIL", "front": "✏️ Exemple de <em>1. Juxtaposition et coordination</em>", "back": "&quot;La pluie tombe, les voiles des barques sont noires, des paysannes en parapluie passent, des marins crient, je m&#x27;ennuie !&quot; (Flaubert) → Juxtaposition : 5 clauses autonomes. &quot;Je m&#x27;ennuie&quot; est le dénominateur commun implicite. L&#x27;accumulation mime l&#x27;ennui."}, {"id": "res_guide_150", "chapter": "Guide UNIL — 1. Juxtaposition et coordination", "source": "Guide UNIL", "front": "Qu'est-ce que <em>PARATAXE</em>&nbsp;?", "back": "PARATAXE : mise en relation de clauses autonomes (sans emboîtement, sans lien de rection). Deux types :\n\n— JUXTAPOSITION : clauses reliées par la seule contiguïté (virgule ou point-virgule). Le lecteur reconstitue le lien implicite.\n— COORDINATION : présence d&#x27;un terme de liaison (conjonction de coordination : mais, ou, et, or, ni, car, puis). Le coordonnant « et » peut exprimer des relations très diverses : succession temporelle, conséquence, voire opposition. Le contexte interprète."}, {"id": "res_guide_151", "chapter": "Guide UNIL — 1. Juxtaposition et coordination", "source": "Guide UNIL", "front": "✏️ Exemple de <em>1. Juxtaposition et coordination</em>", "back": "&quot;La pluie tombe, les voiles des barques sont noires, des paysannes en parapluie passent, des marins crient, je m&#x27;ennuie !&quot; (Flaubert) → Juxtaposition : 5 clauses autonomes. &quot;Je m&#x27;ennuie&quot; est le dénominateur commun implicite. L&#x27;accumulation mime l&#x27;ennui."}, {"id": "res_guide_152", "chapter": "Guide UNIL — 2. L&#x27;insertion parenthétique", "source": "Guide UNIL", "front": "Définir&nbsp;: <em>2. L&#x27;insertion parenthétique</em>", "back": "Les INSERTIONS PARENTHÉTIQUES sont des clauses qui s&#x27;insèrent dans une autre clause sans entretenir de relation syntaxique avec elle. Fonction méta-énonciative.\n\n— INCISES (de discours rapporté) : indiquent la source énonciative. &quot;Elle s&#x27;embête, m&#x27;a-t-elle dit, énormément.&quot;\n— INCIDENTES (de modalisation) : commentent ou modalisent l&#x27;assertion de la clause hôte. &quot;Bouilhet, je crois, viendra avec moi.&quot;"}, {"id": "res_guide_153", "chapter": "Guide UNIL — 3. La dislocation", "source": "Guide UNIL", "front": "Définir&nbsp;: <em>3. La dislocation</em>", "back": "La DISLOCATION stratifie l&#x27;opération informationnelle en deux phases syntaxiquement autonomes :\n— PHASE 1 (clause averbale thétique) : pose le THÈME\n— PHASE 2 (clause prédicative avec reprise pronominale) : apporte le RHÈME 3.1 Dislocation à gauche"}, {"id": "res_guide_154", "chapter": "Guide UNIL — 3. La dislocation", "source": "Guide UNIL", "front": "Qu'est-ce que <em>Structure</em>&nbsp;?", "back": "Structure : [THÈME (GN autonome)], [RHÈME (clause avec pronom reprenant le thème)].\n\nLe thème est posé en avance du programme syntaxique. C&#x27;est une façon de thématiser n&#x27;importe quel constituant, même si sa fonction syntaxique dans la prédication serait rhématique.\n\n&quot;Ce pauvre Pradier, je le regrette !&quot; / &quot;Ces glaces, le marchand les vend en cornet.&quot; 3.2 Dislocation à droite"}, {"id": "res_guide_155", "chapter": "Guide UNIL — 3. La dislocation", "source": "Guide UNIL", "front": "Qu'est-ce que <em>Structure</em>&nbsp;?", "back": "Structure : [clause prédicative avec pronom] [THÈME (GN identifiant le pronom)].\n\nL&#x27;information permettant d&#x27;identifier le référent du pronom arrive après la prédication. Valeur expressive, d&#x27;insistance.\n\n&quot;Il a les pattes sales, Béranger !&quot; / &quot;Ça s&#x27;achète cher, le style !&quot; 3.3 Le tour équatif"}, {"id": "res_guide_156", "chapter": "Guide UNIL — 3. La dislocation", "source": "Guide UNIL", "front": "Qu'est-ce que <em>Le TOUR ÉQUATIF</em>&nbsp;?", "back": "Le TOUR ÉQUATIF est une variante de la dislocation fréquente à l&#x27;écrit :\nStructure : [THÈME (clause thétique)] c&#x27;est [RHÈME (GN identificateur)]\n\nMouvement : catégorisation du thème (attente) → identification par le rhème (résolution).\n\n&quot;Son angoisse, c&#x27;est le jugement des autres.&quot; / &quot;Sa force : la confiance en lui.&quot; (les deux-points signalent ce mouvement à l&#x27;écrit)"}, {"id": "res_guide_157", "chapter": "Guide UNIL — 4. Complément après point", "source": "Guide UNIL", "front": "✏️ Exemple de <em>4. Complément après point</em>", "back": "&quot;Pour six mois.&quot; (GPrép après un point complet — Roubaud) &quot;Le président est arrivé. À midi. Seul.&quot; (écriture journalistique) Deux effets caractéristiques :"}, {"id": "res_guide_158", "chapter": "Guide UNIL — 4. Complément après point", "source": "Guide UNIL", "front": "⭐ À retenir — <em>4. Complément après point</em>", "back": "Parataxe (juxtaposition + coordination) ≠ hypotaxe (subordination)."}, {"id": "res_guide_159", "chapter": "Guide UNIL — 4. Complément après point", "source": "Guide UNIL", "front": "⭐ À retenir — <em>4. Complément après point</em>", "back": "Incise = source énonciative. Incidente = modalisation de l&#x27;énonciation."}, {"id": "res_guide_160", "chapter": "Guide UNIL — 4. Complément après point", "source": "Guide UNIL", "front": "Dislocation à gauche", "back": "THÈME posé d&#x27;abord (avant programme syntaxique)."}, {"id": "res_guide_161", "chapter": "Guide UNIL — 4. Complément après point", "source": "Guide UNIL", "front": "Dislocation à droite", "back": "identification du référent du pronom APRÈS la prédication → valeur expressive."}, {"id": "res_guide_162", "chapter": "Guide UNIL — 4. Complément après point", "source": "Guide UNIL", "front": "Tour équatif", "back": "TH c&#x27;est RH → attente + résolution."}, {"id": "res_guide_163", "chapter": "Guide UNIL — 4. Complément après point", "source": "Guide UNIL", "front": "⭐ À retenir — <em>4. Complément après point</em>", "back": "Complément après point → effet focalisateur (mise en relief) ou dynamique (surprise/repentir)."}, {"id": "res_resume_164", "chapter": "Résumé — 2. La langue : institution culturelle et objet naturel", "source": "Résumé", "front": "La relation entre l&#x27;expression et le contenu d&#x27;un signe linguistique est ARBITRAIRE", "back": "elle n&#x27;est pas choisie consciemment mais résulte du système de la langue. Ce que Saussure appelle le principe d&#x27;arbitraire du signe."}, {"id": "res_resume_165", "chapter": "Résumé — 4. Les niveaux d&#x27;analyse linguistique", "source": "Résumé", "front": "⭐ À retenir — <em>4. Les niveaux d&#x27;analyse linguistique</em>", "back": "Les unités d&#x27;un niveau s&#x27;identifient par leur capacité à DISTINGUER les unités du niveau supérieur. Les phonèmes distinguent les morphèmes ; les morphèmes construisent les syntagmes ; les syntagmes s&#x27;organisent en clauses."}, {"id": "res_resume_166", "chapter": "Résumé — Chapitre 1 — Phonétique, phonologie et graphémique du français", "source": "Résumé", "front": "⭐ À retenir — <em>1.1. Les types de sons : voyelles, consonnes, glides</em>", "back": "Le &quot;trapèze vocalique&quot; est un schéma qui représente la bouche tournée vers la gauche et classe les voyelles selon leur point d&#x27;articulation (axe horizontal) et leur aperture (axe vertical)."}, {"id": "res_resume_167", "chapter": "Résumé — Chapitre 1 — Phonétique, phonologie et graphémique du français", "source": "Résumé", "front": "⭐ À retenir — <em>1.1. Les types de sons : voyelles, consonnes, glides</em>", "back": "Les consonnes"}, {"id": "res_resume_168", "chapter": "Résumé — Chapitre 1 — Phonétique, phonologie et graphémique du français", "source": "Résumé", "front": "Une consonne suppose un flux d&#x27;air OBSTRUÉ. On les classe selon 4 critères", "back": "(1) mode d&#x27;obstruction (occlusif = explosion brusque, ou constrictif = friction) ; (2) voisement (sonore si les cordes vocales vibrent, sourd sinon) ; (3) point d&#x27;articulation (où dans la bouche) ; (4) oralité/nasalité."}, {"id": "res_resume_169", "chapter": "Résumé — Chapitre 1 — Phonétique, phonologie et graphémique du français", "source": "Résumé", "front": "Paires sourde/sonore", "back": "/p/ vs /b/ (bilabiales) ; /t/ vs /d/ (dentales) ; /k/ vs /g/ (vélaires) ; /f/ vs /v/ (labio-dentales) ; /s/ vs /z/ (alvéolaires)."}, {"id": "res_resume_170", "chapter": "Résumé — Chapitre 1 — Phonétique, phonologie et graphémique du français", "source": "Résumé", "front": "⭐ À retenir — <em>1.1. Les types de sons : voyelles, consonnes, glides</em>", "back": "Les glides (semi-voyelles ou semi-consonnes)"}, {"id": "res_resume_171", "chapter": "Résumé — Chapitre 1 — Phonétique, phonologie et graphémique du français", "source": "Résumé", "front": "Les glides sont des sons intermédiaires entre voyelle et consonne. Il y en a 3 en français", "back": "[j] (&quot;yod&quot;) comme dans &quot;yeux&quot; ou &quot;pied&quot; ; [w] comme dans &quot;oui&quot; ou &quot;fouet&quot; ; [ɥ] comme dans &quot;puis&quot; ou &quot;nuit&quot;."}, {"id": "res_resume_172", "chapter": "Résumé — Chapitre 1 — Phonétique, phonologie et graphémique du français", "source": "Résumé", "front": "Les glides apparaissent quand les voyelles /i/, /u/, /y/ rencontrent une autre voyelle", "back": "plutôt que de créer un hiatus (deux syllabes), elles se transforment en glide pour assurer une transition fluide."}, {"id": "res_resume_173", "chapter": "Résumé — Chapitre 1 — Phonétique, phonologie et graphémique du français", "source": "Résumé", "front": "[j]", "back": "/sjé/ (scier) — mais /tRijé/ (trier) : deux consonnes avant → la voyelle reste.\n[w] : /fwɛ/ (fouet) — mais /klue/ (clouer) : deux consonnes avant → voyelle maintenue."}, {"id": "res_resume_174", "chapter": "Résumé — 1. Éléments de phonétique", "source": "Résumé", "front": "⭐ À retenir — <em>1.1. Les types de sons : voyelles, consonnes, glides</em>", "back": "Le &quot;trapèze vocalique&quot; est un schéma qui représente la bouche tournée vers la gauche et classe les voyelles selon leur point d&#x27;articulation (axe horizontal) et leur aperture (axe vertical)."}, {"id": "res_resume_175", "chapter": "Résumé — 1. Éléments de phonétique", "source": "Résumé", "front": "⭐ À retenir — <em>1.1. Les types de sons : voyelles, consonnes, glides</em>", "back": "Les consonnes"}, {"id": "res_resume_176", "chapter": "Résumé — 1. Éléments de phonétique", "source": "Résumé", "front": "Une consonne suppose un flux d&#x27;air OBSTRUÉ. On les classe selon 4 critères", "back": "(1) mode d&#x27;obstructio
