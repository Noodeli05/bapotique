<style>
/* ── Layout ── */
html,body{height:100%;overflow:hidden}
body{display:flex;flex-direction:column}
.cm-layout{display:flex;flex-direction:column;flex:1;min-height:0}

/* ── Controls bar ── */
.cm-controls{display:flex;align-items:center;gap:.65rem;padding:.5rem 1rem;background:rgba(19,17,26,0.55);border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0;flex-wrap:wrap}
[data-theme="light"] .cm-controls{background:rgba(245,243,248,0.7);border-bottom-color:rgba(120,100,180,0.12)}
.cm-tabs{display:flex;gap:.28rem}
.cm-tab{font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:600;padding:.28rem .7rem;border-radius:20px;border:1px solid rgba(255,255,255,0.10);background:none;color:rgba(232,228,240,.55);cursor:pointer;transition:all .15s}
.cm-tab:hover{border-color:rgba(200,184,240,.35);color:rgba(232,228,240,.85)}
.cm-tab.active{background:rgba(200,184,240,.18);border-color:rgba(200,184,240,.4);color:#c8b8f0}
[data-theme="light"] .cm-tab{color:rgba(26,21,37,0.55);border-color:rgba(120,100,180,0.15)}
[data-theme="light"] .cm-tab.active{background:rgba(120,100,180,0.12);border-color:rgba(120,100,180,0.4);color:#7c6cc0}

.cm-sep{width:1px;height:1.2rem;background:rgba(255,255,255,0.10);flex-shrink:0}
[data-theme="light"] .cm-sep{background:rgba(0,0,0,0.10)}

.cm-legend{display:flex;align-items:center;gap:.55rem;flex-wrap:wrap}
.cm-leg{display:flex;align-items:center;gap:.3rem;font-size:.65rem;color:rgba(232,228,240,.50)}
[data-theme="light"] .cm-leg{color:rgba(26,21,37,.50)}
.cm-leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

.cm-btn-reset{background:none;border:1px solid rgba(255,255,255,0.12);border-radius:7px;padding:.28rem .5rem;cursor:pointer;color:rgba(232,228,240,.45);transition:all .15s;margin-left:auto}
.cm-btn-reset:hover{border-color:rgba(200,184,240,.4);color:#c8b8f0}
[data-theme="light"] .cm-btn-reset{border-color:rgba(120,100,180,0.15);color:rgba(26,21,37,0.45)}

/* ── Canvas ── */
.cm-canvas-wrap{flex:1;min-height:0;position:relative;overflow:hidden;cursor:grab}
.cm-canvas-wrap:active{cursor:grabbing}
#cm-svg{width:100%;height:100%;display:block}

/* ── No-data overlay ── */
.cm-no-data{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;font-size:.85rem;color:rgba(232,228,240,.45);pointer-events:none}
.cm-no-data a{color:var(--lav,#c8b8f0);pointer-events:all}
[data-theme="light"] .cm-no-data{color:rgba(26,21,37,0.45)}

/* ── Info panel ── */
.cm-panel{position:fixed;top:0;right:0;bottom:0;width:300px;max-width:100vw;background:rgba(22,18,32,0.96);border-left:1px solid rgba(200,184,240,0.18);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);z-index:200;overflow:hidden}
.cm-panel.open{transform:translateX(0)}
[data-theme="light"] .cm-panel{background:rgba(240,237,250,0.97);border-left-color:rgba(120,100,180,0.18)}
.cm-panel-head{display:flex;align-items:center;gap:.5rem;padding:.85rem 1rem;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0}
[data-theme="light"] .cm-panel-head{border-bottom-color:rgba(0,0,0,0.08)}
.cm-panel-head h3{flex:1;font-size:.9rem;font-weight:700;color:var(--tx,#e8e4f0);margin:0;line-height:1.3}
#cm-panel-close{background:none;border:none;cursor:pointer;color:rgba(232,228,240,.40);font-size:.9rem;padding:.2rem;border-radius:5px;transition:color .15s;line-height:1}
#cm-panel-close:hover{color:var(--tx,#e8e4f0)}
[data-theme="light"] #cm-panel-close{color:rgba(26,21,37,0.35)}
.cm-panel-body{flex:1;overflow-y:auto;padding:1rem}

/* ── Panel content ── */
.cmp-stats{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.85rem}
.cmp-stat{background:rgba(255,255,255,0.04);border:1px solid;border-radius:10px;padding:.55rem .65rem;text-align:center}
[data-theme="light"] .cmp-stat{background:rgba(255,255,255,0.65)}
.cmp-stat-n{font-size:1.4rem;font-weight:800;font-family:'DM Serif Display',serif;line-height:1}
.cmp-stat-l{font-size:.65rem;color:var(--mu,rgba(232,228,240,.55));margin-top:.18rem}
.cmp-bar-wrap{height:6px;background:rgba(255,255,255,0.07);border-radius:4px;overflow:hidden;margin:.6rem 0 .3rem}
.cmp-bar{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.cmp-bar-label{font-size:.68rem;color:var(--mu,rgba(232,228,240,.55))}
.cmp-chapter-full{margin:.8rem 0 .6rem;padding:.5rem .65rem;background:rgba(255,255,255,0.04);border-radius:8px;font-size:.72rem;color:rgba(232,228,240,.55);line-height:1.55}
[data-theme="light"] .cmp-chapter-full{background:rgba(0,0,0,0.04);color:rgba(26,21,37,0.55)}
.cmp-btn{display:flex;align-items:center;gap:.45rem;width:100%;padding:.55rem .85rem;border-radius:10px;border:none;background:rgba(200,184,240,0.16);color:var(--lav,#c8b8f0);font-size:.8rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;text-decoration:none;transition:background .15s;margin-top:.5rem}
.cmp-btn:hover{background:rgba(200,184,240,0.26)}

/* ── SVG node styles (via JS) ── */
.cm-node{transition:opacity .15s}
.cm-node.cm-node-sel circle:first-child{opacity:0.12!important}

/* ── Mobile ── */
@media(max-width:600px){
  .cm-panel{width:100%;border-left:none;border-top:1px solid rgba(200,184,240,0.18);top:auto;height:60vh;transform:translateY(100%)}
  .cm-panel.open{transform:translateY(0)}
  .cm-controls{padding:.4rem .65rem;gap:.4rem}
  .cm-legend{display:none}
}
</style>

<div class="cm-layout">

<!-- Info panel -->
<div id="cm-panel" class="cm-panel">
  <div class="cm-panel-head">

<script>
/* ─── Data ──────────────────────────────────────────────────────────────────── */
var CARDS = [];
var SM2   = {};
try { CARDS = JSON.parse(localStorage.getItem('bap_cards_cache') || '[]'); } catch(e){}
try { SM2   = JSON.parse(localStorage.getItem('bap_sm2')         || '{}'); } catch(e){}

/* Domain color per dossier index (D0–D10) */
var DOS_DOMAIN_COLOR = ['#c8b8f0','#a8c8f0','#a8c8f0','#a8d8c4','#f0c8a0','#f0c8a0','#f0c8a0','#f0c8a0','#f0c8a0','#f0c8a0','#b8d4b0'];
var DOS_SHORT        = ['Introduction','Phonétique','Graphémique','Morphologie','Clause canonique','Ordre & info','Types de cl.','Gr. nominal','Circonstants','Cl. complexe','Phrase graph.'];

/* ─── Build chapters for a source ───────────────────────────────────────────── */
function buildChapters(srcName) {
  /* Group cards by chapter */
  var groups = {};
  CARDS.filter(function(c){ return c.source === srcName; }).forEach(function(c){
    if (!groups[c.chapter]) groups[c.chapter] = [];
    groups[c.chapter].push(c.id);
  });

  var keys = Object.keys(groups);

  /* Filter to top-level chapters only for UNIL & Résumé */
  if (srcName === 'Guide UNIL') {
    keys = keys.filter(function(k){ return /CHAPITRE|INTRODUCTION/i.test(k) && k.indexOf('—') > -1 && k.split('—').length <= 3; });
  } else if (srcName === 'Résumé') {
    keys = keys.filter(function(k){ return /Chapitre \d/i.test(k); });
  }

  /* Sort: D-number, then chapter number, then alpha */
  keys.sort(function(a, b){
    var da = parseInt((a.match(/^D(\d+)/) || [])[1]);
    var db = parseInt((b.match(/^D(\d+)/) || [])[1]);
    if (!isNaN(da) && !isNaN(db)) return da - db;
    var na = parseInt((a.match(/(\d+)/) || [])[1] || '99');
    var nb = parseInt((b.match(/(\d+)/) || [])[1] || '99');
    if (na !== nb) return na - nb;
    return a.localeCompare(b, 'fr');
  });

  return keys.map(function(ch, i){
    var ids = groups[ch] || [];

    /* For UNIL/Résumé main chapters, also count cards from sub-sections */
    if (srcName === 'Guide UNIL') {
      var cNum = (ch.match(/CHAPITRE (\d+)/i) || ch.match(/CHAPITRE (\d+)/i) || [])[1];
      if (cNum) {
        CARDS.filter(function(c){ return c.source === srcName && new RegExp('^Guide UNIL — ' + cNum + '\\.').test(c.chapter); })
          .forEach(function(c){ if (ids.indexOf(c.id) < 0) ids.push(c.id); });
      }
    } else if (srcName === 'Résumé') {
      var rNum = (ch.match(/Chapitre (\d+)/i) || [])[1];
      if (rNum) {
        CARDS.filter(function(c){ return c.source === srcName && new RegExp('^Résumé — ' + rNum + '\\.').test(c.chapter); })
          .forEach(function(c){ if (ids.indexOf(c.id) < 0) ids.push(c.id); });
      }
    }

    /* Mastery from SM2 */
    var mastered = 0, struggling = 0, seenCount = 0;
    ids.forEach(function(id){
      var d = SM2[id];
      if (!d || !d.reps) return;
      seenCount++;
      if (d.easeFactor >= 2.5 && d.reps >= 3) mastered++;
      else if (d.easeFactor < 2.0) struggling++;
    });
    var total     = ids.length;
    var mastPct   = total > 0 ? Math.round(mastered / total * 100) : 0;
    var seenPct   = total > 0 ? Math.round(seenCount / total * 100) : 0;
    var inProg    = Math.max(0, seenCount - mastered - struggling);
    var unseen    = total - seenCount;

    /* Short labels */
    var dosM = ch.match(/^D(\d+)/);
    var chapM = ch.match(/(?:CHAPITRE|Chapitre) (\d+)/i);
    var introM = /INTRODUCTION/i.test(ch);
    var shortLabel, subLabel;
    if (dosM) {
      var di = parseInt(dosM[1]);
      shortLabel = 'D' + di;
      subLabel   = DOS_SHORT[di] || ch.split('—')[1].trim().split(' ').slice(0,3).join(' ');
    } else if (chapM) {
      shortLabel = 'Ch.' + chapM[1];
      var parts  = ch.split('—');
      subLabel   = (parts[parts.length-1]||'').trim().replace(/^(CHAPITRE|Chapitre) \d+ — /, '').split(' ').slice(0,4).join(' ');
    } else if (introM) {
      shortLabel = 'Intro'; subLabel = 'Linguistique';
    } else {
      shortLabel = 'Ch.' + (i+1); subLabel = ch.split('—').pop().trim().slice(0,20);
    }

    /* Domain color */
    var domainColor;
    if (dosM) {
      domainColor = DOS_DOMAIN_COLOR[parseInt(dosM[1])] || '#f0c8a0';
    } else {
      var cn = parseInt((chapM || [])[1] || '4');
      domainColor = cn <= 1 ? '#a8c8f0' : cn === 2 ? '#a8d8c4' : '#f0c8a0';
    }

    return { ch: ch, source: srcName, ids: ids, total: total, mastered: mastered, struggling: struggling, inProg: inProg, unseen: unseen, seenCount: seenCount, mastPct: mastPct, seenPct: seenPct, shortLabel: shortLabel, subLabel: subLabel, domainColor: domainColor };
  });
}

/* ─── SVG helpers ────────────────────────────────────────────────────────────── */
function svgEl(tag, attrs) {
  var el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  Object.keys(attrs || {}).forEach(function(k){ el.setAttribute(k, attrs[k]); });
  return el;
}

function masteryFill(mastPct, seenPct) {
  if (seenPct === 0) return 'rgba(255,255,255,0.04)';
  if (mastPct >= 70) return 'rgba(168,216,196,0.14)';
  if (mastPct >= 40) return 'rgba(168,200,240,0.11)';
  return 'rgba(240,200,160,0.09)';
}

function masteryStroke(mastPct, seenPct) {
  if (seenPct === 0) return 'rgba(255,255,255,0.20)';
  if (mastPct >= 70) return '#a8d8c4';
  if (mastPct >= 40) return '#a8c8f0';
  return '#f0c8a0';
}

function arcPath(pct, r) {
  if (pct <= 0) return '';
  if (pct >= 99.9) return 'M 0 ' + (-r) + ' A ' + r + ' ' + r + ' 0 1 1 0.001 ' + (-r);
  var a0 = -Math.PI / 2;
  var a1 = a0 + pct / 100 * Math.PI * 2;
  var sx = (r * Math.cos(a0)).toFixed(2), sy = (r * Math.sin(a0)).toFixed(2);
  var ex = (r * Math.cos(a1)).toFixed(2), ey = (r * Math.sin(a1)).toFixed(2);
  return 'M ' + sx + ' ' + sy + ' A ' + r + ' ' + r + ' 0 ' + (pct > 50 ? 1 : 0) + ' 1 ' + ex + ' ' + ey;
}

/* ─── Render ─────────────────────────────────────────────────────────────────── */
var currentSource = 'Révision complète';

function renderMap(srcName) {
  currentSource = srcName;
  var root = document.getElementById('cm-root');
  root.innerHTML = '';

  if (!CARDS.length) {
    document.getElementById('cm-no-data').style.display = 'flex';
    return;
  }
  document.getElementById('cm-no-data').style.display = 'none';

  var svg  = document.getElementById('cm-svg');
  var W    = svg.clientWidth  || 900;
  var H    = svg.clientHeight || 600;
  var cx   = W / 2, cy = H / 2;

  var chapters = buildChapters(srcName);
  if (!chapters.length) {
    root.appendChild(svgEl('text', { x: cx, y: cy, 'text-anchor': 'middle', fill: 'rgba(255,255,255,0.3)', 'font-size': '14', 'font-family': "'DM Sans',sans-serif" })).textContent = 'Aucun chapitre trouvé';
    return;
  }

  var n = chapters.length;
  var R       = Math.min(cx * 0.78, cy * 0.78, n <= 6 ? 180 : n <= 9 ? 210 : 235);
  var nodeR   = Math.min(48, Math.max(32, Math.floor(260 / n)));
  var arcR    = nodeR - 3;
  var arcW    = Math.max(3, Math.min(5, nodeR * 0.1));
  var fontSize_big = Math.max(13, Math.min(17, nodeR * 0.38));
  var fontSize_sub = Math.max(7.5, Math.min(10, nodeR * 0.22));

  /* Overall stats */
  var totCards    = chapters.reduce(function(s,c){ return s+c.total; }, 0);
  var totMastered = chapters.reduce(function(s,c){ return s+c.mastered; }, 0);
  var totSeen     = chapters.reduce(function(s,c){ return s+c.seenCount; }, 0);
  var overallPct  = totCards > 0 ? Math.round(totMastered / totCards * 100) : 0;
  var seenOverall = totCards > 0 ? Math.round(totSeen / totCards * 100) : 0;

  /* ── Connection lines ── */
  var gLines = svgEl('g', {});
  chapters.forEach(function(ch, i){
    var ang = i / n * Math.PI * 2 - Math.PI / 2;
    var nx = cx + R * Math.cos(ang), ny = cy + R * Math.sin(ang);
    var ln = svgEl('line', { x1: cx.toFixed(1), y1: cy.toFixed(1), x2: nx.toFixed(1), y2: ny.toFixed(1), stroke: ch.domainColor, 'stroke-width': '1.2', opacity: '0.28' });
    gLines.appendChild(ln);
  });
  root.appendChild(gLines);

  /* ── Chapter nodes ── */
  var gNodes = svgEl('g', {});
  chapters.forEach(function(ch, i){
    var ang = i / n * Math.PI * 2 - Math.PI / 2;
    var nx = (cx + R * Math.cos(ang)).toFixed(1);
    var ny = (cy + R * Math.sin(ang)).toFixed(1);

    var g = svgEl('g', { transform: 'translate(' + nx + ',' + ny + ')', class: 'cm-node', 'data-idx': i, cursor: 'pointer' });

    /* Glow halo on hover */
    var halo = svgEl('circle', { r: nodeR + 10, fill: ch.domainColor, opacity: '0' });

    /* Background fill */
    var bg = svgEl('circle', { r: nodeR, fill: masteryFill(ch.mastPct, ch.seenPct), stroke: 'rgba(255,255,255,0.07)', 'stroke-width': '1' });

    /* Domain ring */
    var ring = svgEl('circle', { r: nodeR, fill: 'none', stroke: ch.domainColor, 'stroke-width': '2', opacity: '0.38' });

    /* Mastery progress arc */
    var ap = arcPath(ch.mastPct, arcR);
    if (ap) {
      var arc = svgEl('path', { d: ap, fill: 'none', stroke: masteryStroke(ch.mastPct, ch.seenPct), 'stroke-width': arcW, 'stroke-linecap': 'round', filter: 'url(#cm-glow-sm)' });
      g.appendChild(arc);
    }

    /* Labels */
    var lY = fontSize_big > 14 ? '-7' : '-5';
    var sY = fontSize_big > 14 ? '8'  : '6';
    var pY = fontSize_big > 14 ? '22' : '18';

    var lbl = svgEl('text', { 'text-anchor': 'middle', 'font-size': fontSize_big, 'font-weight': '700', fill: '#e8e4f0', y: lY, 'font-family': "'DM Sans',sans-serif" });
    lbl.textContent = ch.shortLabel;

    var sub = svgEl('text', { 'text-anchor': 'middle', 'font-size': fontSize_sub, fill: 'rgba(232,228,240,0.58)', y: sY, 'font-family': "'DM Sans',sans-serif" });
    sub.textContent = ch.subLabel.slice(0, 14);

    var pctColor = ch.seenPct === 0 ? 'rgba(255,255,255,0.22)' : masteryStroke(ch.mastPct, ch.seenPct);
    var pctTxt = svgEl('text', { 'text-anchor': 'middle', 'font-size': Math.max(7, fontSize_sub - 1), 'font-weight': '700', fill: pctColor, y: pY, 'font-family': "'DM Sans',sans-serif" });
    pctTxt.textContent = ch.seenPct === 0 ? '—' : ch.mastPct + '%';

    g.appendChild(halo);
    g.appendChild(bg);
    g.appendChild(ring);
    g.appendChild(lbl);
    g.appendChild(sub);
    g.appendChild(pctTxt);

    /* Interactions */
    g.addEventListener('mouseenter', function(){ halo.setAttribute('opacity','0.09'); ring.setAttribute('opacity','0.72'); });
    g.addEventListener('mouseleave', function(){ halo.setAttribute('opacity','0');    ring.setAttribute('opacity','0.38'); });
    g.addEventListener('click', function(e){ e.stopPropagation(); selectNode(g, ch); });

    gNodes.appendChild(g);
  });
  root.appendChild(gNodes);

  /* ── Center node ── */
  var cR = Math.min(60, Math.max(44, nodeR * 1.35));
  var gC = svgEl('g', { transform: 'translate(' + cx.toFixed(1) + ',' + cy.toFixed(1) + ')' });

  var cAp = arcPath(overallPct, cR - 2);
  if (cAp) {
    var cArcColor = overallPct >= 70 ? '#a8d8c4' : overallPct >= 40 ? '#a8c8f0' : '#f0c8a0';
    gC.appendChild(svgEl('path', { d: cAp, fill: 'none', stroke: cArcColor, 'stroke-width': '4.5', 'stroke-linecap': 'round', filter: 'url(#cm-glow)' }));
  }

  gC.appendChild(svgEl('circle', { r: cR, fill: 'rgba(19,17,26,0.92)', stroke: 'rgba(200,184,240,0.28)', 'stroke-width': '1.5' }));

  var srcLabel = srcName === 'Révision complète' ? 'RÉVISION' : srcName === 'Guide UNIL' ? 'GUIDE UNIL' : 'RÉSUMÉ';
  var cSrcEl = svgEl('text', { 'text-anchor': 'middle', 'font-size': '8', fill: 'rgba(200,184,240,0.65)', 'font-weight': '700', 'letter-spacing': '0.08em', y: '-17', 'font-family': "'DM Sans',sans-serif" });
  cSrcEl.textContent = srcLabel;

  var cPctEl = svgEl('text', { 'text-anchor': 'middle', 'font-size': '22', 'font-weight': '800', fill: '#e8e4f0', y: '5', 'font-family': "'DM Serif Display',serif" });
  cPctEl.textContent = overallPct + '%';

  var cSubEl = svgEl('text', { 'text-anchor': 'middle', 'font-size': '7.5', fill: 'rgba(232,228,240,0.38)', y: '20', 'font-family': "'DM Sans',sans-serif" });
  cSubEl.textContent = totMastered + '/' + totCards + ' cartes';

  gC.appendChild(cSrcEl); gC.appendChild(cPctEl); gC.appendChild(cSubEl);
  root.appendChild(gC);

  resetTransform();
}

/* ─── Info panel ─────────────────────────────────────────────────────────────── */
function selectNode(gEl, ch) {
  document.querySelectorAll('.cm-node').forEach(function(n){ n.classList.remove('cm-node-sel'); });
  gEl.classList.add('cm-node-sel');
  openPanel(ch);
}

function openPanel(ch) {
  document.getElementById('cm-panel-title').textContent = ch.shortLabel + ' — ' + ch.subLabel;

  var mastColor  = ch.mastPct >= 70 ? '#a8d8c4' : ch.mastPct >= 40 ? '#a8c8f0' : '#f0c8a0';
  var stateKey   = 'bap_fc_state';
  var savedState = {};
  try { savedState = JSON.parse(localStorage.getItem(stateKey) || '{}'); } catch(e){}

  document.getElementById('cm-panel-body').innerHTML =
    '<div class="cmp-stats">' +
      '<div class="cmp-stat" style="border-color:rgba(168,216,196,0.3)">' +
        '<div class="cmp-stat-n" style="color:#a8d8c4">' + ch.mastered + '</div>' +
        '<div class="cmp-stat-l">Maîtrisées</div>' +
      '</div>' +
      '<div class="cmp-stat" style="border-color:rgba(168,200,240,0.3)">' +
        '<div class="cmp-stat-n" style="color:#a8c8f0">' + ch.inProg + '</div>' +
        '<div class="cmp-stat-l">En cours</div>' +
      '</div>' +
      '<div class="cmp-stat" style="border-color:rgba(240,200,160,0.3)">' +
        '<div class="cmp-stat-n" style="color:#f0c8a0">' + ch.struggling + '</div>' +
        '<div class="cmp-stat-l">Fragiles</div>' +
      '</div>' +
      '<div class="cmp-stat" style="border-color:rgba(255,255,255,0.08)">' +
        '<div class="cmp-stat-n" style="color:rgba(255,255,255,0.38)">' + ch.unseen + '</div>' +
        '<div class="cmp-stat-l">Non vues</div>' +
      '</div>' +
    '</div>' +
    '<div class="cmp-bar-wrap"><div class="cmp-bar" style="width:' + ch.mastPct + '%;background:' + mastColor + '"></div></div>' +
    '<div class="cmp-bar-label">' + ch.mastPct + '% maîtrisé · ' + ch.total + ' carte' + (ch.total > 1 ? 's' : '') + '</div>' +
    '<div class="cmp-chapter-full">' + ch.ch + '</div>' +
    '<button class="cmp-btn" id="cmp-go-btn"><svg class="ic"><use href="#i-book-open"/></svg> Réviser ce chapitre</button>';

  document.getElementById('cmp-go-btn').addEventListener('click', function(){
    var st = {};
    try { st = JSON.parse(localStorage.getItem(stateKey) || '{}'); } catch(e){}
    st.source = ch.source; st.chapter = ch.ch; st.filterKey = 'all';
    try { localStorage.setItem(stateKey, JSON.stringify(st)); } catch(e){}
    window.location.href = 'flashcards.html';
  });

  document.getElementById('cm-panel').classList.add('open');
}

document.getElementById('cm-panel-close').addEventListener('click', function(){
  document.getElementById('cm-panel').classList.remove('open');
  document.querySelectorAll('.cm-node').forEach(function(n){ n.classList.remove('cm-node-sel'); });
});

/* ─── Tabs ───────────────────────────────────────────────────────────────────── */
document.querySelectorAll('.cm-tab').forEach(function(btn){
  btn.addEventListener('click', function(){
    document.querySelectorAll('.cm-tab').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById('cm-panel').classList.remove('open');
    renderMap(btn.getAttribute('data-source'));
  });
});

/* ─── Zoom / Pan ─────────────────────────────────────────────────────────────── */
var T = { x: 0, y: 0, s: 1 };
var drag = false, dStart = {x:0,y:0}, tStart = {x:0,y:0};

function applyT(){
  document.getElementById('cm-root').setAttribute('transform', 'translate(' + T.x.toFixed(2) + ',' + T.y.toFixed(2) + ') scale(' + T.s.toFixed(4) + ')');
}

function resetTransform(){ T = {x:0,y:0,s:1}; applyT(); }

var wrap = document.getElementById('cm-canvas-wrap');

wrap.addEventListener('wheel', function(e){
  e.preventDefault();
  var f = e.deltaY < 0 ? 1.10 : 0.91;
  var rect = wrap.getBoundingClientRect();
  var mx = e.clientX - rect.left, my = e.clientY - rect.top;
  T.x = mx - (mx - T.x) * f;
  T.y = my - (my - T.y) * f;
  T.s = Math.min(5, Math.max(0.25, T.s * f));
  applyT();
}, {passive:false});

wrap.addEventListener('mousedown', function(e){
  if (e.target.closest('.cm-node')) return;
  drag = true; dStart = {x:e.clientX, y:e.clientY}; tStart = {x:T.x, y:T.y};
});
window.addEventListener('mousemove', function(e){
  if (!drag) return;
  T.x = tStart.x + (e.clientX - dStart.x);
  T.y = tStart.y + (e.clientY - dStart.y);
  applyT();
});
window.addEventListener('mouseup', function(){ drag = false; });
wrap.addEventListener('dblclick', resetTransform);
document.getElementById('cm-btn-reset').addEventListener('click', resetTransform);

/* ── Touch zoom/pan ── */
var touches = {}, touchD0 = 0, touchS0 = 1, touchM0 = {x:0,y:0}, touchT0 = {x:0,y:0};
wrap.addEventListener('touchstart', function(e){
  [].slice.call(e.changedTouches).forEach(function(t){ touches[t.identifier] = {x:t.clientX,y:t.clientY}; });
  var ta = Object.values(touches);
  if (ta.length === 2){
    touchD0 = Math.hypot(ta[1].x-ta[0].x, ta[1].y-ta[0].y);
    touchS0 = T.s; touchM0 = {x:(ta[0].x+ta[1].x)/2, y:(ta[0].y+ta[1].y)/2}; touchT0 = {x:T.x,y:T.y};
  } else if (ta.length === 1){
    dStart = {x:ta[0].x,y:ta[0].y}; tStart = {x:T.x,y:T.y};
  }
},{passive:true});
wrap.addEventListener('touchmove', function(e){
  e.preventDefault();
  [].slice.call(e.changedTouches).forEach(function(t){ touches[t.identifier] = {x:t.clientX,y:t.clientY}; });
  var ta = Object.values(touches);
  var rect = wrap.getBoundingClientRect();
  if (ta.length === 2){
    var dist = Math.hypot(ta[1].x-ta[0].x, ta[1].y-ta[0].y);
    var f = dist / touchD0;
    T.s = Math.min(5, Math.max(0.25, touchS0 * f));
    var mx = touchM0.x - rect.left, my = touchM0.y - rect.top;
    T.x = touchT0.x + (ta[0].x+ta[1].x)/2 - touchM0.x + mx*(1-f);
    T.y = touchT0.y + (ta[0].y+ta[1].y)/2 - touchM0.y + my*(1-f);
    applyT();
  } else if (ta.length === 1){
    T.x = tStart.x + (ta[0].x - dStart.x);
    T.y = tStart.y + (ta[0].y - dStart.y);
    applyT();
  }
},{passive:false});
wrap.addEventListener('touchend', function(e){
  [].slice.call(e.changedTouches).forEach(function(t){ delete touches[t.identifier]; });
  var ta = Object.values(touches);
  if (ta.length === 1){ dStart = {x:ta[0].x,y:ta[0].y}; tStart = {x:T.x,y:T.y}; }
},{passive:true});

/* ─── Resize ──────────────────────────────────────────────────────────────────── */
var rsTimer;
window.addEventListener('resize', function(){
  clearTimeout(rsTimer);
  rsTimer = setTimeout(function(){ renderMap(currentSource); }, 180);
});

/* ─── Init ───────────────────────────────────────────────────────────────────── */
renderMap('Révision complète');
</script>
