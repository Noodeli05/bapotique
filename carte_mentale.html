<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><script>(function(){if(!location.search.includes('v='))location.replace(location.pathname+'?v=20260720');}());</script>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cartes mentales — Bapotique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/common.css">
<style>
:root{--bg:#13111a}
body{background:var(--bg,#13111a);color:#e8e4f0;font-family:'DM Sans',sans-serif;min-height:100vh;margin:0}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 55% at 18% 22%,rgba(124,108,192,.18) 0%,transparent 70%),
             radial-gradient(ellipse 55% 45% at 82% 78%,rgba(100,160,220,.12) 0%,transparent 65%)}

.page-wrap{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:2rem 1.2rem 3rem}

/* ── Header ── */
.hub-header{margin-bottom:2.4rem}
.hub-eyebrow{font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(200,184,240,.55);margin-bottom:.6rem}
.hub-title{font-family:'DM Serif Display',serif;font-size:clamp(1.8rem,5vw,2.6rem);color:#c8b8f0;margin:0 0 .5rem;line-height:1.15}
.hub-sub{font-size:.92rem;color:rgba(232,228,240,.55);line-height:1.6;max-width:540px}

/* ── Grid ── */
.hub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1.1rem}

/* ── Chapter card ── */
.ch-card{position:relative;border-radius:16px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.05);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);overflow:hidden;transition:transform .18s,box-shadow .18s,border-color .18s;cursor:pointer;display:flex;flex-direction:column}
.ch-card::before{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,transparent 55%);pointer-events:none}
.ch-card.available:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.35);border-color:rgba(255,255,255,.18)}
.ch-card.locked{opacity:.55;cursor:default}
.ch-card.locked:hover{transform:none;box-shadow:none}

.ch-card-top{padding:1.2rem 1.2rem .8rem;flex:1}
.ch-badge-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem}
.ch-code{font-family:'DM Serif Display',serif;font-size:1.05rem;font-weight:400;padding:.2rem .7rem;border-radius:30px;background:rgba(255,255,255,.1);letter-spacing:.04em}
.ch-avail{font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.2rem .55rem;border-radius:30px}
.ch-avail.yes{background:rgba(168,216,196,.15);color:#a8d8c4;border:1px solid rgba(168,216,196,.25)}
.ch-avail.no{background:rgba(255,255,255,.06);color:rgba(232,228,240,.35);border:1px solid rgba(255,255,255,.08)}
.ch-title{font-family:'DM Serif Display',serif;font-size:1.1rem;color:#e8e4f0;margin:0 0 .2rem;line-height:1.25}
.ch-subtitle{font-size:.78rem;color:rgba(232,228,240,.5);line-height:1.5}

.ch-card-bot{display:flex;align-items:center;gap:.5rem;padding:.65rem 1.2rem;border-top:1px solid rgba(255,255,255,.06);font-size:.74rem;color:rgba(232,228,240,.38)}
.ch-card.available .ch-card-bot{color:rgba(200,184,240,.6)}
.ch-arrow{margin-left:auto;font-size:.9rem;opacity:.5;transition:transform .15s}
.ch-card.available:hover .ch-arrow{transform:translateX(3px);opacity:1}

/* ── Light theme ── */
[data-theme="light"] body{background:#f0ecfa;color:#2d2540}
[data-theme="light"] body::before{background:radial-gradient(ellipse 70% 55% at 18% 22%,rgba(124,108,192,.09) 0%,transparent 70%),radial-gradient(ellipse 55% 45% at 82% 78%,rgba(100,160,220,.07) 0%,transparent 65%)}
[data-theme="light"] .ch-card{background:rgba(255,255,255,.75);border-color:rgba(0,0,0,.08)}
[data-theme="light"] .ch-card.available:hover{border-color:rgba(124,108,192,.3)}
[data-theme="light"] .ch-title{color:#2d2540}
[data-theme="light"] .ch-subtitle{color:rgba(45,37,64,.5)}
[data-theme="light"] .ch-card-bot{border-top-color:rgba(0,0,0,.06);color:rgba(45,37,64,.38)}
[data-theme="light"] .ch-card.available .ch-card-bot{color:#7c6cc0}
[data-theme="light"] .ch-eyebrow{color:rgba(100,80,160,.55)}
[data-theme="light"] .hub-sub{color:rgba(45,37,64,.55)}

/* ── Loading / error ── */
.hub-msg{text-align:center;padding:3rem 1rem;color:rgba(232,228,240,.4);font-size:.88rem}

/* ── Mobile ── */
@media(max-width:520px){
  .hub-grid{grid-template-columns:1fr}
  .page-wrap{padding:1.2rem .8rem 2rem}
}
</style>
</head>
<body>
<script src="assets/js/icons.js"></script>
<div id="bap-nav"></div>

<div class="page-wrap">
  <div class="hub-header">
    <div class="hub-eyebrow">Linguistique française · UNIL 2025</div>
    <h1 class="hub-title">Cartes mentales</h1>
    <p class="hub-sub">Explore chaque dossier sous forme de carte interactive. Clique sur un nœud pour voir la définition, les exemples et les liens vers les fiches.</p>
  </div>
  <div id="hub-grid" class="hub-grid">
    <div class="hub-msg">Chargement…</div>
  </div>
</div>

<script src="assets/js/common.js"></script>
<script src="notes.js"></script>
<script>
(function(){
  var grid = document.getElementById('hub-grid');

  function render(data) {
    if (!data || !data.chapters || !data.chapters.length) {
      grid.innerHTML = '<div class="hub-msg">Aucun chapitre disponible.</div>';
      return;
    }
    var html = '';
    data.chapters.forEach(function(ch) {
      var avail = ch.available;
      html += '<div class="ch-card ' + (avail ? 'available' : 'locked') + '" ' +
        (avail ? 'onclick="location.href=\'carte_chapitre.html?ch=' + ch.id + '\'" ' +
                 'role="link" tabindex="0" onkeydown="if(event.key===\'Enter\'||event.key===\' \')location.href=\'carte_chapitre.html?ch=' + ch.id + '\'"' : '') +
        ' style="--acc:' + ch.color + '">' +
        '<div class="ch-card-top">' +
          '<div class="ch-badge-row">' +
            '<span class="ch-code" style="color:' + ch.color + ';border:1.5px solid ' + ch.color + '33">' + ch.id + '</span>' +
            '<span class="ch-avail ' + (avail ? 'yes' : 'no') + '">' + (avail ? 'Disponible' : 'Bientôt') + '</span>' +
          '</div>' +
          '<div class="ch-title">' + ch.title + '</div>' +
          '<div class="ch-subtitle">' + ch.subtitle + '</div>' +
        '</div>' +
        '<div class="ch-card-bot">' +
          (avail ? '<svg style="width:.8rem;height:.8rem;flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg>Voir la carte' : '<svg style="width:.8rem;height:.8rem;flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Non disponible') +
          (avail ? '<span class="ch-arrow">→</span>' : '') +
        '</div>' +
      '</div>';
    });
    grid.innerHTML = html;
  }

  fetch('assets/data/cartes_mentales.json')
    .then(function(r){ return r.json(); })
    .then(render)
    .catch(function(){ grid.innerHTML = '<div class="hub-msg">Impossible de charger les données.</div>'; });
})();
</script>
</body>
</html>
