vient trop vague.", "ex": "«L'homme [qui est venu] hier» — sans la relative, on ne sait pas de quel homme", "links": "↔ relative appositive, CN, restrictive, pronom relatif", "diff": "dg"}, {"ch": 6, "ch_id": "ch6", "term": "Amplification", "def": "Procédé rhétorico-syntaxique d'<strong>enrichissement du GN</strong> par accumulation d'extensions (épithètes, relatives, CN) pour produire un effet d'insistance ou de précision maximale.", "expl": "En clair : accumuler beaucoup d'extensions dans un GN pour produire un effet d'insistance ou de précision maximale. Fréquent dans le style littéraire ou rhétorique : « ce vieux monsieur fatigué, en manteau noir, qui habitait le quartier depuis des années ».", "ex": "«Ce vieux monsieur, fatigué, en manteau noir, qui habitait le quartier depuis 40 ans»", "links": "↔ extension GN, style, rhétorique, épithète, relative", "diff": "dr"}, {"ch": 7, "ch_id": "ch7", "term": "Complément valenciel vs circonstanciel", "def": "<strong>Valenciel</strong>: imposé par la valence du verbe, obligatoire, spécifique à ce verbe. <strong>Circonstanciel</strong>: ajout libre, non prévu par la valence, supprimable sans affecter la grammaticalité.", "expl": "En clair : un complément <strong>valenciel</strong> est exigé par le verbe — on ne peut pas l'enlever sans problème (« habiter [à Paris] » : à Paris est obligatoire). Un <strong>circonstanciel</strong> est libre — on peut l'enlever sans que la phrase devienne bizarre.", "ex": "«habiter [à Paris]» (valenciel, obligatoire); «[à Paris], il travaille» (circonstanciel, facultatif)", "links": "↔ valence, actant, rection, circonstant", "diff": "dg"}, {"ch": 7, "ch_id": "ch7", "term": "Intraprédicatif", "def": "Circonstant dont la portée est <strong>interne au prédicat</strong>: il modifie le procès lui-même (manière, moyen, degré, lieu interne). Intégré phonologiquement à la clause, sans pause.", "expl": "En clair : un circonstant dont la portée est à l'intérieur du prédicat — il modifie l'action elle-même (manière, moyen, degré). « Il court [vite] » — vite modifie comment il court. Il est collé à l'action et ne peut pas facilement aller en début de phrase.", "ex": "«Il court [vite]» (manière intraprédic.); «Elle travaille [avec soin]» (moyen)", "links": "↔ extraprédicatif, circonstant, portée, manière", "diff": "dy"}, {"ch": 7, "ch_id": "ch7", "term": "Extraprédicatif", "def": "Circonstant dont la portée dépasse le prédicat: porte sur la <strong>clause entière</strong> ou le cadre énonciatif. Souvent en périphérie (début ou fin), séparé par une pause ou virgule.", "expl": "En clair : un circonstant dont la portée dépasse l'action — il porte sur toute la clause ou même l'énonciation. « [Franchement], il a tort » — franchement commente la façon de parler, pas l'action. Il se place souvent en début ou fin de phrase avec une virgule.", "ex": "«[Franchement], il a tort» (modal énonc.); «[Le soir], il lit» (cadre temporel)", "links": "↔ intraprédicatif, modalisateur, périphérie, cadratif", "diff": "dy"}, {"ch": 7, "ch_id": "ch7", "term": "Valeurs sémantiques des circonstants", "def": "Les circonstants expriment des valeurs variées: <strong>temps</strong> (quand), <strong>lieu</strong> (où), <strong>manière</strong> (comment), <strong>cause</strong>, <strong>but</strong>, <strong>condition</strong>, <strong>concession</strong>, <strong>quantité</strong>, moyen, compagnie.", "expl": "En clair : les circonstants peuvent exprimer des choses très différentes. Temps (quand ?), lieu (où ?), manière (comment ?), cause (pourquoi ?), but (pour quoi ?), condition (à quelle condition ?), concession (malgré quoi ?)… Chaque valeur sémantique correspond à une classe de circonstants.", "ex": "«[hier]» (temps); «[ici]» (lieu); «[pour gagner]» (but); «[malgré tout]» (concession)", "links": "↔ circonstancielle, GPrép, adverbe, sémantique", "diff": "dg"}, {"ch": 7, "ch_id": "ch7", "term": "Effet de la position du circonstant", "def": "La position du circonstant modifie son <strong>interprétation pragmatique</strong>: en tête = cadre/thème, en fin = information nouvelle/rhème, médian = moins saillant. Influe aussi sur la portée.", "expl": "En clair : la même information change d'effet selon sa position. En début de phrase (« [Demain], je pars ») → c'est le cadre, l'arrière-plan. En fin de phrase (« Je pars [demain] ») → c'est l'information nouvelle, le focus. La position porte un signal pragmatique.", "ex": "«[Demain], je pars» (cadre) vs «Je pars [demain]» (rhème/info nouvelle)", "links": "↔ thème/rhème, périphérie, intrapréd./extrapréd.", "diff": "dy"}, {"ch": 7, "ch_id": "ch7", "term": "Modalisateur", "def": "Élément exprimant l'attitude du locuteur envers le contenu propositionnel: certitude, probabilité, source de l'information (<strong>épistémique</strong>), appréciation (<strong>évaluatif</strong>), façon d'énoncer (<strong>énonciatif</strong>).", "expl": "En clair : un mot qui exprime l'attitude du locuteur — sa certitude, son évaluation, sa façon d'énoncer. « Peut-être il viendra » (incertain). « Heureusement, il est parti » (évaluation positive). « Franchement, je ne sais pas » (façon d'énoncer). Ces mots commentent l'énoncé.", "ex": "«[Peut-être] il viendra» (épist.); «[Heureusement], il est parti» (éval.); «[Franchement]» (énon.)", "links": "↔ extraprédicatif, modalité, périphérie, adverbe", "diff": "dy"}, {"ch": 7, "ch_id": "ch7", "term": "Périphérie gauche / droite", "def": "Zones <strong>syntaxiquement détachées</strong> en dehors du noyau prédicatif. <strong>Périphérie gauche</strong>: avant le sujet (cadres, topiques, modalisateurs). <strong>Périphérie droite</strong>: après le noyau (dislocations, épexégèses).", "expl": "En clair : les zones en dehors du « cœur » de la phrase. À gauche du sujet (périphérie gauche) : cadres, topiques, commentaires. Après le GV (périphérie droite) : dislocations, précisions. Ces zones accueillent des éléments détachés avec une virgule.", "ex": "«[Quant à Paul,] il est parti» (gauche); «Il est parti, [Paul]» (droite, dislocation)", "links": "↔ dislocation, topique, extraprédicatif, phrase graphique", "diff": "dr"}, {"ch": 7, "ch_id": "ch7", "term": "CC vs Circonstant", "def": "Terminologie scolaire «complément circonstanciel» (CC) = terme traditionnel regroupant les compléments de lieu, temps, manière. «Circonstant» est le terme linguistique moderne, plus précis: exclu la valence.", "expl": "En clair : le « complément circonstanciel » de la grammaire scolaire et le « circonstant » de la linguistique, c'est la même idée, mais le terme linguistique est plus précis. Il distingue si l'élément porte sur le prédicat seul (intraprédicatif) ou sur toute la clause (extraprédicatif).", "ex": "CC: «il mange rapidement» — Circonstant: distingue portée (intra/extraprédicatif) et valeur sémantique", "links": "↔ valenciel, circonstanciel, terminologie, grammaire scolaire", "diff": "dy"}, {"ch": 8, "ch_id": "ch8", "term": "Clause complexe", "def": "Clause comprenant au moins deux <strong>noyaux prédicatifs</strong>: une clause principale (matrice) et une ou plusieurs clauses subordonnées ou coordonnées. Plusieurs degrés d'enchâssement possibles.", "expl": "En clair : une phrase qui contient au moins deux noyaux verbaux — une clause principale et une ou plusieurs subordonnées. « Je pense [que Marie viendra] » = deux clauses imbriquées. Plus une phrase est complexe, plus elle a de niveaux d'enchâssement.", "ex": "«Je pense [que Marie viendra]» = principale + subordonnée complétive", "links": "↔ subordination, principale, enchâssement, clause", "diff": "dg"}, {"ch": 8, "ch_id": "ch8", "term": "Subordination", "def": "Relation d'<strong>enchâssement hiérarchique</strong>: une clause dépend syntaxiquement d'une autre (la matrice). La subordonnée a un statut de constituant (sujet, objet, complément) dans la principale.", "expl": "En clair : une clause qui dépend grammaticalement d'une autre. La clause subordonnée joue un rôle dans la phrase principale : sujet, objet, complément circonstanciel… Elle ne peut pas exister seule avec le même sens.", "ex": "«Il faut [que tu viennes]» (sujet); «Je sais [qu'il est là]» (objet); «[Quand il arrive,] je pars»", "links": "↔ coordination, hypotaxe, enchâssement, principale", "diff": "dg"}, {"ch": 8, "ch_id": "ch8", "term": "Relative déterminative", "def": "Relative intégrée au GN qui <strong>restreint la référence</strong> de la tête nominale. Sa suppression change ou détruit la référence. Pas de virgule. Introduite par «qui/que/dont/où/lequel».", "expl": "En clair : une clause en « qui/que/dont/où » intégrée au GN qui restreint le référent du nom. Sans elle, on ne sait plus de quoi on parle. « L'homme [qui est venu] » — si on enlève la relative, on ne sait pas quel homme. Pas de virgule.", "ex": "«L'homme [qui est venu] est parti» — sans relative, référence indéterminée", "links": "↔ relative appositive, CN, restrictive, pronom relatif", "diff": "dg"}, {"ch": 8, "ch_id": "ch8", "term": "Relative appositive", "def": "Relative <strong>détachée du GN</strong> par une virgule, ajoutant une information accessoire non restrictive. Sa suppression ne change pas la référence. Souvent entre virgules.", "expl": "En clair : une clause en « qui/que » séparée par des virgules qui ajoute une info supplémentaire, non restrictive. « Marie, [qui est médecin,] est venue » — si on enlève la relative, Marie reste identifiée. La virgule est la marque clé.", "ex": "«Marie, [qui est médecin,] est venue» — «qui est médecin» = info supplémentaire, non restrictive", "links": "↔ relative déterminative, apposition, virgule", "diff": "dy"}, {"ch": 8, "ch_id": "ch8", "term": "Complétive", "def": "Subordonnée jouant le rôle d'un <strong>GN</strong> (sujet, objet direct) dans la principale. Introduite par «que» + subjonctif ou indicatif selon le verbe régissant.", "expl": "En clair : une clause en « que » qui fonctionne comme un GN — sujet ou objet du verbe principal. « Je sais [qu'il viendra] » — la complétive est l'objet de « savoir ». Le verbe principal impose l'indicatif ou le subjonctif selon son sens.", "ex": "«Je sais [qu'il viendra]» (objet ind.); «Il faut [que tu partes]» (sujet); «[Qu'il soit là] m'étonne»", "links": "↔ interrogative indirecte, infinitive, rection, que", "diff": "dg"}, {"ch": 8, "ch_id": "ch8", "term": "Interrogative indirecte", "def": "Subordonnée complétive de type interrogatif, enchâssée sous un verbe de <strong>demande/connaissance</strong>. Introduite par «si» (oui/non) ou un mot interrogatif («qui», «quand», «comment»…).", "expl": "En clair : une question enchâssée dans une autre phrase. On ne pose pas la question directement (« Viendra-t-il ? ») — on l'intègre dans une phrase (« Je me demande [s'il viendra] »). On utilise « si » (oui/non) ou un mot interrogatif.", "ex": "«Je me demande [s'il viendra]»; «Il sait [qui a gagné]»; «Dis-moi [comment tu fais]»", "links": "↔ complétive, interrogative directe, si, mot interr.", "diff": "dy"}, {"ch": 8, "ch_id": "ch8", "term": "Circonstancielle", "def": "Subordonnée exprimant une <strong>relation circonstancielle</strong> (temps, cause, but, condition, concession…) avec la principale. Introduite par une conjonction de subordination complexe.", "expl": "En clair : une clause qui joue le rôle d'un circonstant — elle dit quand, pourquoi, pour quoi, à quelle condition… Elle est introduite par une conjonction de subordination (« quand », « parce que », « pour que », « si »…).", "ex": "«[Quand il arrive,] je pars» (temps); «[Parce qu'il pleut,] je reste» (cause)", "links": "↔ conjonction, circonstant, cause, temps, condition", "diff": "dg"}, {"ch": 8, "ch_id": "ch8", "term": "Participiale", "def": "Subordonnée non finie dont le verbe est au <strong>participe</strong> (présent ou passé). Peut avoir son propre sujet (= absolue) ou coréférer avec le sujet principal (= épithète détachée).", "expl": "En clair : une clause dont le verbe est au participe (présent ou passé). Si elle a le même sujet que la principale, elle est détachée (épithète). Si elle a son propre sujet, c'est une absolue. « [Sachant la vérité], il se tut » — sachant = participe, même sujet que il.", "ex": "«[Sachant la vérité,] il se tut» (coréf.); «[Le soleil se couchant,] ils partirent» (absol.)", "links": "↔ absolue, gérondif, épithète détachée, participe", "diff": "dy"}, {"ch": 8, "ch_id": "ch8", "term": "Place de la subordonnée", "def": "La position de la subordonnée par rapport à la principale a des effets pragmatiques: en <strong>antéposition</strong> = cadre/thème; en <strong>postposition</strong> = information nouvelle/rhème ou attendue.", "expl": "En clair : une subordonnée circonstancielle peut aller avant ou après la principale. Avant → elle donne le cadre, le contexte. Après → elle apporte l'info principale. Ce choix a des effets sur la mise en relief et le rythme de la phrase.", "ex": "«[Quand il arrive,] je pars» (cadre) vs «Je pars [quand il arrive]» (info nouvelle)", "links": "↔ thème/rhème, périphérie, ordre des mots", "diff": "dy"}, {"ch": 8, "ch_id": "ch8", "term": "Adjointe vs complément verbal", "def": "<strong>Adjointe</strong>: subordonnée circonstancielle libre, non régie par le verbe, supprimable. <strong>Complément verbal</strong>: subordonnée régie par la valence du verbe, non supprimable sans agrammaticalité.", "expl": "En clair : une <strong>adjointe</strong> est une subordonnée libre, qu'on peut enlever sans problème (« Parce qu'il pleut, je reste »). Un <strong>complément verbal</strong> est imposé par le verbe, indispensable (« Il veut [qu'elle parte] » — veut impose la complétive).", "ex": "Adjointe: «[Parce qu'il pleut,] je reste»; CV: «Il veut [qu'elle parte]» (régi par «vouloir»)", "links": "↔ circonstancielle, complétive, valence, rection", "diff": "dy"}, {"ch": 8, "ch_id": "ch8", "term": "Infinitives subordonnées", "def": "Subordonnée dont le verbe est à l'<strong>infinitif</strong>: complétive infinitive (après verbe de perception, causatif, modal) ou circonstancielle infinitive (après préposition).", "expl": "En clair : une subordonnée dont le verbe est à l'infinitif. Après un verbe de désir ou de volonté (« Je veux partir »), de perception (« Je le vois courir »), ou après une préposition (« Pour réussir, il faut travailler »).", "ex": "«Je veux [partir]»; «Je le vois [courir]»; «[Pour réussir,] il faut travailler»", "links": "↔ clause infinitive, complétive, circonstancielle, infinitif", "diff": "dy"}, {"ch": 8, "ch_id": "ch8", "term": "Corrélation", "def": "Construction <strong>bi-polaire</strong> à deux membres liés par une paire de corrélateurs (plus…plus, si…que, tant…que, autant…autant). Les deux clauses se conditionnent mutuellement.", "expl": "En clair : deux parties de phrase qui se conditionnent mutuellement avec des mots en écho. « Plus il mange, plus il grossit » — les deux membres sont liés, on ne peut pas en avoir un sans l'autre. Ce n'est ni de la subordination pure ni de la coordination pure.", "ex": "«Plus il mange, plus il grossit»; «Si tu veux, je viens»; «Tant il travaille qu'il s'épuise»", "links": "↔ coordination, subordination, bi-polaire, corrélateurs", "diff": "dr"}, {"ch": 8, "ch_id": "ch8", "term": "Hypotaxe vs Parataxe", "def": "<strong>Hypotaxe</strong>: subordination explicite avec connecteur (conjonction, pronom relatif). <strong>Parataxe</strong>: juxtaposition sans connecteur — relation implicite, inférée du contexte. Continuité sur un axe.", "expl": "En clair : <strong>hypotaxe</strong> = on explique le lien entre les clauses avec un mot (conjonction, pronom relatif). <strong>Parataxe</strong> = on juxtapose sans expliquer, le lecteur déduit. « Il était fatigué ; il est parti » (parataxe) vs « Il est parti parce qu'il était fatigué » (hypotaxe).", "ex": "Hypot.: «Il est parti parce qu'il était fatigué»; Parataxe: «Il était fatigué: il est parti»", "links": "↔ coordination, subordination, juxtaposition, asyndète", "diff": "dy"}, {"ch": 8, "ch_id": "ch8", "term": "Effets stylistiques de la subordination", "def": "Le choix entre hypotaxe, parataxe, coordination modifie le <strong>rythme</strong> et l'effet discursif: l'hypotaxe marque la logique explicite; la parataxe crée la densité ou la rapidité; la coordination équilibre.", "expl": "En clair : le choix entre tout expliquer (hypotaxe) ou juxtaposer (parataxe) change l'effet du texte. La parataxe crée la rapidité, le dynamisme, la densité. L'hypotaxe montre la logique, le raisonnement. Un bon auteur joue sur les deux.", "ex": "«Il tomba. Il se releva. Il repartit.» (parataxe: dynamisme) vs «Bien qu'il fût tombé, il repartit»", "links": "↔ style, registre, parataxe, hypotaxe, rhétorique", "diff": "dr"}, {"ch": 9, "ch_id": "ch9", "term": "Phrase graphique", "def": "Unité délimitée par une <strong>majuscule initiale</strong> et une <strong>ponctuation forte finale</strong> (point, «!», «?», «…»). Unité propre à l'écrit, sans équivalent direct à l'oral. Peut contenir plusieurs clauses.", "expl": "En clair : c'est l'unité de l'écrit délimitée par une majuscule et un point (ou ! ou ?). C'est une convention de l'écriture — à l'oral, il n'y a pas de « point ». Une phrase graphique peut contenir une ou plusieurs clauses.", "ex": "«Il part. Elle reste.» = 2 phrases graphiques; «Il part et elle reste.» = 1 phrase, 2 clauses", "links": "↔ clause, ponctuation, écrit/oral, majuscule", "diff": "dg"}, {"ch": 9, "ch_id": "ch9", "term": "Juxtaposition", "def": "Association de clauses ou de membres sans connecteur explicite (<strong>asyndète</strong>). La relation sémantique (cause, opposition, succession…) est implicite, inférée par le lecteur.", "expl": "En clair : mettre deux clauses côte à côte sans mot de liaison. La virgule ou le point-virgule fait le travail. « Il est fatigué ; il dort » — le lien (cause ? conséquence ?) est implicite. Le lecteur doit l'inférer. C'est la parataxe à l'écrit.", "ex": "«Il est fatigué; il dort»; «Elle entre, elle regarde, elle repart» — virgule ou point-virgule", "links": "↔ coordination, parataxe, asyndète, ponctuation", "diff": "dg"}, {"ch": 9, "ch_id": "ch9", "term": "Coordination", "def": "Association de clauses (ou constituants) par une <strong>conjonction de coordination</strong> explicite. Les membres coordonnés ont en principe le même statut syntaxique et le même niveau hiérarchique.", "expl": "En clair : relier deux clauses (ou deux mots) avec une conjonction explicite. « Il mange ET il boit ». Les deux parties ont le même statut, le même niveau. On sait exactement quel est le lien grâce à la conjonction.", "ex": "«Il mange et il boit»; «Marie ou Paul viendra»; «Je veux mais je ne peux pas»", "links": "↔ subordination, juxtaposition, conjonctions, parataxe", "diff": "dg"}, {"ch": 9, "ch_id": "ch9", "term": "Conjonctions de coordination", "def": "Mots invariables reliant des éléments de <strong>même niveau syntaxique</strong>. Sept classiques: <strong>mais, ou, et, donc, or, ni, car</strong>. Chacune exprime une relation sémantique spécifique.", "expl": "En clair : les sept petits mots qui relient des éléments de même niveau. <strong>MAIS OU ET DONC OR NI CAR</strong> — une phrase mnémotechnique classique. Chacun exprime une relation précise : opposition, choix, addition, conséquence, contexte, négation, cause.", "ex": "Mais=opposition; ou=disjonction; et=addition; donc=conséquence; or=contextualis.; ni=négat.; car=cause", "links": "↔ coordination, conjonction de subordination, connecteur", "diff": "dg"}, {"ch": 9, "ch_id": "ch9", "term": "Parenthétique / Incise", "def": "<strong>Parenthétique</strong>: segment inséré dans la phrase, syntaxiquement indépendant, entre virgules/tirets/parenthèses. <strong>Incise</strong>: type de parenthétique contenant un verbe de parole avec ordre V-S.", "expl": "En clair : un commentaire inséré dans la phrase, entre tirets, virgules ou parenthèses. « Il est parti — Marie le sait — sans prévenir ». L'<strong>incise</strong> est une parenthétique spéciale qui introduit les paroles rapportées avec ordre V-S (« dit-il », « répondit-elle »).", "ex": "Parent.: «Il est parti — Marie le sait — sans prévenir»; Incise: «Il viendra, dit-il, demain»", "links": "↔ insertion, ponctuation, périphérie, modalisation", "diff": "dy"}, {"ch": 9, "ch_id": "ch9", "term": "Dislocation (générale)", "def": "Construction dans laquelle un constituant est déplacé en <strong>périphérie</strong> (gauche ou droite) et repris dans la clause par un <strong>pronom clitique</strong> coréférent. Fréquente à l'oral.", "expl": "En clair : déplacer un mot en dehors de la phrase et le remplacer par un pronom à l'intérieur. « Paul, je l'aime » — Paul est sorti de la phrase et remplacé par « l' ». Très fréquent à l'oral. Permet de mettre en avant un participant.", "ex": "«Paul, je l'aime» (gauche) / «Je l'aime, Paul» (droite) — «Paul» disloqué, repris par «l'»", "links": "↔ topicalisation, focus, clitique, périphérie, thème", "diff": "dg"}, {"ch": 9, "ch_id": "ch9", "term": "Dislocation gauche", "def": "Le constituant disloqué est placé <strong>avant le sujet</strong> (en périphérie gauche) et repris par un clitique. Signale le <strong>topique</strong> (thème du message), souvent information connue.", "expl": "En clair : le mot disloqué est placé AVANT le reste de la phrase. « [Ce livre], je l'ai lu ». On présente d'abord le thème (ce dont on va parler), puis on donne l'info. Très naturel à l'oral pour annoncer le sujet de la conversation.", "ex": "«[Ce livre], je l'ai lu»; «[À Paul], je lui ai dit»; «[Marie], elle est venue»", "links": "↔ dislocation droite, topique, clitique, thème", "diff": "dy"}, {"ch": 9, "ch_id": "ch9", "term": "Dislocation droite", "def": "Le constituant disloqué est placé <strong>après le noyau clausulaire</strong> (périphérie droite), repris par un clitique. Souvent en position de <strong>rhème</strong> ou d'ajout précisant.", "expl": "En clair : le mot disloqué est placé APRÈS le reste de la phrase. « Je l'aime, [Paul] » — on dit d'abord l'info, puis on précise de qui on parle. Sert souvent à ajouter une précision ou à s'assurer que l'interlocuteur a bien identifié le référent.", "ex": "«Je l'aime, [Marie]»; «Il l'a lu, [ce livre-là]»; «Elle vient, [ta sœur]?»", "links": "↔ dislocation gauche, clitique, rhème, périphérie droite", "diff": "dy"}, {"ch": 9, "ch_id": "ch9", "term": "Tour équatif", "def": "Construction bipartite «<strong>X, c'est Y</strong>» (ou «c'est X que Y») établissant une équation entre deux termes. Permet de focaliser ou de définir. Lié à la dislocation et aux clivées.", "expl": "En clair : « X, c'est Y » — une structure qui pose une équation entre deux éléments. « La grammaire, c'est passionnant ». Elle permet de définir, d'identifier ou de focaliser. C'est lié à la dislocation (X est disloqué à gauche) et aux constructions en « c'est ».", "ex": "«La grammaire, c'est passionnant»; «Ce qui compte, c'est la qualité»; «Manger, c'est vivre»", "links": "↔ clivée, dislocation, c'est, présentatif, focus", "diff": "dy"}, {"ch": 9, "ch_id": "ch9", "term": "Fragment après point", "def": "Phrase graphique <strong>non clausulaire</strong>: syntagme non verbal érigé en phrase autonome par la ponctuation forte. Fréquent dans la prose littéraire et journalistique pour l'effet rythmique.", "expl": "En clair : un groupe de mots sans verbe érigé en phrase autonome par un point. « Il ouvrit la porte. Silence. » — « Silence » n'est pas une phrase grammaticale, mais la ponctuation lui donne ce statut. Effet stylistique : rythme haché, dramatisation.", "ex": "«Il ouvrit la porte. Silence total.» «Elle avait tout perdu. Tout.» «Réponse: non.»", "links": "↔ phrase graphique, ponctuation, style, averbale, rhétorique", "diff": "dr"}];
const CH_META = [{"id": "intro", "label": "Introduction", "short": "Intro", "color": "#9b59b6", "light": "#eedcf7"}, {"id": "ch1", "label": "Ch.1 · Phonétique, Phonologie & Graphémique", "short": "Ch.1", "color": "#1a78c2", "light": "#d4e9f7"}, {"id": "ch2", "label": "Ch.2 · Morphologie", "short": "Ch.2", "color": "#1e8449", "light": "#d2f2e0"}, {"id": "ch3", "label": "Ch.3 · Syntaxe canonique", "short": "Ch.3", "color": "#c0701a", "light": "#f7e6d0"}, {"id": "ch4", "label": "Ch.4 · Ordre des mots", "short": "Ch.4", "color": "#b5297a", "light": "#f7d4ea"}, {"id": "ch5", "label": "Ch.5 · Types de clauses", "short": "Ch.5", "color": "#2e8b57", "light": "#d9f2e3"}, {"id": "ch6", "label": "Ch.6 · Extensions du GN", "short": "Ch.6", "color": "#b8860b", "light": "#f7f3d0"}, {"id": "ch7", "label": "Ch.7 · Extensions du GV", "short": "Ch.7", "color": "#5c4ed4", "light": "#dddaf7"}, {"id": "ch8", "label": "Ch.8 · Clause complexe", "short": "Ch.8", "color": "#b03025", "light": "#f7d5d2"}, {"id": "ch9", "label": "Ch.9 · Phrase graphique", "short": "Ch.9", "color": "#0e7f6a", "light": "#cdf2eb"}];

// Build chapter select
const selCh = document.getElementById('sel-ch');
CH_META.forEach((c,i) => {
  const o = document.createElement('option');
  o.value = String(i);
  o.textContent = c.short + ' · ' + c.label.replace(/^Ch\.\d+ · /,'');
  selCh.appendChild(o);
});

// State
let deck = [], idx = 0, flipped = false, showUnmastered = false;
const STORAGE_KEY = 'bap_flash_v1';

function getmastered() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
}
function setMastered(term, val) {
  const m = getmastered(); m[term] = val;
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(m)); } catch {}
}
function isMastered(term) { return !!getmastered()[term]; }

function buildDeck() {
  const chVal  = selCh.value;
  const difVal = document.getElementById('sel-diff').value;
  let d = CARDS.filter(c => {
    if (chVal !== 'all' && String(c.ch) !== chVal) return false;
    if (difVal !== 'all' && c.diff !== difVal) return false;
    if (showUnmastered && isMastered(c.term)) return false;
    return true;
  });
  deck = d;
  idx = 0;
  renderCard();
  updateStats();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function chColor(n) { return ['#9b59b6','#1a78c2','#1e8449','#c0701a','#b5297a','#2e8b57','#b8860b','#5c4ed4','#b03025','#0e7f6a'][n] || '#6c5ce7'; }
function chLight(n) { return ['#eedcf7','#d4e9f7','#d2f2e0','#f7e6d0','#f7d4ea','#d9f2e3','#f7f3d0','#dddaf7','#f7d5d2','#cdf2eb'][n] || '#e8e4f0'; }

function renderCard() {
  const stage = document.getElementById('stage');
  const wrap  = document.getElementById('fc-wrap');
  const empty = document.getElementById('empty-state');

  if (!deck.length) {
    stage.style.display = 'none';
    document.querySelector('.nav-row').style.display = 'none';
    document.querySelector('.mastered-row').style.display = 'none';
    empty.style.display = '';
    updateProgress();
    return;
  }
  stage.style.display = ''; empty.style.display = 'none';
  document.querySelector('.nav-row').style.display = '';
  document.querySelector('.mastered-row').style.display = '';

  const c = deck[idx];
  const col = chColor(c.ch);
  const lgt = chLight(c.ch);
  const mastered = isMastered(c.term);

  // Front
  document.getElementById('fc-front').innerHTML = `
    <div class="fc-ch-badge" style="background:${lgt}22;color:${col};border:1px solid ${col}33">
      ${CH_META[c.ch].short}
    </div>
    <div class="fc-term" style="color:${col === '#b8860b' ? '#d4a50e' : col}">${c.term}</div>
    <div class="fc-hint">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3M3 16v3a2 2 0 002 2h3m8 0h3a2 2 0 002-2v-3"/></svg>
      Cliquer ou <span style="background:rgba(255,255,255,.08);padding:.05rem .35rem;border-radius:4px;font-size:.68rem">Espace</span> pour retourner
    </div>`;

  // Difficulty label
  const diffMap = {dg:'🟢 Fondamental',dy:'🟡 Intermédiaire',dr:'🔴 Avancé'};

  // Back — handle possibly long content with scroll
  let backHtml = `<div class="fc-back-inner">
    <div class="fc-back-header">
      <span class="fc-back-term">${c.term}</span>
      <span class="fc-diff ${c.diff}">${diffMap[c.diff]||''}</span>
    </div>`;
  if (c.def)  backHtml += `<div class="fc-def">${c.def}</div>`;
  if (c.expl) backHtml += `<div class="fc-expl">${c.expl}</div>`;
  if (c.ex)   backHtml += `<div class="fc-ex">Ex : ${c.ex}</div>`;
  if (c.links) backHtml += `<div class="fc-links">↔ ${c.links}</div>`;
  backHtml += `</div>`;
  document.getElementById('fc-back').innerHTML = backHtml;
  // Style back left border with chapter color
  document.getElementById('fc-back').style.borderLeftColor = col;

  // Mastered state
  const mlabel = document.getElementById('mastered-label');
  const mcb    = document.getElementById('mastered-cb');
  mcb.checked  = mastered;
  mlabel.className = 'mastered-label' + (mastered ? ' done' : '');

  // Reset flip
  flipped = false;
  wrap.classList.remove('flipped');

  // Buttons
  document.getElementById('btn-prev').disabled = (idx === 0);
  document.getElementById('btn-next').disabled = (idx === deck.length - 1);

  updateProgress();
}

function updateProgress() {
  const total = deck.length;
  const pct   = total ? Math.round((idx+1)/total*100) : 0;
  document.getElementById('prog-fill').style.width = (total ? ((idx+1)/total*100)+'%' : '0%');
  document.getElementById('prog-label').textContent = total ? `Carte ${idx+1} sur ${total}` : 'Aucune carte';
  document.getElementById('prog-pct').textContent = total ? pct+'%' : '—';
}

function updateStats() {
  const m = getmastered();
  const total   = deck.length;
  const done    = deck.filter(c => m[c.term]).length;
  const left    = total - done;
  const pct     = total ? Math.round(done/total*100) : 0;
  document.getElementById('st-total').textContent = total;
  document.getElementById('st-done').textContent  = done;
  document.getElementById('st-left').textContent  = left;
  document.getElementById('st-pct').textContent   = pct+'%';

  // global master count
  const globalDone = CARDS.filter(c => m[c.term]).length;
  document.getElementById('master-count').textContent = globalDone;
}

function flip() {
  flipped = !flipped;
  document.getElementById('fc-wrap').classList.toggle('flipped', flipped);
}

// Events
document.getElementById('fc-wrap').addEventListener('click', flip);
document.getElementById('btn-flip').addEventListener('click', flip);

document.getElementById('btn-prev').addEventListener('click', () => {
  if (idx > 0) { idx--; renderCard(); }
});
document.getElementById('btn-next').addEventListener('click', () => {
  if (idx < deck.length-1) { idx++; renderCard(); }
});

document.getElementById('mastered-cb').addEventListener('change', function() {
  if (!deck.length) return;
  const c = deck[idx];
  setMastered(c.term, this.checked);
  const mlabel = document.getElementById('mastered-label');
  mlabel.className = 'mastered-label' + (this.checked ? ' done' : '');
  updateStats();
  if (showUnmastered && this.checked) {
    deck.splice(idx, 1);
    if (idx >= deck.length) idx = Math.max(0, deck.length-1);
    renderCard();
    updateStats();
  }
});

document.getElementById('btn-shuffle').addEventListener('click', () => {
  shuffle(deck); idx=0; renderCard();
  document.getElementById('btn-shuffle').classList.add('active');
  setTimeout(()=>document.getElementById('btn-shuffle').classList.remove('active'),600);
});

document.getElementById('btn-reset').addEventListener('click', () => {
  idx=0; buildDeck();
});

document.getElementById('btn-unmastered').addEventListener('click', function() {
  showUnmastered = !showUnmastered;
  this.classList.toggle('active', showUnmastered);
  this.textContent = showUnmastered ? '✅ Non maîtrisés' : '⬜ Non maîtrisés';
  buildDeck();
});

selCh.addEventListener('change', buildDeck);
document.getElementById('sel-diff').addEventListener('change', buildDeck);

// Keyboard
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
  if (e.key === 'ArrowRight' && idx < deck.length-1) { idx++; renderCard(); }
  if (e.key === 'ArrowLeft'  && idx > 0)             { idx--; renderCard(); }
  if ((e.key==='m'||e.key==='M') && deck.length) {
    const cb = document.getElementById('mastered-cb');
    cb.checked = !cb.checked;
    cb.dispatchEvent(new Event('change'));
  }
});

// Init
buildDeck();
updateStats();
</script>
</body>
</html>
